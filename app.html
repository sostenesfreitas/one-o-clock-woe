    border-color: var(--accent); outline: none;
  }
  .auction-input-card .ai-rate-suffix { font-size: 11px; color: var(--muted); }
  .auction-input-card .ai-effective {
    text-align: center;
    font-size: 12px;
    color: #fbbf24;
    font-weight: 700;
  }
  .auction-input-card .ai-status {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    padding-top: 4px;
    border-top: 1px dashed var(--border);
  }
  .auction-input-card .ai-status.ok { color: var(--success); }
  .auction-input-card .ai-status.short { color: var(--danger); }
  .auction-input-card .ai-status.over { color: var(--accent); }

  .auction-search-input {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  .auction-search-input:focus {
    border-color: #fbbf24;
    outline: none;
    box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.15);
  }

  /* GL main/sub split % control */
  .auction-split-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 2px 0 4px;
  }
  .auction-split-row .label { color: var(--muted); font-size: 13px; }
  .auction-split-row .label b { color: var(--accent); }
  .auction-split-input {
    width: 70px; padding: 6px 10px; font-size: 16px; font-weight: 700; text-align: center;
    background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 8px;
    color: var(--accent-2); font-variant-numeric: tabular-nums;
    transition: border-color .15s, box-shadow .15s;
  }
  .auction-split-input:hover { border-color: var(--accent-2); }
  .auction-split-input:focus {
    outline: none; border-color: var(--accent-2);
    box-shadow: 0 0 0 3px rgba(255,179,71,0.18);
  }
  .auction-split-static {
    color: var(--accent-2); font-size: 16px; font-weight: 700;
    padding: 4px 10px; border-radius: 8px; background: var(--panel-2);
  }
  .auction-split-note { color: var(--muted); font-size: 11px; margin-top: 2px; }

  .auction-summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .auction-summary-table th,
  .auction-summary-table td {
    padding: 8px 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .auction-summary-table th {
    background: var(--panel-2);
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .auction-summary-table td.item {
    text-align: left;
    font-weight: 600;
  }
  .auction-summary-table td.num { font-family: monospace; font-weight: 700; }
  .auction-summary-table td.status-cell { font-weight: 700; font-size: 12px; }
  .auction-summary-table td.status-cell.ok { color: var(--success); }
  .auction-summary-table td.status-cell.short { color: var(--danger); }
  .auction-summary-table td.status-cell.over { color: var(--accent); }
  .auction-summary-table td.status-cell.none { color: var(--muted); font-weight: 400; }

  .auction-warning {
    background: linear-gradient(135deg, rgba(248,81,73,0.1), rgba(255,179,71,0.1));
    border: 1px solid var(--danger);
    border-left: 4px solid var(--danger);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    margin-top: 10px;
  }
  .auction-warning b { color: var(--danger); }

  /* ===== Sub-field info boxes (auto 30% split) ===== */
  .auction-sub-boxes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 900px) { .auction-sub-boxes { grid-template-columns: 1fr; } }
  .auction-sub-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--col, var(--accent));
    border-radius: 8px;
    padding: 12px 14px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    grid-template-rows: auto auto;
    grid-template-areas:
      "icon label total"
      "icon label total";
    gap: 0 12px;
    align-items: center;
  }
  .auction-sub-box .asb-icon {
    grid-area: icon;
    font-size: 26px;
    line-height: 1;
  }
  .auction-sub-box .asb-label {
    grid-area: label;
    display: flex; flex-direction: column;
  }
  .auction-sub-box .asb-name {
    font-size: 13px; font-weight: 700; color: var(--text);
  }
  .auction-sub-box .asb-sub {
    font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .auction-sub-box .asb-val {
    grid-area: total;
    font-size: 24px; font-weight: 800;
    color: var(--col, var(--accent));
    text-align: right;
    font-family: monospace;
  }
  .auction-sub-box .asb-unit {
    font-size: 11px; font-weight: 400; color: var(--muted);
    margin-left: 2px;
  }

  /* ===== Auction columns (drag-drop assignment) ===== */
  .auction-columns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 1200px) { .auction-columns { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .auction-columns { grid-template-columns: 1fr; } }

  /* ===== Auction page-map (supply-based real auction pages) ===== */
  .ac-pagemap {
    font-size: 11px; font-weight: 700; color: var(--accent);
    text-align: center; padding: 3px 4px; margin-top: 2px;
    background: rgba(88,166,255,0.08); border-radius: 5px;
  }
  .ac-pagemap.empty { color: var(--muted); font-weight: 400; background: transparent; }
  /* Coverage line: how far the dragged people fill the column's pool pages */
  .ac-coverage {
    font-size: 11px; font-weight: 700; text-align: center;
    padding: 2px 4px; margin-top: 3px; border-radius: 5px;
  }
  .ac-coverage.none  { color: var(--muted); font-weight: 400; }
  .ac-coverage.short { color: #fb923c; background: rgba(249,115,22,0.10); }
  .ac-coverage.ok    { color: var(--success); background: rgba(34,197,94,0.10); }
  .ac-coverage.over  { color: var(--accent); background: rgba(88,166,255,0.10); }
  .auction-pagemap-strip {
    margin: 0 14px 12px; padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  }
  .auction-pagemap-strip.empty { color: var(--muted); font-size: 12px; text-align: center; }
  .auction-pagemap-strip .apm-head { font-size: 13px; margin-bottom: 8px; }
  .auction-pagemap-strip .apm-head b { color: var(--accent); }
  .auction-pagemap-strip .apm-sub { color: var(--muted); font-weight: 400; font-size: 11px; }
  .auction-pagemap-strip .apm-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .auction-pagemap-strip .apm-chip {
    font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 12px;
    color: var(--text); background: color-mix(in srgb, var(--col) 18%, transparent);
    border: 1px solid var(--col);
  }

  .auction-column {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 4px solid var(--col, var(--accent-2));
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  .auction-column .ac-head {
    background: var(--panel-2);
    padding: 9px 12px;
    font-weight: 700;
    font-size: 14px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .auction-column .ac-head .ac-rate {
    color: var(--muted); font-weight: 400; font-size: 11px;
    background: var(--bg-2); padding: 2px 8px; border-radius: 10px;
  }
  .auction-column .ac-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
    padding: 8px 10px;
    font-size: 11px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .auction-column .ac-stats > div { display: flex; flex-direction: column; gap: 1px; }
  .auction-column .ac-stats .ac-stat-label {
    color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .auction-column .ac-stats .ac-stat-val { font-weight: 700; font-size: 14px; }
  .auction-column .ac-status.short { color: var(--danger); }
  .auction-column .ac-status.ok { color: var(--success); }
  .auction-column .ac-status.over { color: var(--accent); }
  .auction-column .ac-status.none { color: var(--muted); font-size: 11px; font-weight: 400; }

  .auction-column .ac-droplist {
    flex: 1;
    padding: 8px;
    min-height: 200px;
    max-height: 55vh;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
    transition: background .15s;
  }
  .auction-column .ac-droplist.drag-over {
    background: rgba(251, 191, 36, 0.12);
    outline: 2px dashed #fbbf24;
    outline-offset: -4px;
  }

  .ac-empty {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 40px 10px;
    border: 2px dashed var(--border);
    border-radius: 6px;
    font-size: 12px;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .auction-assigned-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 9px;
    font-size: 12px;
    transition: border-color .12s, background .12s;
  }
  .auction-assigned-row:hover {
    border-color: var(--col, var(--accent));
    background: var(--bg-2);
  }
  .auction-assigned-row .aar-rk {
    color: var(--muted); font-size: 10px; font-weight: 700;
    width: 22px; text-align: right; font-family: monospace;
  }
  .auction-assigned-row .aar-info {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
  }
  .auction-assigned-row .aar-name {
    font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .auction-assigned-row .aar-job {
    color: var(--muted); font-size: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .auction-assigned-row .aar-del {
    color: var(--muted); cursor: pointer;
    padding: 2px 6px; border-radius: 3px;
    font-weight: 700; font-size: 14px; line-height: 1;
  }
  .auction-assigned-row .aar-del:hover {
    color: var(--danger); background: rgba(248, 81, 73, 0.1);
  }
  .auction-assigned-row .aar-page {
    display: inline-block;
    margin-top: 2px;
    font-size: 10px;
    font-weight: 700;
    color: #fbbf24;
    background: rgba(251, 191, 36, 0.12);
    border: 1px solid rgba(251, 191, 36, 0.35);
    padding: 1px 7px;
    border-radius: 10px;
    align-self: flex-start;
    letter-spacing: 0.3px;
  }
  /* Multi-segment badges (person spans pages) stack vertically */
  .auction-assigned-row .aar-page + .aar-page { margin-top: 2px; }

  .auction-column .ac-actions {
    padding: 7px 8px;
    display: flex; gap: 6px; justify-content: stretch;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
  }
  .auction-column .ac-actions button {
    flex: 1;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .auction-column .ac-actions button:hover {
    border-color: var(--col, var(--accent));
    background: var(--bg);
  }
  .auction-column .ac-actions button.danger { color: var(--muted); }
  .auction-column .ac-actions button.danger:hover {
    border-color: var(--danger); color: var(--danger);
  }

  /* ===== Summary view ===== */
  .summary-view {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    flex-shrink: 0;
  }
  .summary-total {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .summary-total .badges { display: flex; gap: 10px; }
  .summary-total .badges span {
    font-size: 12px; font-weight: 400;
    background: var(--panel-2);
    color: var(--text);
    padding: 3px 10px; border-radius: 10px;
  }
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 0;
  }
  /* Wrap table in scroll container at <=600px so it never overflows the
     viewport — falls back to native horizontal scroll if columns don't fit. */
  .summary-grid > table.summary-table {
    display: block; max-width: 100%; overflow-x: auto;
  }
  @media (min-width: 601px) {
    .summary-grid > table.summary-table { display: table; }
  }
  .summary-table th,
  .summary-table td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .summary-table th {
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--panel-2);
  }
  .summary-table td.count {
    font-weight: 700;
    color: var(--text);
    width: 80px;
    text-align: center;
  }
  .summary-table td.target { width: 110px; text-align: center; }
  .summary-table td.status-cell { width: 130px; text-align: center; font-weight: 700; }
  .summary-table tfoot tr { background: var(--panel-2); }
  .summary-table tfoot td {
    font-weight: 700; color: var(--accent);
    border-top: 2px solid var(--border-2);
    border-bottom: 0;
    padding: 10px 12px;
  }
  .summary-table tfoot td.label { color: var(--text); }
  .summary-table input[type="number"] {
    width: 80px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px; border-radius: 4px;
    font-size: 13px; text-align: center;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .summary-table input[type="number"]::-webkit-outer-spin-button,
  .summary-table input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .summary-table input[type="number"]:focus { border-color: var(--accent); outline: none; }
  .status-too-many { color: var(--danger); }
  .status-too-few { color: var(--accent-2); }
  .status-balanced { color: var(--success); }
  .status-none { color: var(--muted); font-weight: 400; }

  /* ===== GL Summary Dashboard ===== */
  .gl-dashboard { display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
  .gl-hero {
    background: linear-gradient(135deg, #0d2235 0%, #1a0f0f 100%);
    border: 1px solid var(--border-2);
    border-radius: 12px;
    padding: 22px 26px;
    position: relative; overflow: hidden;
  }
  .gl-hero::before {
    content: "🏆"; position: absolute; right: 24px; top: 16px;
    font-size: 72px; opacity: 0.15;
  }
  .gl-result-badge {
    display: inline-block;
    background: linear-gradient(135deg, #3fb950, #1d8d3a);
    color: white; padding: 4px 12px; border-radius: 5px;
    font-weight: 700; font-size: 11px; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .gl-result-badge.lose { background: linear-gradient(135deg, #f85149, #d11b1b); }
  .gl-hero h1 { margin: 0; font-size: 22px; font-weight: 800; }
  .gl-hero .gl-sub { color: var(--muted); font-size: 12px; }
  .gl-score-board {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 18px; align-items: center; margin-top: 18px;
  }
  .gl-team {
    background: rgba(0,0,0,0.35);
    border: 2px solid #1f6feb;
    border-radius: 10px;
    padding: 14px 18px;
  }
  .gl-team.them { border-color: #d11b1b; }
  .gl-team-name { font-size: 15px; font-weight: 700; }
  .gl-team.us .gl-team-name { color: #58a6ff; }
  .gl-team.them .gl-team-name { color: #f85149; }
  .gl-team-score { font-size: 36px; font-weight: 900; line-height: 1; margin: 2px 0; }
  .gl-team-sub { color: var(--muted); font-size: 11px; }
  .gl-vs { font-size: 24px; font-weight: 900; color: var(--muted); letter-spacing: 3px; }

  .gl-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 1000px) { .gl-grid-2 { grid-template-columns: 1fr; } }

  .gl-section {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .gl-section h3 {
    margin: 0 0 12px 0; font-size: 15px; color: var(--accent);
    display: flex; align-items: center; gap: 6px;
  }
  .gl-stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }
  .gl-stat-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .gl-stat-card .gl-stat-label {
    color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
  }
  .gl-stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 3px 0;
  }
  .gl-stat-row .name { font-size: 12px; color: var(--muted); }
  .gl-stat-row .us-v { color: #58a6ff; font-weight: 700; font-size: 17px; }
  .gl-stat-row .them-v { color: #f85149; font-weight: 700; font-size: 17px; }
  .gl-stat-bar {
    height: 5px; background: var(--bg);
    border-radius: 3px; overflow: hidden;
    margin-top: 6px; display: flex;
  }
  .gl-stat-bar .us-bar { background: #58a6ff; }
  .gl-stat-bar .them-bar { background: #f85149; }

  /* Bar chart (CSS based) */
  .gl-bar-row {
    display: grid; grid-template-columns: 90px 1fr 60px; gap: 8px;
    align-items: center; padding: 4px 0;
  }
  .gl-bar-row .label { font-size: 11px; color: var(--muted); }
  .gl-bar-row .value { font-weight: 700; text-align: right; font-family: monospace; font-size: 12px; }
  .gl-bar-row .bar {
    height: 16px; background: var(--bg); border-radius: 3px;
    position: relative; overflow: hidden;
  }
  .gl-bar-row .bar .fill {
    height: 100%; transition: width .3s;
  }
  .gl-bar-row.us .bar .fill { background: #58a6ff; }
  .gl-bar-row.them .bar .fill { background: #f85149; }

  /* Player table */
  .gl-ptable { width: 100%; border-collapse: collapse; font-size: 11px; }
  .gl-ptable th, .gl-ptable td {
    padding: 5px 8px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .gl-ptable th {
    background: var(--panel-2); color: var(--muted);
    font-size: 10px; text-transform: uppercase; font-weight: 600;
  }
  .gl-ptable .rk { width: 26px; color: var(--muted); font-weight: 700; }
  .gl-ptable .rk.r1 { color: #f1c40f; }
  .gl-ptable .rk.r2 { color: #c0c0c0; }
  .gl-ptable .rk.r3 { color: #cd7f32; }
  .gl-ptable td.score { text-align: right; font-weight: 700; font-family: monospace; }
  .gl-ptable.us td.score { color: #58a6ff; }
  .gl-ptable.them td.score { color: #f85149; }
  .gl-ptable .kad, .gl-ptable .fm {
    font-family: monospace; font-size: 10px; color: var(--muted);
  }
  .gl-ptable tr.under { background: rgba(248,81,73,0.08); }
  .gl-ptable tr.under .pname::after {
    content: " ⚠️"; color: var(--danger);
  }

  /* Under performance */
  .gl-underperf {
    background: linear-gradient(135deg, rgba(248,81,73,0.06), rgba(255,179,71,0.06));
    border: 1px solid var(--accent);
    border-left: 4px solid var(--accent);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .gl-underperf h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 15px; }
  .gl-under-list { list-style: none; padding: 0; margin: 6px 0; font-size: 12px; }
  .gl-under-list li {
    padding: 4px 0; border-bottom: 1px dashed var(--border);
  }
  .gl-under-list li:last-child { border-bottom: 0; }
  .gl-under-list .uname { font-weight: 700; }
  .gl-under-list .reason { color: var(--muted); font-size: 11px; }
  .gl-under-block { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
  @media (max-width: 900px) { .gl-under-block { grid-template-columns: 1fr; } }
  .gl-under-side h4 {
    margin: 0 0 6px 0; font-size: 13px;
  }
  .gl-under-side.us h4 { color: #58a6ff; }
  .gl-under-side.them h4 { color: #f85149; }

  /* Summary 2-column grid: table left, pie/AI right */
  .summary-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 1000px) { .summary-grid { grid-template-columns: 1fr; } }
  .summary-grid .summary-table { font-size: 12px; }
  .summary-grid .summary-table th,
  .summary-grid .summary-table td { padding: 6px 8px; }
  .summary-grid .summary-table td.count { width: 56px; }
  .summary-grid .summary-table td.target { width: 70px; }
  .summary-grid .summary-table td.status-cell { width: 100px; font-size: 12px; }
  .summary-grid .summary-table input[type="number"] { width: 56px; padding: 3px 4px; font-size: 12px; }
  .summary-side { display: flex; flex-direction: column; gap: 14px; }
  .pie {
    display: block;
    width: 100%;
    max-width: 260px;
    margin: 0 auto;
  }
  .pie path { transition: opacity .15s; }
  .pie path:hover { opacity: 0.8; }
  .pie-legend {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 4px 10px;
    font-size: 11px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .pie-legend span {
    display: flex; align-items: center; gap: 6px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pie-legend span::before {
    content: ""; flex: 0 0 10px;
    width: 10px; height: 10px;
    background: var(--c, var(--muted));
    border-radius: 2px;
  }
  .ai-comment {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
  }
  .ai-comment .ai-title {
    font-weight: 700; color: var(--accent);
    margin-bottom: 8px;
    font-size: 13px;
    display: flex; align-items: center; gap: 6px;
  }
  .ai-comment .ai-line { margin-bottom: 2px; }
  .ai-comment .ai-sub { color: var(--muted); padding-left: 16px; font-size: 11px; }
  .ai-comment b.too-many { color: var(--danger); }
  .ai-comment b.too-few { color: var(--accent-2); }
  .ai-comment b.balanced { color: var(--success); }

  /* ===== Overrun layout ===== */
  /* Masonry via CSS columns (2026-06-12): cards size to their CONTENT and
     the two columns auto-balance — a 2-party card no longer stretches to
     match a 4-party neighbor (the hollow-card look), and the small groups
     pack together instead of leaving a half-empty last row. */
  .overrun {
    columns: 2;
    column-gap: 10px;
    flex-shrink: 0;
    /* cancel the last card's margin-bottom so the cards→map gap keeps the
       page-wide 10px rhythm (multicol is its own formatting context — the
       trailing margin would otherwise stack with .center's gap) */
    margin-bottom: -10px;
  }
  .overrun .bg-card {
    break-inside: avoid;
    margin-bottom: 10px;
  }
  @media (max-width: 1100px) {
    .overrun { columns: 1; }
  }
  .bg-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gc, var(--accent));
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .bg-head {
    padding: 8px 12px;
    background: var(--gc, var(--main-bf));
    color: white;
    font-weight: 700;
    font-size: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .bg-head .count {
    font-size: 11px; background: rgba(0,0,0,0.3);
    padding: 2px 8px; border-radius: 10px; font-weight: 400;
  }

  /* ===== Main grid ===== */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    height: calc(100vh - 44px);
    overflow: hidden;
  }
  @media (max-width: 1400px) {
    .layout { grid-template-columns: 220px 1fr; }
  }

  /* ===== Sidebar ===== */
  .sidebar {
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar h3 {
    margin: 0; padding: 10px 12px;
    font-size: 13px; color: var(--text);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar .filters {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }
  .sidebar select, .sidebar input {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 8px; border-radius: 4px;
    font-size: 12px; width: 100%;
  }
  .sidebar .filters label.toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 2px;
    line-height: 1.3;
    user-select: none;
    transition: color .12s;
  }
  .sidebar .filters label.toggle:hover { color: var(--text); }
  .sidebar .filters label.toggle input[type="checkbox"] {
    flex: 0 0 14px;
    width: 14px; height: 14px;
    margin: 0; padding: 0;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .sidebar .filters label.toggle span {
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .member-list {
    flex: 1; overflow-y: auto;
    padding: 4px;
  }
  .member-row {
    display: grid; grid-template-columns: 80px 1fr auto;
    align-items: center;
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    cursor: grab; font-size: 12px;
    transition: background .1s;
  }
  .member-row:hover { background: var(--panel); }
  .member-row.assigned { opacity: 0.35; }
  /* In auction mode, the same person CAN be in multiple buckets — so the
     row stays full opacity (so they look draggable) and a gold count badge
     shows how many buckets they're in. */
  .member-row.in-auction { border-left: 3px solid #fbbf24; }
  .member-row .auction-count {
    display: inline-block;
    background: #fbbf24; color: #0d1117;
    font-size: 9px; font-weight: 800;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 4px;
    line-height: 1.3;
  }
  .member-row.dragging { opacity: 0.4; }
  .member-row .mjob {
    color: var(--accent);
    font-size: 11px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .member-row .mname {
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .member-list::-webkit-scrollbar { width: 8px; }
  .member-list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
  /* --- on-leave (League + Overrun) --- */
  .member-row.on-leave { opacity: 0.55; cursor: grab; }
  .member-row.on-leave .mname { text-decoration: line-through; }
  .leave-badge {
    display: inline-block; font-size: 10px; font-weight: 700; color: #fff;
    background: #f59e0b; padding: 1px 6px; border-radius: 999px; margin-left: 6px;
  }
  .slot.filled.slot-onleave {
    outline: 2px solid #ef4444; outline-offset: -2px; background: rgba(239,68,68,0.15);
  }
  .slot .slot-leave-btn {
    position: absolute; top: 2px; left: 2px; z-index: 3;
    font-size: 9px; font-weight: 700; line-height: 1.4;
    color: var(--muted); background: var(--bg-2);
    border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px;
    cursor: pointer; opacity: 0; transition: opacity .1s;
  }
  .slot.filled:hover .slot-leave-btn { opacity: 0.92; }
  .slot.filled.slot-onleave .slot-leave-btn {
    opacity: 1; color: #fff; background: #ef4444; border-color: #ef4444;
  }

  /* ===== Center battlefields ===== */
  .center {
    overflow-y: auto;
    padding: 10px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .center::-webkit-scrollbar { width: 10px; }
  .center::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

  .bf {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;                /* don't squish – show all rows */
  }
  .bf-head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--main-bf);
    color: white;
    font-weight: 600;
    font-size: 13px;
  }
  .bf.sub .bf-head { background: var(--sub-bf); }
  .bf-head .count {
    font-size: 11px; background: rgba(0,0,0,0.25);
    padding: 2px 8px; border-radius: 10px;
    font-weight: 400;
  }
  .bf-head .spacer { flex: 1; }
  .bf-summary {
    padding: 8px 12px;
    border-top: 1px dashed var(--border);
    background: var(--panel-2);
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center;
    font-size: 11px;
  }
  .bf-job-pill {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .bf-job-pill b { color: var(--accent); font-weight: 700; }
  .bf-job-total {
    margin-left: auto;
    color: var(--text); font-weight: 700;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    padding: 3px 10px; border-radius: 12px;
  }
  .bf-summary.empty {
    color: var(--muted); font-style: italic; justify-content: center;
  }

  .party-row {
    display: grid;
    grid-template-columns: 40px repeat(5, 1fr) 28px;
    border-top: 1px solid var(--border);
    min-height: 44px;
  }
  .party-num {
    background: var(--panel-2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    border-right: 1px solid var(--border);
    cursor: grab;
    color: var(--accent-2);
    user-select: none;
  }
  .party-num.dragging { background: var(--accent-2); color: #000; }
  .bf.sub .party-num { color: var(--sub-bf); }
  .slot {
    border-right: 1px solid var(--border);
    padding: 5px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-height: 56px;
    background: var(--panel);
    position: relative;
    cursor: pointer;
    text-align: center;
  }
  .slot.empty { background: var(--bg-2); color: var(--muted); font-style: italic; font-size: 11px; justify-content: center; }
  .slot.drag-over { background: rgba(88, 166, 255, 0.2); outline: 2px dashed var(--accent); outline-offset: -2px; }
  .slot .slot-job {
    font-size: 10px; color: var(--accent);
    background: rgba(88,166,255,0.12);
    padding: 1px 6px; border-radius: 3px;
    white-space: nowrap;
  }
  .slot .slot-info {
    display: flex; flex-direction: column;
    align-items: center;
    width: 100%;
    min-width: 0;
    gap: 1px;
    line-height: 1.15;
  }
  .slot .slot-name {
    font-size: 12px;
    font-weight: 600;
    max-width: 100%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    text-align: center;
  }
  .slot .slot-cp {
    font-size: 10px;
    color: var(--accent-2);
    font-weight: 700;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    letter-spacing: 0.3px;
    text-align: center;
  }
  .slot.filled { cursor: grab; }
  .slot.filled.dragging { opacity: 0.4; }
  .slot .slot-del {
    position: absolute; top: 2px; right: 2px;
    color: var(--danger);
    opacity: 0;
    font-size: 14px; cursor: pointer;
    width: 18px; height: 18px;
    line-height: 18px; text-align: center;
    border-radius: 3px;
  }
  .slot:hover .slot-del { opacity: 1; }
  .slot .slot-del:hover { background: rgba(248,81,73,0.2); }
  .party-actions {
    background: var(--panel-2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted);
    font-size: 13px;
  }
  .party-actions:hover { color: var(--danger); background: rgba(248,81,73,0.15); }

  /* Per-party row trailing-button cluster: 🔀 sort + ✕ clear. The wrapper
     adopts the same grid-area as .party-actions used to live in, so the
     mobile party-row layout (which positions clear via grid-area) still
     works with the wrapper substituted in. */
  .party-row-actions {
    display: flex; align-items: stretch; background: var(--panel-2);
  }
  .party-row-actions .party-actions { background: transparent; }
  .party-sort {
    background: transparent; border: 0; color: var(--muted);
    padding: 0 8px; cursor: pointer; font-size: 14px;
    border-right: 1px solid var(--border);
  }
  .party-sort:hover { color: #60a5fa; background: rgba(96,165,250,0.12); }
  body.viewer-mode .party-sort { display: none; }
  .header-sort-btn {
    background: rgba(96,165,250,0.18); color: #fff;
    border: 1px solid #60a5fa; border-radius: 6px;
    padding: 3px 10px; font-size: 11px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .header-sort-btn:hover { background: rgba(96,165,250,0.32); }
  body.viewer-mode .header-sort-btn { display: none; }

  /* ===== Maps (inline in scrolling center) ===== */
  .maps-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex-shrink: 0;
  }
  .maps-row > .map-card { min-width: 0; }
  .maps-row .map-wrap {
    /* override per-card cap so each map fills its column */
    max-width: 100%;
    max-height: 65vh;
    min-height: 280px;
  }
  @media (max-width: 1100px) {
    .maps-row { grid-template-columns: 1fr; }
  }
  .map-card {
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    overflow: hidden;
    flex-shrink: 0;                /* don't squish – natural size */
  }
  .map-card .map-title {
    padding: 8px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600;
    gap: 6px;
  }
  .map-card .map-title.main { color: var(--main-bf); }
  .map-card .map-title.sub { color: var(--sub-bf); }
  .map-card .map-title.overrun-map {
    color: #fff;
    background: linear-gradient(90deg, #ef4444, #eab308 25%, #22c55e 50%, #3b82f6 75%, #a855f7);
  }
  .map-card .map-title .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .map-card .map-title button {
    background: var(--bg-2); padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border); cursor: pointer; font-size: 11px;
    color: var(--text); font-weight: 400;
  }
  .map-card .map-title button:hover { border-color: var(--accent); }
  /* Map filter dropdown — focus on one team on the map. Stays the same
     neutral color regardless of selection (kept consistent on user
     request — colored highlight was hard to read). */
  .map-card .map-title .map-filter-select {
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 6px; font-size: 11px; font-family: inherit;
    max-width: 180px;
  }
  .map-card .map-title .map-filter-select:focus { outline: none; border-color: var(--accent); }

  /* Fullscreen map modal */
  .map-card-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 1999;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  .map-card.fullscreen {
    position: fixed !important;
    inset: 20px !important;
    z-index: 2000 !important;
    background: var(--bg-2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    display: flex; flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,0.8);
    overflow: hidden;
    margin: 0 !important;
    max-width: none !important;
  }
  .map-card.fullscreen .map-title { flex-shrink: 0; }
  .map-card.fullscreen .map-wrap {
    width: min(calc(100vw - 60px), calc(100vh - 110px)) !important;
    height: min(calc(100vw - 60px), calc(100vh - 110px)) !important;
    max-width: none !important;
    max-height: none !important;
    min-height: 0 !important;
    aspect-ratio: 1 / 1 !important;
    margin: auto !important;
    flex: 0 0 auto;
  }
  /* Overrun map in fullscreen — fit modal preserving aspect */
  .map-card.fullscreen .map-wrap.overrun-wrap {
    width: calc(100vw - 60px) !important;
    height: auto !important;
    max-height: calc(100vh - 110px) !important;
    aspect-ratio: var(--map-ar, 16/9) !important;
    max-width: calc((100vh - 110px) * var(--map-ar, 1.78)) !important;
    margin: auto !important;
  }

  .map-wrap {
    position: relative;
    background-color: #0a0e13;
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    user-select: none;
    overflow: hidden;
    /* League maps: locked 1:1 square, capped at viewport */
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 65vh;
    max-height: 65vh;
    min-height: 320px;
    margin: 0 auto;
  }
  /* Overrun map: single image, follows natural aspect-ratio */
  .map-wrap.overrun-wrap {
    aspect-ratio: var(--map-ar, 16/9);
    max-width: 100%;
    max-height: 70vh;
    min-height: 400px;
  }
  /* Constrain only to 700–900px (tablet) since mobile <700px overrides with 1fr */
  @media (max-width: 900px) and (min-width: 701px) {
    .layout { grid-template-columns: 180px 1fr; }
    .party-row { grid-template-columns: 32px repeat(5, minmax(0,1fr)) 24px; font-size: 11px; }
    .slot { padding: 3px 4px; min-height: 38px; }
    .slot .slot-name { font-size: 11px; }
    .map-wrap { min-height: 220px; max-width: 60vh; max-height: 60vh; }
  }
  @media (max-width: 700px) {
    .party-row { grid-template-columns: 32px repeat(5, minmax(0,1fr)) 24px; font-size: 11px; }
    .slot { padding: 3px 4px; min-height: 38px; }
    .slot .slot-name { font-size: 11px; }
  }
  .map-frame {
    position: absolute; inset: 0;
    border: 2px solid var(--accent);
    border-radius: 4px;
    pointer-events: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .map-wrap.sub-map .map-frame { border-color: var(--sub-bf); }
  .map-wrap.no-image .map-frame { border-color: var(--border); border-style: dashed; }
  .map-wrap.no-image::after {
    content: var(--map-loading-label, "🗺️ …");
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; text-align: center; padding: 30px;
  }
  /* SVG arrow overlay */
  .map-arrows {
    position: absolute; inset: 0;
    pointer-events: none;
    width: 100%; height: 100%;
  }
  /* Range circles (GL Main map zones). Drawn in the SVG overlay; the rings are
     non-interactive, the handles opt back into pointer events so admins can grab. */
  .rc-ring {
    fill: rgba(217,181,107,0.10);
    stroke: var(--gold, #d9b56b);
    stroke-width: 2;
    stroke-dasharray: 5 4;
    pointer-events: none;
  }
  .rc-handle {
    fill: var(--gold, #d9b56b);
    stroke: #1a1500;
    stroke-width: 1.5;
    pointer-events: auto;
    cursor: grab;
  }
  .rc-handle.resize { cursor: nesw-resize; }
  .rc-handle:hover { fill: var(--gold-2, #f0d896); }
  /* Map header range toggle, lit when circles are on */
  .map-title .rc-toggle-on { background: var(--gold, #d9b56b); color: #1a1500; }
  /* Multi-select map filter chips — click several party/group chips to view them
     together; empty = all. Active chips get their team color inline (see buildMapHtml). */
  .map-filter-chips { display: inline-flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .map-filter-chip {
    padding: 2px 8px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--text); font-size: 11px; font-weight: 600;
    cursor: pointer; line-height: 1.6;
  }
  .map-filter-chip:hover { border-color: var(--accent); }
  .map-filter-chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }
  .map-readonly-hint { color: var(--muted); font-size: 11px; white-space: nowrap; align-self: center; }
  .map-arrows line {
    stroke-width: 2.5;
    stroke-dasharray: 6 4;
    stroke-linecap: round;
    opacity: 0.95;
    animation: dashflow 0.8s linear infinite;
  }
  @keyframes dashflow {
    to { stroke-dashoffset: -10; }
  }
  .map-arrows .anchor-dot {
    fill: rgba(0,0,0,0.4);
    stroke-width: 2;
  }
  .marker {
    position: absolute;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--main-bf);
    color: white;
    font-weight: 700;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: grab;
    transform: translate(-50%, -50%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.7);
    user-select: none;
    transition: transform .08s;
    z-index: 2;
  }
  .marker.sub { background: var(--sub-bf); }
  .marker:hover { transform: translate(-50%, -50%) scale(1.1); }
  .marker.dragging { cursor: grabbing; transform: translate(-50%, -50%) scale(1.18); z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,0.8); }
  .marker.empty { opacity: 0.55; }
  .marker.has-anchor::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    animation: pulse 1.6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.18); opacity: 0.25; }
  }

  /* ===== Dialog ===== */
  dialog {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    min-width: 360px;
    max-width: 90vw;
  }
  dialog::backdrop { background: rgba(0,0,0,0.7); }
  dialog h3 { margin: 0 0 12px 0; color: var(--accent); }
  dialog textarea, dialog input {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px;
    font-family: monospace;
    font-size: 12px;
    width: 100%;
  }
  dialog textarea { height: 220px; resize: vertical; }
  dialog .row { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  dialog button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 12px;
  }
  dialog button.primary { background: var(--accent); color: white; border-color: var(--accent); }

  /* ===== Custom tooltip (persists during drag) ===== */
  .gtooltip {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    background: rgba(28, 33, 40, 0.97);
    color: var(--text);
    border: 1px solid var(--border-2);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    white-space: pre-line;
    box-shadow: 0 6px 20px rgba(0,0,0,0.7);
    opacity: 0;
    transition: opacity .1s;
    max-width: 280px;
    line-height: 1.55;
    min-width: 160px;
  }
  .gtooltip.show { opacity: 1; }
  .gtooltip .tip-title {
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .gtooltip .tip-row { font-size: 11px; color: var(--muted); padding: 1px 0; }
  .gtooltip .tip-row b { color: var(--text); font-weight: 600; }
  .gtooltip .tip-empty { color: var(--muted); font-style: italic; font-size: 11px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 18px; border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    z-index: 1000;
    font-size: 13px;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--success); color: var(--success); }

  /* ==========================================================
     RESPONSIVE LAYOUT — hamburger sidebar + mobile tweaks
     ========================================================== */

  /* Hamburger button: hidden on desktop, shown on mobile */
  .hamburger-btn {
    display: none;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
  }
  .hamburger-btn:hover { background: var(--panel-2); border-color: var(--accent); }

  /* Roster mode doesn't need the member sidebar — give content full width.
     Applies on every breakpoint (desktop + tablet + mobile). */
  body[data-mode="roster"] .sidebar         { display: none; }
  body[data-mode="roster"] .layout          { grid-template-columns: 1fr !important; }
  body[data-mode="roster"] .hamburger-btn   { display: none; }
  body[data-mode="roster"] .sidebar-backdrop { display: none !important; }

  /* Mobile mode dropdown — replaces .mode-toggle below 700px */
  .mode-select {
    display: none;
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    padding: 5px 28px 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23fff' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }
  .mode-select option { background: var(--bg-2); color: var(--text); }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 44px 0 0 0;
    background: rgba(0,0,0,0.55);
    z-index: 98;
    animation: fadeIn .2s ease;
  }
  body.sidebar-open .sidebar-backdrop { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }

  /* ===== Tablet (≤1100px) ===== */
  @media (max-width: 1100px) {
    body { font-size: 12px; }
    .layout { grid-template-columns: 210px 1fr; }
    header { gap: 6px; }
    header .brand { font-size: 13px; }
    .mode-toggle .seg { font-size: 11px; padding: 4px 9px; }
    header button { padding: 4px 8px; font-size: 11px; }
  }

  /* ===== Mobile (≤700px) — hamburger overlay sidebar ===== */
  @media (max-width: 700px) {
    .hamburger-btn { display: inline-flex; align-items: center; justify-content: center; min-width: 34px; padding: 4px 8px; }

    header { padding: 0 6px; gap: 4px; }
    header .brand { display: none; }                  /* hamburger replaces */
    header .spacer { display: none; }
    header .status { display: none; }                 /* member count — view in sidebar */

    header #btnSyncSettings { font-size: 11px; padding: 4px 8px; }
    header .sync-indicator {
      font-size: 10px; padding: 3px 6px;
      max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* On mobile, replace the 6-tab toggle with a compact <select> dropdown */
    .mode-toggle { display: none; }
    .mode-select { display: inline-block; flex: 1 1 auto; min-width: 0; max-width: 240px; }

    /* Sidebar becomes overlay: hidden by default, slides in on .sidebar-open */
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      top: 44px; left: 0; bottom: 0;
      width: 280px; max-width: 80vw;
      z-index: 99;
      transform: translateX(-100%);
      transition: transform .25s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.6);
    }
    body.sidebar-open .sidebar { transform: translateX(0); }

    /* Center area: full width on mobile */
    .center { padding: 8px; gap: 10px; }
    .center > * { min-width: 0; }    /* prevent overflow on flex children */

    /* Auction inputs/columns: 1 col stack on mobile */
    .auction-inputs { grid-template-columns: 1fr !important; gap: 8px; }
    .auction-columns { grid-template-columns: 1fr !important; gap: 8px; }
    .auction-sub-boxes { grid-template-columns: 1fr !important; }
    .auction-summary-table { font-size: 11px; }
    .auction-summary-table th, .auction-summary-table td { padding: 5px 4px; }
    .auction-input-card input { font-size: 18px; padding: 8px 10px; }

    /* Roster table: card layout per row on mobile — each row stacks vertically
       so all 4 fields are visible without horizontal scroll */
    .roster-table-wrap { overflow: visible; }
    .roster-table { min-width: 0; }
    .roster-table thead { display: none; }   /* header redundant in card layout */
    .roster-table tbody tr { display: block; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .roster-table tbody tr:hover td { background: transparent; }
    .roster-table tbody td { display: block; padding: 3px 0; border: none; }
    .roster-table td.r-rk {
      display: inline-block; width: auto;
      margin-right: 8px;
      background: var(--panel); padding: 2px 8px; border-radius: 10px;
      font-size: 11px; color: var(--accent);
    }
    .roster-table td.r-actions {
      display: inline-block; width: auto;
      float: right;
    }
    /* Add a small "label" before each input via data-label on the cell */
    .roster-table tbody td:not(.r-rk):not(.r-actions)::before {
      content: attr(data-label);
      display: inline-block;
      width: 70px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      vertical-align: middle;
    }
    .roster-table input.r-input { font-size: 12px; padding: 5px 7px; width: calc(100% - 80px); }
    .roster-table input.r-input.r-cp { text-align: left; }
    .roster-table .r-cell-static { display: inline-block; vertical-align: middle; }
    .roster-table .r-cell-static.r-cp-static { text-align: left; }
    .roster-table tbody tr.r-mine { border-left: 2px solid #10b981; }
    .roster-claim { width: 100%; }
    .roster-claim select { flex: 1; max-width: none; min-width: 0; }
    .roster-toolbar { flex-direction: column; align-items: stretch; gap: 6px; }
    .roster-toolbar input.r-search { min-width: 0; }
    .roster-toolbar button { padding: 8px 10px; font-size: 12px; }

    /* Compact hero: stack pills horizontally with smaller text */
    .roster-hero { padding: 10px 12px; gap: 8px; }
    .roster-hero h2 { font-size: 14px; margin: 0; }
    .roster-hero > div[style*="flex:1"] { display: none; }   /* spacer */
    .roster-hero .roster-meta { font-size: 10px; gap: 4px; width: 100%; }
    .roster-hero .rate-pill { padding: 2px 7px; font-size: 10px; }

    /* Summary view (Members tab): single column */
    .summary-grid { grid-template-columns: 1fr !important; }
    .summary-table { font-size: 11px; }
    .summary-table th, .summary-table td { padding: 5px 6px; }

    /* GL Battle summary (League) layout collapse */
    .gl-score-board { grid-template-columns: 1fr; gap: 8px; }
    .gl-stat-grid { grid-template-columns: 1fr; }
    .gl-grid-2, .gl-under-block { grid-template-columns: 1fr; }

    /* Party layout (League/Overrun): vertical card per party.
       Header row = party-num + clear button side-by-side.
       Below = 5 slots stacked full-width for easy reading + drag-drop. */
    .party-row {
      grid-template-columns: 1fr 72px;
      grid-template-rows: 30px repeat(5, auto);
      grid-template-areas:
        "num    clear"
        "s0     s0"
        "s1     s1"
        "s2     s2"
        "s3     s3"
        "s4     s4";
      gap: 0;
      border-top: 2px solid var(--border-2);
    }
    .party-row > .party-num         { grid-area: num; }
    .party-row > .party-row-actions { grid-area: clear; }
    /* Slots are direct children in source order (party-num, slot1..5, clear).
       Use :nth-child to map to grid-areas s0..s4. */
    .party-row > .slot:nth-child(2) { grid-area: s0; }
    .party-row > .slot:nth-child(3) { grid-area: s1; }
    .party-row > .slot:nth-child(4) { grid-area: s2; }
    .party-row > .slot:nth-child(5) { grid-area: s3; }
    .party-row > .slot:nth-child(6) { grid-area: s4; }
    .party-row > .party-num {
      justify-content: flex-start;
      padding: 0 12px;
      font-size: 13px;
      letter-spacing: 0.3px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      border-right: 0;
    }
    .party-row > .party-num::before { content: "Party "; opacity: 0.55; font-weight: 500; margin-right: 4px; }
    .party-row > .party-actions {
      background: transparent;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      opacity: 0.6;
    }
    .party-row > .party-actions:hover { opacity: 1; }
    .party-row > .slot {
      flex-direction: row;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      min-height: 40px;
      border-right: 0;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .party-row > .slot.empty { padding: 6px 12px; min-height: 30px; justify-content: center; }
    .party-row > .slot.filled .slot-job { flex-shrink: 0; }
    .party-row > .slot.filled .slot-info {
      flex-direction: row;
      flex: 1;
      align-items: center;
      gap: 8px;
      text-align: left;
    }
    .party-row > .slot.filled .slot-name { text-align: left; font-size: 13px; }
    .party-row > .slot.filled .slot-cp { font-size: 11px; flex-shrink: 0; }
    .party-row > .slot .slot-del {
      opacity: 1;   /* always visible on mobile (no hover) */
      font-size: 16px;
      width: 24px; height: 24px;
      line-height: 24px;
      top: 50%; right: 8px;
      transform: translateY(-50%);
    }
    .party-row > .slot .slot-leave-btn {
      position: absolute;
      top: 50%; left: 8px;
      transform: translateY(-50%);
      opacity: 1;   /* always visible on mobile */
    }
    .party-row > .slot.filled { padding-left: 48px; padding-right: 42px; }  /* room for leave + del buttons */
    .party-row > .slot.filled:not(.slot-onleave) .slot-leave-btn { opacity: 0.7; }

    .bg-card { font-size: 11px; }
    .overrun { columns: 1; }
    /* Job summary pills below each party tighter on mobile */
    .bf-summary, .bg-card .bf-summary { padding: 6px 10px; font-size: 10px; }
    .bf-job-pill { font-size: 10px; padding: 1px 6px; }
    /* Battlefield header (Main / Sub) — wrap if needed */
    .bf-head, .bg-head { padding: 7px 10px; font-size: 12px; flex-wrap: wrap; }
    .bf-head .count, .bg-head .count { font-size: 10px; }

    /* Auction assigned row: tighter */
    .auction-assigned-row { font-size: 11px; padding: 4px 6px; }
    .auction-assigned-row .aar-name { font-size: 12px; }
    .auction-assigned-row .aar-job  { font-size: 9px; }
    .auction-assigned-row .aar-page { font-size: 9px; padding: 1px 5px; }

    /* Sidebar tweaks on mobile */
    .sidebar { padding: 10px; gap: 8px; }
    .sidebar h3 { font-size: 13px; }
    .member-row { padding: 6px 8px; }
    .member-row .mname { font-size: 13px; }     /* easier to tap */

    /* Dialogs full-width on mobile */
    dialog { width: 92vw; max-width: 92vw; }
  }

  /* ===== Mobile polish (≤700px) — Auction/GL/Leave page tweaks ====== */
  /* This block consolidates per-section fixes for the auction view, GL stat
     board, leave page, and tap-target sizing. Lives AFTER the major 700px
     block so it takes precedence on overlapping selectors. */
  @media (max-width: 700px) {
    /* Header: tighter on small screens but keep mode-select usable */
    header { padding: 0 6px; gap: 4px; }
    header #statusInfo { display: none; }   /* member count is in sidebar */
    .mode-select { font-size: 12px; padding: 4px 6px; }

    /* Auction hero: stack title above meta pills, less padding */
    .auction-hero { padding: 12px 14px; gap: 8px; }
    .auction-hero h2 { font-size: 16px; }
    .auction-hero .auction-meta { font-size: 11px; gap: 6px 10px; }
    .auction-hero .rate-pill { padding: 2px 8px; font-size: 10px; }
    .auction-section { padding: 12px 14px; }
    .auction-section h3 { font-size: 14px; margin-bottom: 10px; }

    /* Auction inputs (rates) */
    .auction-input-card { padding: 10px 12px; }
    .auction-input-card input { font-size: 18px; padding: 8px 10px; }

    /* Auction sub-boxes (70/30 split for GL) — compact internal layout */
    .auction-sub-box { padding: 10px 12px; }
    .auction-sub-box .asb-icon { font-size: 22px; }
    .auction-sub-box .asb-name { font-size: 12px; }
    .auction-sub-box .asb-val  { font-size: 20px; }

    /* Auction columns (drag-drop) — tighter chrome, taller drop area */
    .auction-column .ac-head { padding: 8px 10px; font-size: 13px; }
    .auction-column .ac-stats { padding: 6px 8px; gap: 2px; }
    .auction-column .ac-stats .ac-stat-val { font-size: 12px; }
    .auction-column .ac-stats .ac-stat-label { font-size: 8px; }
    .auction-column .ac-droplist { min-height: 120px; max-height: 50vh; padding: 6px; }
    .auction-column .ac-actions { padding: 6px; gap: 4px; }
    .auction-column .ac-actions button { font-size: 11px; padding: 6px 4px; }

    /* Assigned rows inside auction column */
    .auction-assigned-row { padding: 6px 8px; }
    .auction-assigned-row .aar-rk { width: 18px; font-size: 9px; }
    .auction-assigned-row .aar-name { font-size: 12px; }
    .auction-assigned-row .aar-job { font-size: 9px; }
    .auction-assigned-row .aar-page { font-size: 9px; padding: 1px 5px; }
    .auction-assigned-row .aar-del { padding: 4px 8px; font-size: 16px; }   /* bigger tap target */

    /* Search input full width */
    .auction-search-input { max-width: 100%; padding: 8px 10px; font-size: 13px; }

    /* Auction summary table: compact font, scroll horizontally if overflow */
    .auction-summary-table { font-size: 11px; }
    .auction-summary-table th, .auction-summary-table td { padding: 6px 4px; }

    /* GL score board on League: stack us / vs / them vertically */
    .gl-score-board { grid-template-columns: 1fr; gap: 8px; margin-top: 12px; }
    .gl-team { padding: 10px 12px; }
    .gl-team-score { font-size: 28px; }
    .gl-vs { display: none; }    /* vertical layout doesn't need separator */

    /* GL section + stat cards */
    .gl-section { padding: 12px 14px; }
    .gl-section h3 { font-size: 14px; margin-bottom: 8px; }
    .gl-stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .gl-stat-card { padding: 10px 12px; }
    .gl-stat-row .us-v, .gl-stat-row .them-v { font-size: 14px; }
    .gl-bar-row { grid-template-columns: 70px 1fr 50px; gap: 6px; }
    .gl-bar-row .label { font-size: 10px; }
    .gl-bar-row .value { font-size: 11px; }

    /* GL player table (kills/deaths) — keep readable */
    .gl-ptable { font-size: 10px; }
    .gl-ptable th, .gl-ptable td { padding: 4px 5px; }

    /* GL underperformance */
    .gl-underperf { padding: 12px 14px; }

    /* Pie chart + legend (in Roster job breakdown) */
    .pie { max-width: 200px; }
    .pie-legend { grid-template-columns: 1fr 1fr; font-size: 10px; padding: 6px 8px; }

    /* AI comment compact */
    .ai-comment { padding: 10px 12px; font-size: 11px; }
    .ai-comment .ai-title { font-size: 12px; margin-bottom: 6px; }

    /* Auction warning */
    .auction-warning { padding: 8px 12px; font-size: 12px; }
  }

  /* ===== Small mobile (≤480px) — extreme tweaks ===== */
  @media (max-width: 480px) {
    .mode-toggle .seg { padding: 3px 6px; font-size: 9px; }
    header { padding: 0 4px; gap: 3px; }
    header .sync-indicator {
      max-width: 80px;
      font-size: 9px;
    }
    header #btnSyncSettings { font-size: 0; padding: 4px; min-width: 30px; }
    header #btnSyncSettings::before { content: "🔗"; font-size: 13px; }
    .auction-hero { padding: 10px 12px; }
    .auction-hero h2 { font-size: 14px; }
    .auction-section { padding: 10px 12px; }
    .auction-section h3 { font-size: 13px; }
    /* Auction inputs: even smaller font for the rate fields */
    .auction-input-card { padding: 8px 10px; }
    .auction-input-card input { font-size: 16px; padding: 7px 8px; }
    .auction-input-card .ai-label { font-size: 10px; }
    /* Auction columns: keep 3-col stats but smaller */
    .auction-column .ac-head { font-size: 12px; padding: 7px 10px; }
    .auction-column .ac-stats .ac-stat-val { font-size: 11px; }
    /* Make tap targets bigger */
    .auction-column .ac-actions button { padding: 7px 8px; font-size: 11px; }
    .roster-table button.r-del { width: 34px; height: 34px; font-size: 16px; }
    .member-row { padding: 8px 10px; min-height: 40px; }
    /* Roster hero: simpler */
    .roster-hero h2 { font-size: 13px; }
    .roster-hero .rate-pill { font-size: 9px; padding: 2px 6px; }
    /* Leave page: tighter hero on micro screens */
    .leave-hero { padding: 8px 10px; }
    .leave-hero h2 { font-size: 14px; }
    .leave-hero .leave-today { font-size: 10px; padding: 3px 8px; }
    /* GL stat grid: single col on tiny screens */
    .gl-stat-grid { grid-template-columns: 1fr; }
    /* Sub-box label hide subtitle on micro */
    .auction-sub-box .asb-sub { display: none; }
    .auction-sub-box .asb-val { font-size: 18px; }
    /* Pie chart: smaller */
    .pie { max-width: 160px; }
    .pie-legend { grid-template-columns: 1fr; }
  }

  /* ===== Help page ===== */
  body[data-mode="help"] .sidebar          { display: none; }
  body[data-mode="help"] .layout           { grid-template-columns: 1fr !important; }
  body[data-mode="help"] .hamburger-btn    { display: none; }
  body[data-mode="help"] .sidebar-backdrop { display: none !important; }

  .help-view { display: flex; flex-direction: column; gap: 18px; max-width: 900px; margin: 0 auto; padding-bottom: 32px; }
  .help-hero {
    background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
    border: 1px solid var(--border);
    border-left: 4px solid #38bdf8;
    border-radius: 10px;
    padding: 18px 22px;
  }
  .help-hero h2 { margin: 0 0 6px 0; color: #7dd3fc; font-size: 20px; }
  .help-hero p  { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.55; }

  .help-section-title {
    font-size: 15px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 4px 0 0 0;
  }
  .help-rules-box {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; display: flex; flex-direction: column; gap: 6px;
  }
  .help-rules-box h3 { margin: 0 0 8px 0; font-size: 14px; color: var(--text); }
  .help-rule-row { display: flex; gap: 10px; align-items: baseline; font-size: 13px; color: var(--text); }
  .help-rule-label { color: var(--muted); min-width: 140px; font-size: 12px; }

  .help-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .help-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
  }
  .help-card-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700; color: var(--text); margin: 0;
  }

  "#ef4444", "#f97316", "#f59e0b", "#eab308",
  "#84cc16", "#22c55e", "#10b981", "#14b8a6",
  "#06b6d4", "#0ea5e9", "#3b82f6", "#6366f1",
  "#8b5cf6", "#a855f7", "#d946ef", "#ec4899"
];

// 5 color groups partitioning the 16 shared overrun parties (2026-06-12:
// Blue gave ตี้ 15,16 to the new "Purple" group — no structural
// change, party ids/slots untouched, only the group mapping).
// `marker` = the group's default map pin (used only until a position is
// saved) — 2×2 corners for the four classic groups, center for Purple.
const OVERRUN_GROUPS = [
  { name: "Red",    color: "#ef4444", ids: [1,2,3,4],    marker: { x: 25, y: 35 } },
  { name: "Yellow", color: "#eab308", ids: [5,6,7,8],    marker: { x: 75, y: 35 } },

];
const TEAM_COLORS_OVERRUN = (() => {
  const out = new Array(16);
  for (const g of OVERRUN_GROUPS) for (const id of g.ids) out[id-1] = g.color;
  return out;
})();

  const palette = state.mode === "overrun" ? TEAM_COLORS_OVERRUN : TEAM_COLORS;

let currentLocale = (function () {
  try {
    const v = localStorage.getItem("woe_locale");
    return (v && LOCALES[v]) ? v : "pt-BR";
  } catch (e) { return "pt-BR"; }
})();

function t(key, params) {
  const dict = LOCALES[currentLocale] || LOCALES["pt-BR"];
  let s = dict[key];
  if (s == null) s = LOCALES["pt-BR"][key];
  if (s == null) s = key;
  if (params) {
    for (const k in params) s = s.split("{" + k + "}").join(String(params[k]));
  }
  return s;
}

/* pt/en pluralization: n===1 → the "<base>_one" key, else "<base>" key. Both
 * receive {n}. Define both keys in LOCALES (e.g. unit.people + unit.people_one). */
function plural(n, baseKey) { return t(n === 1 ? baseKey + "_one" : baseKey, { n }); }

/* Fill static markup: <el data-i18n="key"> sets textContent;
 * <el data-i18n-attr="placeholder:key,title:key2"> sets attributes. */
function applyStaticI18n(root) {
  root = root || document;
  root.querySelectorAll("[data-i18n]").forEach(function (el) {
    el.textContent = t(el.getAttribute("data-i18n"));
  });
  root.querySelectorAll("[data-i18n-attr]").forEach(function (el) {
    el.getAttribute("data-i18n-attr").split(",").forEach(function (pair) {
      const i = pair.indexOf(":");
      if (i < 0) return;
      const attr = pair.slice(0, i).trim();
      const key = pair.slice(i + 1).trim();
      if (attr && key) el.setAttribute(attr, t(key));
    });
  });
  // CSS can't call t(); expose the map-loading label as a custom property so
  // the .map-wrap.no-image::after content tracks the locale. JSON.stringify
  // wraps it in quotes as CSS `content` requires. Runs at boot + every setLocale.
  try { document.documentElement.style.setProperty('--map-loading-label', JSON.stringify(t('maps.loading'))); } catch (e) {}
}

function setLocale(loc) {
  if (!LOCALES[loc]) return;            // invalid → no-op
  currentLocale = loc;
  try { localStorage.setItem("woe_locale", loc); } catch (e) {}
  applyStaticI18n(document);
  if (typeof render === "function") render();
  if (typeof updateLocaleSwitcherUI === "function") updateLocaleSwitcherUI();
}

function updateLocaleSwitcherUI() {
  const wrap = document.getElementById("localeSwitch");
  if (!wrap) return;
  wrap.querySelectorAll("button[data-loc]").forEach(function (b) {
    b.classList.toggle("locale-active", b.getAttribute("data-loc") === currentLocale);
  });
}

/* Display label for a party: keep a custom name, but localize the default
 * (blank, or the legacy Thai "ตี้ N" default) so it follows the locale. */
function partyLabel(p, id) {
  const nm = (p && p.name) ? String(p.name).trim() : "";
  if (nm && !/^ตี้\s*\d+$/.test(nm)) return nm;   // real custom name → keep as-is
  return t("party.label", { n: id });
}

/* ---------- BKK timezone helpers (used by Leave page + auto-clear) ----- */
// All "today" / "00:00" semantics are in America/Sao_Paulo (UTC−3, Brasília) —
// guild events are scheduled in Brasília time so the reset boundary must match.
// NOTE: helper names (bkkNow/todayBkkISO/bkkDow) are legacy; "bkk" now means Brasília UTC−3.
function bkkNow() {
  // shift UTC → Brasília by subtracting 3h, then format as if it were UTC. Result is
  // a Date object whose UTC fields = Brasília wall-clock fields.
  const t = Date.now() - 3 * 60 * 60 * 1000;
  return new Date(t);
}
function todayBkkISO() {
  const d = bkkNow();
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, "0");
  const day = String(d.getUTCDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function bkkDow(isoStr) {
  // 0 = Sunday, 1 = Monday, ..., 6 = Saturday — same convention as JS Date.
  // Parse YYYY-MM-DD as a UTC date so DOW is correct regardless of browser TZ.
  const [y, m, d] = isoStr.split("-").map(Number);
  return new Date(Date.UTC(y, m - 1, d)).getUTCDay();
}
function isEventDay(isoStr) {
  // Tuesday/Thursday → GL · Sunday → Overrun · else null
  const d = bkkDow(isoStr);
  if (d === 2 || d === 4) return "GL";
  if (d === 0) return "Overrun";
  return null;
}
/* Locale-aware weekday + date display. 0=Sun..6=Sat. */
const DOW_LOCALES = {
  "pt-BR": ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"],
  "en":    ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
};
const DOW_SHORT_LOCALES = {
  "pt-BR": ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"],
  "en":    ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
};
const MONTH_LOCALES = {
  "pt-BR": ["jan.","fev.","mar.","abr.","mai.","jun.","jul.","ago.","set.","out.","nov.","dez."],
  "en":    ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
};
function dowName(dow)  { const a = DOW_LOCALES[currentLocale]       || DOW_LOCALES["pt-BR"];       return a[dow] != null ? a[dow] : ""; }
function dowShort(dow) { const a = DOW_SHORT_LOCALES[currentLocale] || DOW_SHORT_LOCALES["pt-BR"]; return a[dow] != null ? a[dow] : ""; }
/* Gregorian, Brasília local date, locale month abbrev — e.g. "12 jun. 2026" / "12 Jun 2026". */
function fmtDate(iso) {
  const parts = String(iso).split("-").map(Number);
  const y = parts[0], m = parts[1], d = parts[2];
  if (!y || !m || !d) return String(iso);
  const mon = (MONTH_LOCALES[currentLocale] || MONTH_LOCALES["pt-BR"])[m - 1];
  if (mon == null) return String(iso);
  return d + " " + mon + " " + y;
}
/** Format an epoch ms timestamp into compact "D/M, H:MM" using Brasília time (UTC−3).
 *  Used by the Roster's Last Update column. Returns "—" if ms is falsy. */
function fmtUpdatedAt(ms) {
  if (!ms) return "—";
  const t = new Date(ms - 3 * 60 * 60 * 1000);  // shift to Brasília (UTC−3) then read UTC fields
  const d = t.getUTCDate();
  const mo = t.getUTCMonth() + 1;
  const hh = t.getUTCHours();
  const mm = String(t.getUTCMinutes()).padStart(2, "0");
  return `${d}/${mo}, ${hh}:${mm}`;
}
function thisMondayISO() {
  // Return the ISO date of the most recent Monday (or today if today is Mon).
  // Used as the "weekly reset stamp" so we can detect when we've crossed
  // Monday 00:00 Brasília since last reset.
  const today = todayBkkISO();
  const d = bkkDow(today);
  // Mon=1, so subtract (d===0 ? 6 : d-1) days
  const back = d === 0 ? 6 : d - 1;
  const [y, m, da] = today.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, da - back));
  return `${dt.getUTCFullYear()}-${String(dt.getUTCMonth()+1).padStart(2,"0")}-${String(dt.getUTCDate()).padStart(2,"0")}`;
}

  // Snapshot active mode's parties (league / overrun)
  if (state.mode === "league") state.partiesLeague = state.parties;
  else if (state.mode === "overrun") state.partiesOverrun = state.parties;

  state.mode = newMode;

  if (newMode === "league" || newMode === "overrun") {
    let next = newMode === "league" ? state.partiesLeague : state.partiesOverrun;
    if (!Array.isArray(next) || next.length !== PARTIES) next = makeEmptyParties();

function escapeHtml(s) {

// "Assigned" is per-page: each mode tracks its own assignments so the
// sidebar's "ซ่อนคนที่จัดตี้แล้ว" + .assigned styling reflect THIS page only.
// - League/Overrun: in any party slot of the active mode
// - Auction GL/Overrun: in any of the 3 drop columns of the matching auction
// - Members (summary): never marked assigned
function isAssigned(memberId) {
  const inAuctionBuckets = (a) => {
    if (!a || !a.main || !a.sub) return false;
    return a.main.cards.includes(memberId) || a.main.white.includes(memberId) || a.main.black.includes(memberId)
        || a.sub.cards.includes(memberId)  || a.sub.white.includes(memberId)  || a.sub.black.includes(memberId);
  };
  if (state.mode === "auction-gl")      return inAuctionBuckets(state.auctionGL && state.auctionGL.assignments);
  if (state.mode === "auction-overrun") return inAuctionBuckets(state.auctionOverrun && state.auctionOverrun.assignments);
  if (state.mode === "summary")         return false;

/* =====================================================================
 * Google Sheets (JSONP via <script>)
 * ===================================================================== */
function parseSheetUrl(url) {
  const idMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!idMatch) throw new Error(t("error.sheet_no_id"));
  const id = idMatch[1];
  const gidMatch = url.match(/[#&?]gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : "0";
  return { id, gid };
}

function fetchSheetJSON(id, gid) {
  return new Promise((resolve, reject) => {
    // cache-buster — force fresh fetch every time (browser caches <script src>)
    const cb = Date.now();
    const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&gid=${gid}&headers=0&_=${cb}`;
    const prev = window.google;
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    let resolved = false;
    window.google.visualization.Query.setResponse = (resp) => {
      if (resolved) return;
      resolved = true;
      window.google = prev;
      if (resp.status === "error") {
        reject(new Error(resp.errors?.[0]?.detailed_message || "Sheet error"));
      } else {
        resolve(resp);
      }
    };
    const script = document.createElement("script");
    script.src = url;
    script.onerror = () => {
      if (resolved) return;
      resolved = true;
      window.google = prev;
      reject(new Error(t("error.sheet_load_failed")));
    };
    document.head.appendChild(script);
    setTimeout(() => { script.remove(); }, 30000);
    setTimeout(() => {
      if (resolved) return;
      resolved = true;
      window.google = prev;
      reject(new Error("Timeout (30s)"));
    }, 30000);
  });
}

function gvizToRows(resp) {
  const rows = [];
  const tbl = resp.table;
  if (!tbl) return rows;
  for (const r of tbl.rows || []) {
    const cells = (r.c || []).map(c => {
      if (!c) return "";
      if (c.f !== undefined && c.f !== null) return String(c.f);
      if (c.v === null || c.v === undefined) return "";
      return String(c.v);
    });
    rows.push(cells);
  }
  return rows;
}

function parseNum(v) {
  if (v == null) return 0;
  const n = parseInt(String(v).replace(/[^0-9.-]/g, ""), 10);
  return isNaN(n) ? 0 : n;
}

function extractMembersFromRows(rows) {
  const members = [];
  const seen = new Set();
  for (const r of rows) {
    if (!r || r.length < 5) continue;
    const name      = (r[2]  || "").trim();   // col C — Guild Member
    const job       = (r[4]  || "").trim();   // col E — Job
    const discord   = (r[5]  || "").trim();   // col F — Discord username
    const discordId = (r[13] || "").trim();   // col N — Discord ID
    if (!name || !job) continue;
    if (name === "Guild Member" || name.toLowerCase() === "name") continue;
    if (name === "#N/A" || job === "#N/A") continue;
    const key = name + "|" + job;
    if (seen.has(key)) continue;
    seen.add(key);
    const cp = parseNum(r[11]);               // col L — CP
    members.push({
      id: "sheet_" + uid(),
      name, job, discord, discordId,
      cp,
      source: "sheet"
    });
  }
  return members;
}

async function refreshFromSheet() {
  const btn = document.getElementById("btnRefresh");
  btn.disabled = true; btn.textContent = "⏳ Loading...";
  try {
    const { id, gid } = parseSheetUrl(state.sheetUrl);
    const resp = await fetchSheetJSON(id, gid);
    const rows = gvizToRows(resp);
    const fetched = extractMembersFromRows(rows);
    if (!fetched.length) throw new Error(t("error.sheet_no_members"));

    const manualOnly = state.members.filter(m => m.source !== "sheet");
    // Preserve on-leave flags (League + Overrun, independent) across refresh.
    // Keyed by NAME (stable identity) so a job change does not lose the ลา mark.
    const leaveByName = {};
    state.members.forEach(m => {
      if (m.onLeaveLeague || m.onLeaveOverrun)
        leaveByName[m.name] = { l: !!m.onLeaveLeague, o: !!m.onLeaveOverrun };
    });
    // Build maps: oldId → "name|job" AND oldId → "name". name = stable identity;
    // job can change in the sheet — name-only fallback keeps them in their slot.
    const oldIdToKey = {};
    const oldIdToName = {};
    state.members.filter(m => m.source === "sheet").forEach(m => {
      oldIdToKey[m.id] = m.name + "|" + m.job; oldIdToName[m.id] = m.name;
    });
    // Manual members keep their original (always-unique) ids
    manualOnly.forEach(m => { oldIdToKey[m.id] = m.name + "|" + m.job; oldIdToName[m.id] = m.name; });

    // All fetched members get fresh UNIQUE random ids (from extractMembersFromRows)
    // — no more index-based collisions
    state.members = [...fetched, ...manualOnly];
    // Re-apply preserved on-leave flags (independent per mode), matched by name
    state.members.forEach(m => {
      const lk = leaveByName[m.name];
      if (lk) { if (lk.l) m.onLeaveLeague = true; if (lk.o) m.onLeaveOverrun = true; }
    });

    // Build maps: "name|job" → newId  AND  "name" → newId (name-only fallback)
    const newKeyToId = {};
    const newNameToId = {};
    state.members.forEach(m => {
      newKeyToId[m.name + "|" + m.job] = m.id;
      if (!(m.name in newNameToId)) newNameToId[m.name] = m.id;
    });

    // Remap party slot refs old id → new id: exact name|job first, else
    // name-only — so a member who changed job in the sheet stays in their slot
    const remapSlots = (arr) => {
      if (!Array.isArray(arr)) return;
      arr.forEach(p => {
        if (!p || !Array.isArray(p.slots)) return;
        p.slots = p.slots.map(oldId => {
          if (!oldId) return null;
          const key = oldIdToKey[oldId];
          if (key && newKeyToId[key]) return newKeyToId[key];
          const nm = oldIdToName[oldId];
          return (nm && newNameToId[nm]) ? newNameToId[nm] : null;
        });
      });
    };
    remapSlots(state.parties);
    remapSlots(state.partiesLeague);
    remapSlots(state.partiesOverrun);

    // Same id-remap for auction assignments — drop dead IDs after the remap
    // so counts stay in sync with the rendered droplist rows.
    const remapAuctionIds = (assignments) => {
      if (!assignments) return;
      ["main", "sub"].forEach(field => {
        if (!assignments[field]) return;
        ["cards", "white", "black"].forEach(key => {
          if (!Array.isArray(assignments[field][key])) return;
          assignments[field][key] = assignments[field][key].map(oldId => {
            if (!oldId) return null;
            const k = oldIdToKey[oldId];
            if (k && newKeyToId[k]) return newKeyToId[k];
            const nm = oldIdToName[oldId];
            return (nm && newNameToId[nm]) ? newNameToId[nm] : null;
          }).filter(Boolean);
        });
      });
    };
    remapAuctionIds(state.auctionGL && state.auctionGL.assignments);
    remapAuctionIds(state.auctionOverrun && state.auctionOverrun.assignments);

    // After refreshing members, re-apply any saved team baked into HTML.
    // This way assignments survive sheet refreshes; names removed from the
    // sheet simply drop out of their slots.
    // Apply saved team from localStorage (matches by name+job).
    // Missing names from sheet → those slots become null automatically.
    const savedTeam = loadSavedTeam();
    if (savedTeam) applySavedTeam(savedTeam);

    save();
    rebuildJobFilter();
    render();
    toast(t('toast.sheet_load_ok', { n: plural(fetched.length, 'unit.people') }), "success");
  } catch (e) {
    console.error(e);
    toast(t('toast.sheet_load_fail', { msg: e.message }), "error");
  } finally {
    btn.disabled = false; btn.textContent = t('sheet.refresh_btn');
  }
}
