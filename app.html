function firebaseConfigured() {
  return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "TODO_REPLACE_ME";
}

async function initFirebase() {
  if (!firebaseConfigured()) {
    console.warn("[firebase] Not configured — Roster tab will show setup hint.");
    return;
  }
  if (typeof firebase === "undefined") {
    console.error("[firebase] SDK not loaded.");
    return;
  }
  try {
    _fbApp     = firebase.initializeApp(FIREBASE_CONFIG);
    _fbAuth    = firebase.auth();
    _fbDB      = firebase.database();
    _fbStorage = firebase.storage();
    _fbReady   = true;

    // Track auth state. On first ever load, sign in anonymously so DB rules
    // (auth != null) pass. If user signs in with Google later, the anonymous
    // session is replaced.
    _fbAuth.onAuthStateChanged(user => {
      _fbUser = user;
      if (!user) {
        // No session at all → sign in anonymously
        _fbAuth.signInAnonymously().catch(e => console.warn("[firebase] anon sign-in failed", e));
        return;
      }
      // First-time setup of listeners (once we have a user, rules let us read)
      if (!_fbSubscribed) fbSubscribeAll();
      // Refresh UI for the new auth state (admin vs guest controls)
      applyViewerMode();
      updateAuthUI();
      if (typeof render === "function") render();
    });
  } catch (e) {
    console.error("[firebase] init failed", e);
  }
}

/* ---------- Firebase array reconstruction helper ------------------- *
 * Firebase RTDB stores arrays as objects under the hood. When the JSON
 * is "dense enough" the SDK gives us a real Array back, but a sparse
 * array (e.g. [null, null, null, null, "x"] — common when dropping a
 * member into the last party slot while earlier ones are empty) comes
 * back as a plain object {"4": "x"}. Array.isArray then says false and
 * the existing listener falls back to "all nulls" — wiping the slot
 * the user just filled. This helper accepts either shape and returns a
 * regular fixed-length Array.
 */
function fbToFixedArray(v, len, fillValue) {
  const out = Array(len).fill(fillValue);
  if (Array.isArray(v)) {
    for (let i = 0; i < Math.min(v.length, len); i++) {
      if (v[i] !== undefined) out[i] = v[i];
    }
  } else if (v && typeof v === "object") {
    Object.keys(v).forEach(k => {
      // Only accept strict integer keys — Firebase sparse arrays come back
      // as objects keyed by index strings ("0","1","4"). parseInt would
      // happily accept "4abc" / "4.7" too, which could let a malformed
      // upstream value clobber a legitimate slot. Require /^\d+$/.
      if (!/^\d+$/.test(k)) return;
      const i = parseInt(k, 10);
      if (i >= 0 && i < len) out[i] = v[k];
    });
  } else if (v != null) {
    // Primitive / unexpected shape — log once so a manual Firebase Console
    // edit that produces e.g. /parties/league = "x" doesn't silently wipe
    // local state without anyone noticing.
    console.warn("[fbToFixedArray] unexpected shape (returning fill):", v);
  }
  return out;
}

/* ---------- Firebase subscriptions: realtime listeners on every path ----- */
function fbSubscribeAll() {
  if (!_fbDB || _fbSubscribed) return;
  _fbSubscribed = true;
  _fbMembersRef = _fbDB.ref("members");

  // members → mirror to state.members + rosterCache
  _fbMembersRef.on("value", snap => {
    const v = snap.val() || {};
    rosterCache = Object.entries(v)
      .map(([id, r]) => ({
        id,
        name:        r.name        || "",
        job:         r.job         || "",
        discord:     r.discord     || "",
        discordId: r.discordId || "",
        cp:          Number(r.cp)  || 0,
        updatedAt:   r.updatedAt   || 0,
        updatedBy:   r.updatedBy   || ""
      }))
      .sort((a, b) => (a.name || "").localeCompare(b.name || "", "th"));
    _fbApplyingRemote = true;
    state.members = rosterCache.map(r => ({
      id: r.id, name: r.name, job: r.job, discord: r.discord, discordId: r.discordId, cp: r.cp, source: "firebase"
    }));
    _fbApplyingRemote = false;
    rebuildJobFilter();
    // Now that members are loaded, re-sanitize party slots — first listener
    // run may have skipped because members weren't ready yet.
    // Fix A/B: re-sanitize for DISPLAY only, and only after the authoritative
    // /parties snapshot has applied. The old code .set() the sanitized parties
    // back to Firebase, so a sanitize running against the stale localStorage
    // copy (members snapshot winning the load race, referencing members removed
    // since) silently PERSISTED a wipe of valid slots. Persistent orphan cleanup
    // is admin-only now, via the manual repairGhostSlots() button.
    if (_fbPartiesLeagueLoaded && state.partiesLeague) sanitizeSlots(state.partiesLeague);
    if (_fbPartiesOverrunLoaded && state.partiesOverrun) sanitizeSlots(state.partiesOverrun);
    safeRender();
  }, e => console.warn("[firebase] members listener error", e));

  // Sanitize party slots — drop references to members that no longer exist
  // or have no name/job (ghost rows from migration / dedupe etc).
  // SAFETY: skip if members haven't loaded yet — otherwise we'd wipe valid
  // slots just because their members haven't arrived from Firebase yet.
  // Sanitize uses the LOOSER check (isFullyBlankMember) so we only DELETE the
  // slot reference if there's nothing left to recover. A member with name "X"
  // and no job is rendered as Empty visually but keeps its slot assignment,
  // so admin can complete the roster without losing party data.
  const sanitizeSlots = (parties) => {
    if (!state.members || !state.members.length) return false;
    let dirty = false;
    parties.forEach(p => {
      p.slots = p.slots.map(id => {
        if (!id) return null;
        if (isFullyBlankMember(findMember(id))) { dirty = true; return null; }
        return id;
      });
    });
    return dirty;
  };

  // Diagnostic helpers — exposed on window so the user can call them from the
  // DevTools console when ghost-slot bug is suspected. Returns an array of
  // {kind, party, slot, memId, member, severity}.
  // severity = 'fully-blank' (auto-deleted by sanitize) or 'incomplete' (kept
  // in slot, rendered as Empty visually).
  window.diagGhostSlots = () => {
    const out = [];
    const scan = (kind, parties) => {
      if (!Array.isArray(parties)) return;
      parties.forEach((p, pi) => {
        if (!p || !Array.isArray(p.slots)) return;
        p.slots.forEach((id, si) => {
          if (!id) return;
          const m = findMember(id);
          if (isGhostMember(m)) {
            const severity = isFullyBlankMember(m) ? "fully-blank" : "incomplete";
            out.push({ kind, party: pi + 1, slot: si + 1, memId: id,
                       name: m && m.name, job: m && m.job, severity });
          }
        });
      });
    };
    scan("league",  state.partiesLeague);
    scan("overrun", state.partiesOverrun);
    console.table(out);
    console.log("Members loaded:", state.members.length, "Ghost slots:", out.length);
    return out;
  };

  // Force-clean ghost slots and push to Firebase (admin only).
  // STRICT mode here — clears any slot whose member is "ghost" (missing
  // name OR job), not just fully-blank. That's the slot that renders as
  // Empty visually but still has an orphan id underneath, leaking a
  // stray × icon into the row. Auto-sanitize stays looser to avoid
  // accidentally wiping rows mid-edit; the manual button is admin-
  // initiated so it's safe to go aggressive.
  window.repairGhostSlots = () => {
    if (!isAdmin()) { toast && toast(t('toast.users_need_admin'), "error"); return false; }
    let cleared = 0, trees = 0;
    const strictClean = (parties) => {
      if (!Array.isArray(parties)) return false;
      let touched = false;
      parties.forEach(p => {
        if (!p || !Array.isArray(p.slots)) return;
        p.slots = p.slots.map(id => {
          if (!id) return null;
          if (isGhostMember(findMember(id))) { cleared++; touched = true; return null; }
          return id;
        });
      });
      return touched;
    };
    if (strictClean(state.partiesLeague))  { _fbDB.ref("parties/league").set(state.partiesLeague);   trees++; }
    if (strictClean(state.partiesOverrun)) { _fbDB.ref("parties/overrun").set(state.partiesOverrun); trees++; }
    console.log("[repair] cleaned", cleared, "slots across", trees, "tree(s)");
    if (typeof render === "function") render();
    if (typeof toast === "function") {
      if (cleared) toast(t('toast.ghost_repaired', { n: cleared }), "success");
      else {
        toast(t('toast.ghost_none'), "");
        // Dump every populated slot's raw member data + char-by-char codes
        // so we can see what unicode the "ghost" actually contains.
        const dump = [];
        const scan = (kind, parties) => {
          if (!Array.isArray(parties)) return;
          parties.forEach((p, pi) => {
            if (!p || !Array.isArray(p.slots)) return;
            p.slots.forEach((id, si) => {
              if (!id) return;
              const m = findMember(id);
              dump.push({
                kind, party: pi + 1, slot: si + 1, memId: id,
                name: m ? m.name : "(NO MEMBER)",
                job:  m ? m.job  : "(NO MEMBER)",
                nameCodes: m && m.name ? [...m.name].map(c => "U+" + c.codePointAt(0).toString(16).toUpperCase().padStart(4,"0")).join(" ") : "",
                jobCodes:  m && m.job  ? [...m.job ].map(c => "U+" + c.codePointAt(0).toString(16).toUpperCase().padStart(4,"0")).join(" ") : ""
              });
            });
          });
        };
        scan("league",  state.partiesLeague);
        scan("overrun", state.partiesOverrun);
        console.table(dump);
        console.log("[repair] no auto-detected ghosts; full slot dump above. ส่งภาพ console มาให้ดูได้ครับ");
      }
    }
    return cleared > 0;
  };

  // parties/league
  _fbDB.ref("parties/league").on("value", snap => {
    const v = snap.val();
    if (v == null) return;  // no data yet — don't wipe local state
    // Skip echoes that arrive during a recent local mutation window
    // (sort, drag). Otherwise an in-flight echo of a previous edit
    // could overwrite the fresh local change before our own push lands.
    if (Date.now() < _localPartiesGuardUntil) {
      console.log("[parties/league] echo suppressed — within local mutation guard");
      return;
    }
    const partiesRaw = fbToFixedArray(v, PARTIES, null);
    _fbApplyingRemote = true;
    state.partiesLeague = partiesRaw.map((p, i) => {
      // Empty slot in the parties array (Firebase dropped a leading
      // entry, or a trailing all-null/empty party). Synthesize a blank
      // party so the index/id pairing stays stable — but preserve any
      // existing local name first so a renamed-but-empty party (e.g.
      // "นักล่า A" with no slots filled yet) doesn't get reset back to
      // the default "ตี้ N" on every roundtrip.
      if (!p) {
        const localList = (snap.ref.toString().endsWith("/parties/league")
          ? state.partiesLeague
          : state.partiesOverrun) || [];
        const keepName = (localList[i] && localList[i].name) || ("ตี้ " + (i + 1));
        return { id: i + 1, name: keepName, slots: Array(PARTY_SLOTS).fill(null) };
      }
      return {
        id: p.id || (i + 1), name: p.name || "",
        slots: fbToFixedArray(p.slots, PARTY_SLOTS, null)
      };
    });
    if (state.mode === "league") state.parties = state.partiesLeague;
    _fbApplyingRemote = false;
    // Display-only sanitize of the freshly-loaded authoritative snapshot — it
    // no longer writes the cleaned copy back to Firebase (that silent .set()
    // was the parties-wipe bug). Mark this board loaded so the members listener
    // may display-sanitize without racing the stale localStorage copy.
    _fbPartiesLeagueLoaded = true;        // Fix B: authoritative League parties now loaded
    sanitizeSlots(state.partiesLeague);   // Fix A: clean for DISPLAY only, never persist
    safeRender();
  });

  // parties/overrun
  _fbDB.ref("parties/overrun").on("value", snap => {
    const v = snap.val();
    if (v == null) return;  // no data yet — don't wipe local state
    if (Date.now() < _localPartiesGuardUntil) {
      console.log("[parties/overrun] echo suppressed — within local mutation guard");
      return;
    }
    const partiesRaw = fbToFixedArray(v, PARTIES, null);
    _fbApplyingRemote = true;
    state.partiesOverrun = partiesRaw.map((p, i) => {
      if (!p) return { id: i + 1, name: "ตี้ " + (i + 1), slots: Array(PARTY_SLOTS).fill(null) };
      return {
        id: p.id || (i + 1), name: p.name || "",
        slots: fbToFixedArray(p.slots, PARTY_SLOTS, null)
      };
    });
    if (state.mode === "overrun") state.parties = state.partiesOverrun;
    _fbApplyingRemote = false;
    _fbPartiesOverrunLoaded = true;        // Fix B: authoritative Overrun parties now loaded
    sanitizeSlots(state.partiesOverrun);   // Fix A: clean for DISPLAY only, never persist
    safeRender();
  });

  // auction_gl
  _fbDB.ref("auction_gl").on("value", snap => {
    const v = snap.val();
    if (!v || typeof v !== "object") return;
    _fbApplyingRemote = true;
    state.auctionGL = normalizeAuctionState(v, "gl");
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "auction-gl") render();
  });

  // auction_overrun
  _fbDB.ref("auction_overrun").on("value", snap => {
    const v = snap.val();
    if (!v || typeof v !== "object") return;
    _fbApplyingRemote = true;
    state.auctionOverrun = normalizeAuctionState(v, "overrun");
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "auction-overrun") render();
  });

  // job_targets
  _fbDB.ref("job_targets").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.jobTargets = v;
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "summary") render();
  });

  // markers (League mode — party positions on map + movement arrows)
  _fbDB.ref("markers").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.markers = v;
    _fbApplyingRemote = false;
    if (typeof renderMarkers === "function" && state.mode === "league") renderMarkers();
  });

  // markers_bottom (League "เกิดล่าง" plan — parties 1-16 on mapNum 4/5)
  _fbDB.ref("markers_bottom").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.markersBottom = v;
    _fbApplyingRemote = false;
    if (typeof renderMarkers === "function" && state.mode === "league") renderMarkers();
  });

  // overrun_markers (Overrun mode — one position per color group)
  _fbDB.ref("overrun_markers").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.overrunMarkers = v;
    _fbApplyingRemote = false;
    if (typeof renderOverrunMarkers === "function" && state.mode === "overrun") renderOverrunMarkers();
  });

  // range_circles (GL Main map zone radii — synced like markers). Firebase stores
  // the array; normalize to exactly 3 clamped circles before rendering.
  _fbDB.ref("range_circles").on("value", snap => {
    const v = snap.val();
    _fbApplyingRemote = true;
    state.rangeCircles = Array.isArray(v) ? v : [];
    if (typeof initRangeCircles === "function") initRangeCircles();
    _fbApplyingRemote = false;
    if (typeof renderMarkers === "function" && state.mode === "league") renderMarkers();
  });

  // leaves (scheduled leave registrations — anyone can read/write to their own
  // entries). Listener fires whenever someone in the guild adds/removes a leave
  // so the page updates realtime.
  _fbDB.ref("leaves").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.leaves = v;
    _fbApplyingRemote = false;
    // Re-render League/Overrun if today's scheduled-leave changed; safeRender
    // because the user might be dragging when a remote leave registers.
    safeRender();
  });

  // admins: email-keyed map of who has admin privileges. Read by isAdmin()
  // alongside the hardcoded ADMIN_EMAILS fallback so the bootstrap account
  // works even if /admins is empty.
  _fbDB.ref("admins").on("value", snap => {
    const v = snap.val() || {};
    const wasAdmin = isAdmin();
    _fbApplyingRemote = true;
    state.admins = v;
    _fbApplyingRemote = false;
    // Refresh auth chrome unconditionally (it doesn't rip focus — just
    // toggles classes / body attrs).
    applyViewerMode();
    updateAuthUI();
    // Full render() is expensive and tears down inputs (e.g. a guest mid-
    // typing CP into the Roster loses focus). Only do it when EITHER our
    // own admin status flipped OR we're on a page that actually displays
    // the admin list. Other pages don't depend on /admins content.
    const nowAdmin = isAdmin();
    const onAdminAwarePage = state.mode === "users" || state.mode === "auction-request" || state.mode === "wheel";
    if (wasAdmin !== nowAdmin || onAdminAwarePage) {
      if (typeof render === "function") render();
    }
  });

  // users: admin-managed list of app-created accounts (one entry per
  // username). Powers the Users page admin UI.
  _fbDB.ref("users").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.users = v;
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "users") render();
  });

  // wheel_history: prize-wheel winner log (admin page). Read-only mirror in
  // state; writes happen in wheelSaveResult()/wheelDeleteHistory() (admin-
  // gated + DB-rules-enforced). Mid-spin canvas protection lives at the
  // single choke point in renderBattlefields — not per-listener.
  _fbDB.ref("wheel_history").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.wheelHistory = v;
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "wheel") render();
  });

  // map_images: admin-uploaded custom map backgrounds (compressed data-URLs).
  // Mirrored into _customMapImages (NOT state — see its comment), repainted
  // live, and the page re-renders so the "↺ รูปเดิม" button tracks presence.
  _fbDB.ref("map_images").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    _customMapImages = {};
    Object.keys(v).forEach(k => {
      // Strict shape gate on the client: only base64 raster data-URLs reach
      // the CSS url("...") sink — kills both svg payloads and any quote/paren
      // breakout, regardless of what an admin wrote to the node directly.
      if (typeof v[k] === "string" && /^data:image\/(png|jpe?g|webp|gif);base64,[A-Za-z0-9+/=]+$/.test(v[k])) {
        _customMapImages[k] = v[k];
      }
    });
    _fbApplyingRemote = false;
    [1, 2, 3, 4, 5].forEach(n => applyMapBg(n));
    // safeRender (not raw render) — league/overrun ARE the drag-drop boards;
    // a mid-drag rebuild would no-op the user's drop (see safeRender's note).
    if (typeof safeRender === "function" && (state.mode === "league" || state.mode === "overrun")) safeRender();
  });

  // auction_requests: per-date guest requests + admin queue. Lives entirely
  // in Firebase so multiple guests see updates instantly; we keep a local
  // mirror in state.auctionRequests for render.
  _fbDB.ref("auction_requests").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.auctionRequests = v;
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "auction-request") render();
  });

  // system: reset bookkeeping. Read-only for most of the app, written only by
  // autoCheckResets() when crossing a reset boundary.
  _fbDB.ref("system").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.system = { lastDailyReset: v.lastDailyReset || "", lastWeeklyReset: v.lastWeeklyReset || "", auditLog: Array.isArray(v.auditLog) ? v.auditLog.slice(-AUDIT_LOG_MAX) : [] };
    _fbApplyingRemote = false;
    // Whenever we hear about the system stamps, run a reset check — if our
    // local clock has crossed a boundary the remote stamp hasn't caught yet,
    // we'll perform the reset ourselves.
    autoCheckResets();
  });

  // map_urls: NOT synced — map images are embedded as static assets so they
  // never change. Only markers + arrows sync above.
}

/* ---------- Auto-reset job (daily manual leave + weekly /leaves) ----- */
// Idempotent: each client checks on load + every minute. First client past
// the reset boundary wins (using state.system.lastDailyReset / lastWeeklyReset
// as a "have we already reset for this period?" stamp).
function autoCheckResets() {
  if (!_fbDB || !state.system) return;
  const today  = todayBkkISO();
  const monday = thisMondayISO();
  // Daily reset: clear manual-leave flags on members. We do this on EVERY
  // calendar day in Brasília that hasn't been stamped yet.
  if (state.system.lastDailyReset !== today) {
    // Only admins can actually do the reset work (write /members, clear
    // /auction_requests, reset auction pages). Guests must NOT stamp the
    // local clock to today — if they did, an admin signing into the same
    // tab later in the day would see lastDailyReset === today and never
    // run the reset, leaving manual-leave flags + yesterday's auction
    // data in place until the next page reload. So bail out for guests
    // and wait for the /system listener to bring us the real stamp.
    if (!isAdmin()) {
      console.log("[reset] daily: guest skipping — wait for admin");
      return;
    }
    let cleared = 0;
    // Stamp first to claim ownership of this reset (prevents two admin
    // clients from racing the work).
    _fbDB.ref("system/lastDailyReset").set(today).catch(()=>{});
    state.system.lastDailyReset = today;
    // Clear the per-member manual flags. We must touch each member because
    // the field lives inside /members/{id}.
    if (state.members && state.members.length) {
      state.members.forEach(m => {
        const upd = {};
        if (m.onLeaveLeague)  upd.onLeaveLeague  = false;
        if (m.onLeaveOverrun) upd.onLeaveOverrun = false;
        if (Object.keys(upd).length) {
          _fbDB.ref(`members/${m.id}`).update(upd);
          cleared++;
        }
      });
      if (cleared) console.log(`[reset] daily: cleared manual leave on ${cleared} members`);
    }
    // Auction-request: drop any past-date auction request branches so /auction_requests
    // never grows unbounded.
    if (typeof arAutoClearPast === "function") arAutoClearPast();
    // Reset the Auction GL + Overrun pages so each event day starts fresh
    // — guild rules say the auction is a per-day activity.
    if (typeof arResetAuctionPages === "function") arResetAuctionPages();
  }
  // Weekly reset: wipe /leaves/ every Monday 00:00 Brasília. Stamp uses the
  // Monday ISO so "lastWeeklyReset = <this Monday>" means we're up to date.
  if (state.system.lastWeeklyReset !== monday) {
    _fbDB.ref("system/lastWeeklyReset").set(monday).catch(()=>{});
    state.system.lastWeeklyReset = monday;
    // Any auth'd user can wipe /leaves (Rules allow auth != null write).
    _fbDB.ref("leaves").remove()
      .then(() => console.log("[reset] weekly: /leaves cleared on Monday"))
      .catch(e => console.warn("[reset] weekly clear failed", e));
  }
}

/* ---------- Audit log: record WHO changed a team (system/auditLog) ----------
 * Logged at the mutation site: commitPartiesNow() is THE path every team edit
 * (drag/drop, sort, rename, slot delete) takes — it already knows the edit is
 * admin-only and which board via state.mode (state.parties mirrors the active
 * mode). Stored under the existing admin-write /system node, so NO change to
 * database.rules.json is needed. A run of edits by the same admin on the same
 * board within AUDIT_COALESCE_MS collapses into one row (time bumped + ×count)
 * to keep the list readable. Limitation: logAudit does a read-modify-write of
 * the whole array, so two admins editing in the same instant can last-write-win
 * one entry — accepted for a single trusted guild (the model is one leader
 * edits, members watch). Out of scope: automatic ghost-slot cleanup (sanitize)
 * and the repairGhostSlots() console helper write parties without a row — they
 * are remediation, not human edits; the human action that triggers them (member
 * delete) IS logged here. After a "team got messed up" incident, open the login
 * dialog → "📜 ประวัติการแก้ทีม" to see who. */
const AUDIT_LOG_MAX = 50;
const AUDIT_COALESCE_MS = 60 * 1000;

// Pure (testable): append `entry` to `log`; if the previous row is the SAME
// actor + SAME action within `coalesceMs`, collapse into it (bump time, ++n)
// instead of adding a row; otherwise push and cap to `max` (oldest dropped).
function coalesceAuditLog(log, entry, max, coalesceMs) {
  const out = Array.isArray(log) ? log.map(e => ({ ...e })) : [];
  const last = out[out.length - 1];
  if (last && last.by === entry.by && last.what === entry.what && (entry.at - (last.at || 0)) < coalesceMs) {
    last.at = entry.at;
    last.n = (last.n || 1) + 1;
  } else {
    out.push({ at: entry.at, by: entry.by, what: entry.what, n: 1 });
    while (out.length > max) out.shift();
  }
  return out;
}

// Pure (testable): map state.mode → the team-board label for an audit row.
// Battlefield modes name the board; anything else (e.g. a member-delete fired
// from the auction/roster page) is labelled generically, not mislabelled.
function auditBoardLabel(mode) {
  return mode === "league" ? "League" : mode === "overrun" ? "Overrun" : t('audit.board_external');
}

// Write an audit entry to /system/auditLog (admin-only; reuses the admin-write
// /system node). Called from commitPartiesNow() on every admin team edit.
function logAudit(what) {
  if (!_fbDB || !isAdmin()) return;
  if (!state.system) state.system = { lastDailyReset: "", lastWeeklyReset: "", auditLog: [] };
  const entry = { at: Date.now(), by: (_fbUser && _fbUser.email) || "admin", what: what };
  const next = coalesceAuditLog(state.system.auditLog, entry, AUDIT_LOG_MAX, AUDIT_COALESCE_MS);
  state.system.auditLog = next;
  _fbDB.ref("system/auditLog").set(next).catch(e => console.warn("[audit] write failed", e));
}

const USER_DOMAIN = "woe.local";  // synthetic email suffix for ID/password logins

function usernameToEmail(u) {

function emailToUsername(email) {

/* ---------- App user management (admin creates accounts) -----------
 * Firebase client SDK's createUserWithEmailAndPassword signs IN as the
 * new user, which would log the admin out. We sidestep this by spinning
 * up a SECONDARY Firebase app + auth instance just for user creation —
 * its signInState is independent of the main app, so the admin stays
 * signed in.
 */
let _fbSecondary = null;
function getSecondaryAuth() {
  if (_fbSecondary) return _fbSecondary;
  try {
    const app = firebase.initializeApp(FIREBASE_CONFIG, "Secondary");
    _fbSecondary = app.auth();
  } catch (e) {
    // initializeApp throws if "Secondary" already exists (HMR / re-init)
    _fbSecondary = firebase.app("Secondary").auth();
  }
  return _fbSecondary;
}

function genRandomPassword(len = 10) {
  // Alphanumeric only — easy to read out loud / send via chat.
  const charset = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789";
  // Guard for older / insecure-origin contexts where window.crypto isn't
  // exposed. Falls back to Math.random with a console warning so admins
  // know it happened (passwords are 10-char alphanum, weakness is small).
  const hasCrypto = typeof crypto !== "undefined" && crypto.getRandomValues;
  if (!hasCrypto) {
    console.warn("[genRandomPassword] crypto.getRandomValues unavailable — falling back to Math.random");
  }
  let out = "";
  if (hasCrypto) {
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    for (let i = 0; i < len; i++) out += charset[arr[i] % charset.length];
  } else {
    for (let i = 0; i < len; i++) out += charset[Math.floor(Math.random() * charset.length)];
  }
  return out;
}

async function createAppUser(username, password) {
  if (!isAdmin() || !_fbDB) { toast(t('toast.users_need_admin'), "error"); return null; }
  username = (username || "").trim().toLowerCase();
  if (!/^[a-z0-9_]{3,20}$/.test(username)) {
    toast(t('toast.users_id_invalid'), "error"); return null;
  }
  if (!password || password.length < 6) {
    toast(t('toast.users_pw_short'), "error"); return null;
  }
  const email = usernameToEmail(username);
  const secAuth = getSecondaryAuth();
  // Defensive: a previous failed create may have left the secondary signed
  // in as an orphan. Sign out first so createUserWithEmailAndPassword
  // doesn't operate on a stale session.
  try { await secAuth.signOut(); } catch (_) { /* ignore */ }
  let createdUser = null;
  try {
    const cred = await secAuth.createUserWithEmailAndPassword(email, password);
    createdUser = cred.user;
    // Mirror in /users for the admin-facing list (Firebase Auth has no
    // client-side "list users" API). Also flag as admin in /admins so the
    // new account gets full privileges.
    const adminKey = emailToAdminKey(email);
    const myEmail = (_fbUser && _fbUser.email) || "system";
    await _fbDB.ref(`users/${username}`).set({
      username,
      email,
      createdAt: Date.now(),
      createdBy: myEmail
    });
    await _fbDB.ref(`admins/${adminKey}`).set(true);
    toast(t('toast.users_created', { username }), "success");
    return { username, password };
  } catch (e) {
    let msg;
    if (e.code === "auth/email-already-in-use")
      msg = t('toast.users_id_taken', { username });
    else if (e.code === "auth/weak-password")
      msg = t('toast.users_pw_weak');
    else
      msg = t('toast.users_create_fail', { msg: e.message || e.code || "create failed" });
    toast(msg, "error");
    console.error("[users] create failed", e);
    // Rollback: if the Auth account was created but a subsequent DB write
    // failed, delete the orphan Auth account so the admin isn't stuck
    // with auth/email-already-in-use on retry. createdUser.delete() works
    // because the secondary auth is currently signed in as that user.
    if (createdUser) {
      try {
        await createdUser.delete();
        console.log("[users] rolled back orphan Auth account");
      } catch (de) {
        console.warn("[users] rollback delete failed — manual cleanup in Firebase Console may be needed:", de);
      }
    }
    return null;
  } finally {
    // Always sign the secondary auth out, even when create succeeded —
    // we don't want it lingering as the new user's session and bleeding
    // into the next create call.
    try { await secAuth.signOut(); } catch (_) { /* ignore */ }
  }
}

}

/* ----- Roster self-edit (claim) -----
 * A guest "claims" their own row via the same localStorage claim as the
 * Auction Request page (claimGetMemberId / claimSetMember — ar* aliases keep
 * the auction wiring unchanged) and may then edit ALL fields of THAT row
 * only; admin edits any row. This gate is UX, not a security boundary —
 * Database Rules already allow any authed user to .update() an existing
 * /members/$mid (create/delete stay admin). Every edit stamps updatedBy
 * for social accountability.
 *
 * Guest editing is DRAFT-based: inputs on the claimed row don't write
 * per-field; the user presses 💾 เซฟ (rosterSaveMine) which writes all five
 * fields in ONE update. Admin keeps per-field realtime saves (rosterUpdate). */
function rosterClaimedMember() {
  // Deliberately resolves against rosterCache (NOT findMember/state.members):
  // the claim chip must agree with the rendered table even before the first
  // Firebase snapshot, when state.members may hold stale localStorage data.
  const id = claimGetMemberId();
  // No auto-clear when not found: rosterCache may simply not be loaded yet
  // (first snapshot pending) — render as unclaimed and let the listener
  // re-render resolve it.
  return id ? (rosterCache.find(r => r.id === id) || null) : null;
}
function rosterCanEdit(id) {
  return isAdmin() || claimGetMemberId() === id;
}

const ROSTER_FIELD_MAX   = { name: 64, job: 64, discord: 64, discordId: 32 };
// Field labels for the field_too_long toast. `name` is locale-reactive (reuses
// roster.col_name); the rest are JARGON kept literal. Built as a getter so the
// active locale is read at toast time, not at module load.
function rosterFieldLabel(f) {
  return f === "name" ? t('roster.col_name') : ({ job: "Job", discord: "Discord", discordId: "Discord ID" }[f] || f);
}
const ROSTER_CP_MAX      = 100000000;  // 100M — sanity cap, mirrors rules .validate

/** Actor for updatedBy stamps: admin → email, guest → "👤 " + claimed name.
 *  The 👤 prefix marks guest-supplied stamps — an admin email stamp can never
 *  start with 👤, so a guest renaming themselves to an admin's email cannot
 *  forge an admin-looking entry through the UI. */
function rosterActorName() {
  if (isAdmin()) return String((_fbUser && _fbUser.email) || "admin").slice(0, 64);
  return "👤 " + String((rosterClaimedMember() || {}).name || "guest").slice(0, 61);
}

/** Clamp a member payload to the shapes database.rules.json .validate accepts.
 *  Bulk writers (add / import / dedupe / migrate) CLAMP instead of reject so
 *  one out-of-spec cell can never abort a batch or silently kill a write;
 *  the interactive paths (rosterUpdate / rosterSaveMine) reject with a toast
 *  instead so nothing is changed behind the user's back. */
function rosterClampFields(obj) {
  const out = Object.assign({}, obj);
  for (const k in ROSTER_FIELD_MAX) {
    if (typeof out[k] === "string" && out[k].length > ROSTER_FIELD_MAX[k]) {
      out[k] = out[k].slice(0, ROSTER_FIELD_MAX[k]);
    }
  }
  if ("cp" in out) out.cp = Math.min(ROSTER_CP_MAX, Math.max(0, Number(out.cp) || 0));
  return out;
}

/** Shared rejection handler for /members writes — a denied write must never
 *  be silent (e.g. row deleted concurrently → rules reject the update while
 *  the input still shows the typed value as if it saved). */
function rosterWriteFailed(e) {
  console.warn("[roster] write failed", e);
  toast(t('toast.save_fail', { msg: ((e && (e.message || e.code)) || e) }), "error");
  renderBattlefields();  // resync UI with what's actually in Firebase
}

function rosterUpdate(id, field, value) {
  if (!_fbMembersRef) return;
  if (!rosterCanEdit(id)) {
    toast(t('toast.roster_edit_own'), "error");
    renderBattlefields();
    return;
  }
  let val;
  if (field === "cp") {
    val = Math.max(0, parseInt(String(value).replace(/[^0-9]/g, ""), 10) || 0);
    if (val > ROSTER_CP_MAX) {
      val = ROSTER_CP_MAX;
      toast(t('toast.cp_capped', { max: ROSTER_CP_MAX.toLocaleString() }), "");
    }
  } else {
    val = String(value).trim();
    const max = ROSTER_FIELD_MAX[field] || 64;
    if (val.length > max) {
      toast(t('toast.too_long', { max: max }), "error");
      renderBattlefields();
      return;
    }
    // Blank name would orphan the row from the claim chooser — admins may
    // still clear it (the ghost-row dedupe machinery handles those).
    if (field === "name" && !val && !isAdmin()) {
      toast(t('toast.name_required'), "error");
      renderBattlefields();
      return;
    }
  }
  _fbMembersRef.child(id).update({ [field]: val, updatedAt: Date.now(), updatedBy: rosterActorName() })
    .catch(rosterWriteFailed);
}

/* Draft state for the claimed row. While a draft is open, remote snapshot
 * re-renders are HELD (see safeRender) so they can't wipe in-progress
 * typing — same idea as the _isDragging guard. Direct render() calls
 * (tab switch, claim change) still rebuild and discard the draft. */
let _rosterMineDirty = false;
function rosterMarkMineDirty() {
  _rosterMineDirty = true;
  const btn = document.getElementById("rosterSaveBtn");
  if (btn) { btn.classList.add("dirty"); btn.textContent = t('roster.save_dirty'); }
}
function rosterMineDraft() {
  const row = document.querySelector(".roster-table tr.r-mine");
  if (!row) return null;
  const pick = f => { const el = row.querySelector(`[data-rme="${f}"]`); return el ? el.value : ""; };
  return { name: pick("name"), job: pick("job"), discord: pick("discord"), discordId: pick("discordId"), cp: pick("cp") };
}
function rosterApplyMineDraft(d) {
  const row = document.querySelector(".roster-table tr.r-mine");
  if (!row) { _rosterMineDirty = false; return; }   // row filtered out → draft gone
  for (const f in d) {
    const el = row.querySelector(`[data-rme="${f}"]`);
    if (el) el.value = d[f];
  }
  rosterMarkMineDirty();
}
function rosterSaveMine(id) {
  if (!_fbMembersRef) return;
  if (!rosterCanEdit(id)) {
    toast(t('toast.roster_edit_own'), "error");
    renderBattlefields();
    return;
  }
  const d = rosterMineDraft();
  if (!d) return;
  const name = String(d.name).trim();
  if (!name) { toast(t('toast.name_required'), "error"); return; }  // keep the draft so it can be fixed
  for (const f of ["name", "job", "discord", "discordId"]) {
    if (String(d[f]).trim().length > ROSTER_FIELD_MAX[f]) {
      toast(t('toast.field_too_long', { field: rosterFieldLabel(f), max: ROSTER_FIELD_MAX[f] }), "error");
      return;
    }
  }
  let cp = Math.max(0, parseInt(String(d.cp).replace(/[^0-9]/g, ""), 10) || 0);
  if (cp > ROSTER_CP_MAX) {
    cp = ROSTER_CP_MAX;
    toast(t('toast.cp_capped', { max: ROSTER_CP_MAX.toLocaleString() }), "");
  }
  _rosterMineDirty = false;  // release the render hold; the listener refresh shows the saved row
  _fbMembersRef.child(id).update({
    name,
    job:       String(d.job).trim(),
    discord:   String(d.discord).trim(),
    discordId: String(d.discordId).trim(),
    cp,
    updatedAt: Date.now(),
    // Guest renaming themselves: stamp the NEW name (not the stale cache
    // one), with the same 👤 guest-marker prefix as rosterActorName()
    updatedBy: isAdmin() ? rosterActorName() : "👤 " + name.slice(0, 61)
  }).then(() => toast(t('toast.saved_ok'), "success")).catch(rosterWriteFailed);
}

function rosterDelete(id) {

function rosterImportFromSheet() {
  if (!isAdmin()) { toast("Admin only", "error"); return; }
  if (!_fbMembersRef) { toast(t('toast.fb_not_set'), "error"); return; }
  const sheetUrl = state.sheetUrl || DEFAULT_SHEET;
  if (!sheetUrl) { toast(t('toast.no_sheet_url'), "error"); return; }
  (async () => {
    try {
      toast(t('toast.loading_sheet'), "");
      const { id, gid } = parseSheetUrl(sheetUrl);
      const resp = await fetchSheetJSON(id, gid);
      const rows = gvizToRows(resp);
      const fetched = extractMembersFromRows(rows);

      // Mapping verification — show admin a preview of what each row will
      // become BEFORE writing to Firebase. Lets admin catch any wrong-column
      // mapping (e.g. Discord ID landed in CP) before any data is committed.
      console.log("[import] Column mapping:");
      console.log("  col C (idx 2)  → name");
      console.log("  col E (idx 4)  → job");
      console.log("  col F (idx 5)  → discord (@username)");
      console.log("  col L (idx 11) → CP");
      console.log("  col N (idx 13) → discordId");
      console.log("[import] Sample of first 5 fetched rows:");
      console.table(fetched.slice(0, 5));
      console.log(`[import] Total parsed: ${fetched.length} member(s)`);
      const sampleLines = fetched.slice(0, 3).map(m =>
        `  • ${m.name} (${m.job}) — Discord "${m.discord}" — Discord ID "${m.discordId}" — CP ${m.cp}`
      ).join("\n");
      const msg = t('confirm.import_sheet', { rows: fetched.length, sample: sampleLines });
      if (!confirm(msg)) {
        toast(t('toast.import_cancelled'), "");
        return;
      }

      // Fetch latest snapshot first — guarantees dedup check sees current Firebase
      // state (avoids race if listener hasn't fired yet on first load).
      const snap = await _fbMembersRef.once("value");
      const existing = [];
      snap.forEach(child => {
        existing.push({ id: child.key, ...child.val() });
      });
      let added = 0, updated = 0;
      for (const m of fetched) {
        const dup = existing.find(r => r.name === m.name && r.job === m.job);
        if (dup) {
          // Merge-only update: skip empty fields so an empty sheet cell
          // doesn't wipe a manually-entered Discord/Discord ID/CP value.
          // For new rows (no dup), we still seed empty defaults below.
          // updatedBy = the admin running the import — never leave a stale
          // member stamp paired with a fresh import timestamp (misattribution)
          const upd = { name: m.name, job: m.job, updatedAt: Date.now(), updatedBy: rosterActorName() };
          if (m.discord)    upd.discord   = m.discord;
          if (m.discordId)  upd.discordId = m.discordId;
          if (m.cp > 0)     upd.cp        = m.cp;
          await _fbMembersRef.child(dup.id).update(rosterClampFields(upd));
          updated++;
        } else {
          // Clamp BEFORE write: one out-of-spec sheet cell (e.g. an 18-digit
          // Discord ID landing in the CP column) must not abort the batch
          // against the rules validators.
          const payload = rosterClampFields({
            name:      m.name,
            job:       m.job,
            discord:   m.discord   || "",
            discordId: m.discordId || "",
            cp:        m.cp || 0,
            updatedAt: Date.now(),
            updatedBy: rosterActorName()
          });
          const ref = _fbMembersRef.push();
          await ref.set(payload);
          // Track so subsequent rows in this batch don't re-add the same name+job
          existing.push({ id: ref.key, ...payload });
          added++;
        }
      }
      toast(t('toast.import_done', { added: added, updated: updated }), "success");
      // Auto-dedupe any leftover duplicates from previous broken imports
      await rosterDedupe(true);
    } catch (e) {
      console.error("[import] failed", e);
      toast(t('toast.import_fail', { msg: e.message }), "error");
    }
  })();
}

/* Merge duplicates by name+job — keeps the best entry (has discord + higher cp). */
async function rosterDedupe(silent) {
  if (!isAdmin()) { toast("Admin only", "error"); return; }
  if (!_fbMembersRef) { toast(t('toast.fb_not_ready'), "error"); return; }
  if (!silent && !confirm(t('confirm.dedupe'))) return;
  // Pull latest snapshot — don't rely on local cache
  const snap = await _fbMembersRef.once("value");
  const all = [];
  snap.forEach(child => { all.push({ id: child.key, ...child.val() }); });
  const buckets = {};
  for (const m of all) {
    const key = (m.name || "") + "|" + (m.job || "");
    if (!buckets[key]) buckets[key] = [];
    buckets[key].push(m);
  }
  let removed = 0, merged = 0;
  for (const key in buckets) {
    const group = buckets[key];
    if (group.length <= 1) continue;
    // Pick "best" entry — has discord wins; tiebreaker: highest cp; tiebreaker: lowest id
    const best = group.reduce((a, b) => {
      const sa = (a.discord ? 1000000 : 0) + (a.cp || 0);
      const sb = (b.discord ? 1000000 : 0) + (b.cp || 0);
      return sb > sa ? b : a;
    });
    // Optionally merge any discord/discordId/cp into best if best is missing
    // them. Clamped: legacy rows can predate the rules validators, and one
    // over-long field must not kill the merge loop. updatedAt is refreshed,
    // so updatedBy must be too — stamp the admin running the dedupe (never
    // pair a fresh timestamp with a stale member name).
    const mergedPayload = rosterClampFields({
      name:      best.name,
      job:       best.job,
      discord:   best.discord   || group.find(g => g.discord)?.discord     || "",
      discordId: best.discordId || group.find(g => g.discordId)?.discordId || "",
      cp:        Math.max(...group.map(g => Number(g.cp) || 0)),
      updatedAt: Date.now(),
      updatedBy: rosterActorName()
    });
    await _fbMembersRef.child(best.id).update(mergedPayload).catch(rosterWriteFailed);
    merged++;
    // Remove all others
    for (const m of group) {
      if (m.id === best.id) continue;
      await _fbMembersRef.child(m.id).remove().catch(rosterWriteFailed);
      removed++;
    }
  }
  toast(t('toast.dedupe_done', { merged: merged, removed: removed }), "success");
}

/* ----- Roster page render ----- */
let _rosterSearch  = "";
let _rosterSortKey = "name";   // "name" | "job" | "discord" | "discordId" | "cp" | "updatedAt"
let _rosterSortDir = "asc";    // "asc" | "desc"

function rosterSearchInput(v) {
  _rosterSearch = (v || "").trim().toLowerCase();
  // Re-render only the table body to keep input focus; carry the self-edit
  // draft across the rebuild so searching can't wipe unsaved typing.
  const draft = _rosterMineDirty ? rosterMineDraft() : null;
  const tbody = document.querySelector(".roster-table tbody");
  if (tbody) tbody.innerHTML = buildRosterRowsHtml();
  if (draft) rosterApplyMineDraft(draft);
}

/** Click a header → sort by that column. Click again on the same column
 *  flips direction. Re-renders the whole Roster so the header arrow
 *  indicator updates too. */
function rosterSort(key) {
  if (_rosterSortKey === key) {
    _rosterSortDir = _rosterSortDir === "asc" ? "desc" : "asc";
  } else {
    _rosterSortKey = key;
    // Numeric/time columns default to descending (highest CP / most recent
    // first feels natural); string columns default to ascending (alphabetical).
    _rosterSortDir = (key === "cp" || key === "updatedAt") ? "desc" : "asc";
  }
  if (typeof render === "function") render();
}

function rosterSortArrow(key) {
  if (_rosterSortKey !== key) return ' <span style="opacity:0.3">↕</span>';
  return _rosterSortDir === "asc" ? ' <span style="color:#fbbf24">▲</span>' : ' <span style="color:#fbbf24">▼</span>';
}

function rosterApplySort(list) {
  const key = _rosterSortKey;
  const dir = _rosterSortDir === "asc" ? 1 : -1;
  const sorted = list.slice();
  if (key === "cp" || key === "updatedAt") {
    // Numeric sort — treat missing/null as 0 so unedited rows fall to bottom on desc
    sorted.sort((a, b) => ((a[key] || 0) - (b[key] || 0)) * dir);
  } else {
    sorted.sort((a, b) => (a[key] || "").localeCompare(b[key] || "", "th") * dir);
  }
  return sorted;
}

/** Members eligible to receive loot (excludes ลา for the matching mode). */
function getAuctionMembers(kind) {
  const leaveFlag = kind === "gl" ? "onLeaveLeague" : "onLeaveOverrun";
  return state.members.filter(m => !m[leaveFlag]);
}

function getAuctionAssignments(kind) {
  const obj = kind === "gl" ? state.auctionGL : state.auctionOverrun;
  if (!obj.assignments || !obj.assignments.main || !obj.assignments.sub) {
    obj.assignments = {
      main: { cards: [], white: [], black: [] },
      sub:  { cards: [], white: [], black: [] }
    };
  }
  return obj.assignments;
}

/** Live per-person allocation rates for an auction (admin-editable, synced).
 *  Falls back to AUCTION_DEFAULT_RATES for any missing/invalid key. Keys are
 *  card/illusion/white/black (note: "card" singular, matching ITEM_META.rateKey). */
function getAuctionRates(kind) {
  const def = AUCTION_DEFAULT_RATES[kind] || AUCTION_DEFAULT_RATES.gl;
  const obj = kind === "gl" ? state.auctionGL : state.auctionOverrun;
  const r = (obj && obj.rates) || {};
  const pick = (k) => (typeof r[k] === "number" && isFinite(r[k]) && r[k] >= 1) ? r[k] : def[k];
  return { card: pick("card"), illusion: pick("illusion"), white: pick("white"), black: pick("black") };
}

/** Admin-editable GL main/sub split — % of each item that goes to สนามหลัก (main);
 *  สนามรอง (sub) gets the rest. Clamped 0..100, default 70. GL only (Overrun has no
 *  sub). The remainder on an uneven split goes to MAIN (ceil) — see computeAuction. */
function getAuctionSplitPercent(kind) {
  if (kind !== "gl") return 100;
  const v = state.auctionGL && state.auctionGL.splitMainPercent;
  return (typeof v === "number" && isFinite(v) && v >= 0 && v <= 100) ? Math.round(v) : 70;
}

/** Compute totals + per-person allocation + shortage/leftover.
 *  Item counts are entered as FINAL totals — the old GL ×-bonus system
 *  (cards/illusion ×2, feathers ×(1+%/100)) was retired 2026-06; admins
 *  now type the post-bonus quantities themselves.
 *
 *  Demand is computed from the per-column assignment counts, not the total
 *  member list — user drags names into Card / Illusion / ขาว / ดำ columns
 *  themselves so the system only needs to know who's in each bucket.
 */
function computeAuction(kind) {
  const members = getAuctionMembers(kind);
  const people = members.length;
  const rate = getAuctionRates(kind);
  const assignments = getAuctionAssignments(kind);

  // Prune stale member IDs (member-set changed via sheet refresh / delete /
  // manual edit) so .length matches what actually renders. Without this the
  // count says "14 ppl" but the droplist shows zero rows.
  let assignmentsDirty = false;
  ["main", "sub"].forEach(field => {
    if (!assignments[field]) return;
    ["cards", "illusion", "white", "black"].forEach(key => {
      if (!Array.isArray(assignments[field][key])) { assignments[field][key] = []; return; }
      const before = assignments[field][key].length;
      assignments[field][key] = assignments[field][key].filter(id => findMember(id));
      if (assignments[field][key].length !== before) assignmentsDirty = true;
    });
  });
  if (assignmentsDirty) save();

  const src = kind === "gl" ? state.auctionGL : state.auctionOverrun;
  const totals = { cards: src.cards|0, illusion: src.illusion|0, white: src.white|0, black: src.black|0 };

  // GL splits each item between main+sub by an admin-editable percent (default
  // 70). The remainder on an uneven split goes to MAIN (ceil), so the leftover
  // item is auctioned on the main field. Overrun has no sub field — main pool
  // absorbs the full total (sub pool = 0, not rendered).
  const hasSubField = (kind === "gl");
  const mainPct = getAuctionSplitPercent(kind);
  const splitMain = (n) => hasSubField ? Math.ceil(n * mainPct / 100) : n;

  const buildSide = (field, key, pool, perPersonRate) => {
    const ids = assignments[field][key];
    const count = ids.length;
    const need = count * perPersonRate;
    const diff = pool - need;
    let status, statusCls;
    if (count === 0)        { status = t('auction.not_dragged'),              statusCls = "none" }
    else if (diff < 0)      { status = t('status.short', { n: -diff }),       statusCls = "short" }
    else if (diff === 0)    { status = t('auction.status_exact'),             statusCls = "ok" }
    else                    { status = t('auction.status_left', { n: diff }), statusCls = "over" }
    return { pool, count, need, diff, status, statusCls };
  };

  const ITEM_META = {
    cards:    { label: "🎴 Card",           rateKey: "card",     unit: "pcs" },
    illusion: { label: "🔮 Illusion Frag.", rateKey: "illusion", unit: "pcs" },
    white:    { label: "🪶 White",          rateKey: "white",    unit: "pcs" },
    black:    { label: "🪶 Black",          rateKey: "black",    unit: "pcs" }
  };
  const items = ["cards","illusion","white","black"].map(key => {
    const total    = totals[key];
    const mainPool = splitMain(total);
    const subPool  = total - mainPool;
    const meta     = ITEM_META[key];
    const itemRate = rate[meta.rateKey];
    return {
      key,
      label: meta.label,
      unit:  meta.unit,
      rate:  itemRate,
      total,
      main: buildSide("main", key, mainPool, itemRate),
      sub:  buildSide("sub",  key, subPool,  itemRate)
    };
  });

  // ---- Real auction page-map (4 items/page) from the ITEM POOL, not assigned
  // people. Shows today's page layout up front + anchors the per-person page
  // badges to the real auction even when columns are underfilled. Page numbers
  // depend on item COUNTS only — never on the editable per-person rate.
  const PP = AUCTION_ITEMS_PER_PAGE;
  const pagesFromCursor = (startCursor, count) => {
    if (count <= 0) {
      return { items: 0, startPage: null, endPage: null, startSlot: null,
               startCursor: null, endCursor: null, pageOffset: startCursor - 1 };
    }
    const endCursor = startCursor + count - 1;
    return {
      items: count, startCursor, endCursor,
      startPage: Math.ceil(startCursor / PP),
      endPage:   Math.ceil(endCursor / PP),
      startSlot: ((startCursor - 1) % PP) + 1,
      pageOffset: startCursor - 1
    };
  };
  // Items pack CONTINUOUSLY across pages: the next item type starts right after the
  // previous type's last slot, NOT on a fresh page. E.g. cards fill page 1, illusion
  // takes page 2 slots 1-2, then white starts on page 2 slot 3 (same page). Within a
  // type, main then sub run continuously (sub fills main's last partial page). One
  // path for GL + Overrun (Overrun just has sub.pool = 0). Pages come from item
  // COUNTS only, not the rate.
  let offset = 0;
  items.forEach(it => {
    it.main.page = pagesFromCursor(offset + 1, it.main.pool); offset += it.main.pool;
    it.sub.page  = pagesFromCursor(offset + 1, it.sub.pool);  offset += it.sub.pool;
  });
  // Per-type ruler (combine main+sub items per type) + whole-day total.
  const perType = items.map(it => {
    const m = it.main.page, s = it.sub.page;
    const startPage = (m.startPage != null) ? m.startPage : s.startPage;
    const endPage   = (s.endPage   != null) ? s.endPage   : m.endPage;
    return { key: it.key, label: it.label, items: it.total, startPage, endPage };
  });
  const totalItems = items.reduce((sum, it) => sum + it.total, 0);
  // Total pages = the last page actually used (gaps exist because each type
  // starts fresh, so this is NOT ceil(totalItems/4)).
  let totalPages = 0;
  items.forEach(it => {
    if (it.main.page.endPage) totalPages = Math.max(totalPages, it.main.page.endPage);
    if (it.sub.page.endPage)  totalPages = Math.max(totalPages, it.sub.page.endPage);
  });
  const pageMap = { perType, totalItems, totalPages };

  return { kind, members, people, rate, items, assignments, hasSubField, pageMap, splitMainPercent: mainPct };
}

// All four mutators call render() (not just renderBattlefields) so the sidebar's
// .assigned styling + "ซ่อนคนที่จัดตี้แล้ว" filter update with each drag/drop.
// `field` = "main" (70% pool) or "sub" (30% pool).
function assignAuctionMember(kind, field, item, memberId) {
  const a = getAuctionAssignments(kind);
  const bucket = a[field] && a[field][item];
  if (!bucket || bucket.includes(memberId)) return;
  bucket.push(memberId);
  save(); render();
}
function unassignAuctionMember(kind, field, item, memberId) {
  const a = getAuctionAssignments(kind);
  if (!a[field] || !a[field][item]) return;
  a[field][item] = a[field][item].filter(id => id !== memberId);
  save(); render();
}
function clearAuctionColumn(kind, field, item) {
  const a = getAuctionAssignments(kind);
  const bucket = a[field] && a[field][item];
  if (!bucket || !bucket.length) return;
  if (!confirm(t('confirm.clear_column'))) return;
  a[field][item] = [];
  save(); render();
}
function autoFillAuctionColumn(kind, field, item) {
  const eligibleMembers = getAuctionMembers(kind);
  const a = getAuctionAssignments(kind);
  if (!a[field]) return;
  a[field][item] = eligibleMembers.map(m => m.id);
  save(); render();
}
function dropAuctionColumn(e, kind, field, item) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  if (drag.type === "member") {
    assignAuctionMember(kind, field, item, drag.payload.memberId);
  }
}

function setAuctionField(kind, field, value) {
  // Strip non-digits so the displayed value can't drift from parsed state.
  const cleaned = String(value).replace(/[^0-9]/g, "");
  let n = parseInt(cleaned, 10);
  if (isNaN(n) || n < 0) n = 0;
  if (kind === "gl") {
    if (state.auctionGL[field] === n) return;
    state.auctionGL[field] = n;
  } else {
    if (state.auctionOverrun[field] === n) return;
    state.auctionOverrun[field] = n;
  }
  save();
  // Preserve focus + cursor + scroll across re-render so the user can keep
  // typing without the page jumping. preventScroll on focus is the canonical
  // fix; window.scrollTo is the belt-and-suspenders for browsers that
  // ignore the hint.
  let cursorPos = null;
  const focused = document.activeElement;
  if (focused && focused.tagName === "INPUT") {
    try { cursorPos = focused.selectionStart; } catch (e) {}
  }
  const scrollX = window.scrollX, scrollY = window.scrollY;
  renderBattlefields();
  const newInput = document.querySelector(
    `input[data-auction-kind="${kind}"][data-auction-field="${field}"]`
  );
  if (newInput) {
    try { newInput.focus({ preventScroll: true }); } catch (e) { newInput.focus(); }
    // Cursor: keep where the user had it if known; otherwise park at end
    // (typing happens at end). Never default to position 0 — that's the bug
    // the user reported ("เด้งมาข้างหน้า").
    const pos = (cursorPos != null) ? Math.min(cursorPos, newInput.value.length) : newInput.value.length;
    try { newInput.setSelectionRange(pos, pos); } catch (e) {}
  }
  window.scrollTo(scrollX, scrollY);
}

/** Admin-editable per-person allocation rate (จำนวนของที่ได้รับต่อคน).
 *  `rateKey` is card/illusion/white/black. Minimum 1 per person. Mirrors
 *  setAuctionField's focus/cursor/scroll preservation so admins can keep
 *  typing across the re-render without the page jumping. */
function setAuctionRate(kind, rateKey, value) {
  if (!isAdmin()) { toast(t('toast.rate_admin_only'), "error"); return; }
  const cleaned = String(value).replace(/[^0-9]/g, "");
  let n = parseInt(cleaned, 10);
  if (isNaN(n) || n < 1) n = 1;          // at least 1 item per person
  const obj = kind === "gl" ? state.auctionGL : state.auctionOverrun;
  if (!obj.rates) obj.rates = { ...(AUCTION_DEFAULT_RATES[kind] || AUCTION_DEFAULT_RATES.gl) };
  if (obj.rates[rateKey] === n) return;
  obj.rates[rateKey] = n;
  save();
  let cursorPos = null;
  const focused = document.activeElement;
  if (focused && focused.tagName === "INPUT") {
    try { cursorPos = focused.selectionStart; } catch (e) {}
  }
  const scrollX = window.scrollX, scrollY = window.scrollY;
  renderBattlefields();
  const newInput = document.querySelector(
    `input[data-auction-rate-kind="${kind}"][data-auction-rate-item="${rateKey}"]`
  );
  if (newInput) {
    try { newInput.focus({ preventScroll: true }); } catch (e) { newInput.focus(); }
    const pos = (cursorPos != null) ? Math.min(cursorPos, newInput.value.length) : newInput.value.length;
    try { newInput.setSelectionRange(pos, pos); } catch (e) {}
  }
  window.scrollTo(scrollX, scrollY);
}

/** Admin-editable GL main/sub split %. Mirrors setAuctionRate's focus/scroll
 *  preservation. GL only; clamps 0..100. Sub % is derived (100 − main). */
function setAuctionSplitPercent(kind, value) {
  if (kind !== "gl") return;
  if (!isAdmin()) { toast(t('toast.split_admin_only'), "error"); return; }
  // Keep a leading "-" so a typed negative clamps to 0 (don't strip it to a positive).
  const cleaned = String(value).replace(/[^0-9-]/g, "");
  let n = parseInt(cleaned, 10);
  if (isNaN(n)) n = 70;
  if (n < 0) n = 0; if (n > 100) n = 100;
  if (state.auctionGL.splitMainPercent === n) return;
  state.auctionGL.splitMainPercent = n;
  save();
  let cursorPos = null;
  const focused = document.activeElement;
  if (focused && focused.tagName === "INPUT") {
    try { cursorPos = focused.selectionStart; } catch (e) {}
  }
  const scrollX = window.scrollX, scrollY = window.scrollY;
  renderBattlefields();
  const newInput = document.querySelector(`input[data-auction-split-kind="${kind}"]`);
  if (newInput) {
    try { newInput.focus({ preventScroll: true }); } catch (e) {}
    const pos = (cursorPos != null) ? Math.min(cursorPos, newInput.value.length) : newInput.value.length;
    try { newInput.setSelectionRange(pos, pos); } catch (e) {}
  }
  window.scrollTo(scrollX, scrollY);
}

function buildAuctionInputCard(opts) {
  const { icon, label, value, rate, perPersonLabel, effective, status, statusCls,
          kind, field, rateItemKey, rateEditable } = opts;
  const effectiveLine = effective != null
    ? `<div class="ai-effective">= ${effective} ${t('auction.effective')}</div>` : "";
  const statusLine = status
    ? `<div class="ai-status ${statusCls || ""}">${status}</div>` : "";
  // Per-person rate: editable input for admins (synced), read-only text for
  // viewers. rateItemKey is the rates key (card/illusion/white/black).
  let rateLine = "";
  if (rate != null) {
    rateLine = rateEditable
      ? `<div class="ai-rate ai-rate-edit">
           <input type="text" inputmode="numeric" pattern="[0-9]*" value="${rate}"
                  data-auction-rate-kind="${kind}" data-auction-rate-item="${rateItemKey}"
                  oninput="setAuctionRate('${kind}','${rateItemKey}',this.value)"
                  onfocus="this.select()" />
           <span class="ai-rate-suffix">${perPersonLabel}</span>
         </div>`
      : `<div class="ai-rate"><b>${rate}</b> ${perPersonLabel}</div>`;
  }
  return `
    <div class="auction-input-card">
      <div class="ai-label"><span class="ai-icon">${icon}</span>${label}</div>
      <input type="text" inputmode="numeric" pattern="[0-9]*" value="${value}"
             data-auction-kind="${kind}" data-auction-field="${field}"
             oninput="setAuctionField('${kind}','${field}',this.value)"
             onfocus="this.select()" />
      ${rateLine}
      ${effectiveLine}
      ${statusLine}
    </div>`;
}

function buildAuctionView(kind) {
  const data = computeAuction(kind);
  const isGL = kind === "gl";
  const titleIcon = "🎴";
  const title = isGL ? "Auction GL" : "Auction Overrun";
  const rateLabel = `1 / ${data.rate.white} / ${data.rate.black}`;

  // Item-count inputs (admin types the FINAL quantities — no multiplier)
  // per-person unit is one label in pt/en (the 3 Thai classifiers ใบ/ชิ้น/ขน collapse)
  const ppLbl = t('auction.per_person_unit');
  const itemCountInputs = ["cards","illusion","white","black"].map(field => {
    const it = data.items.find(i => i.key === field);
    const labelMap = {
      cards:    ["🎴","Card"],
      illusion: ["🔮","Illusion Frag."],
      white:    ["🪶","White"],
      black:    ["🪶","Black"]
    };
    const [icon, lbl] = labelMap[field];
    // Map the item field → its rates key ("cards" item uses the "card" rate).
    const RATE_KEY = { cards: "card", illusion: "illusion", white: "white", black: "black" };
    return buildAuctionInputCard({
      icon, label: lbl,
      value: it.total,
      rate: it.rate,
      perPersonLabel: ppLbl,
      kind, field,
      rateItemKey: RATE_KEY[field],
      rateEditable: isAdmin()
    });
  }).join("");

  // Status summary — for GL shows main+sub split; for Overrun a single combined
  // pool. Status column gives the worst of the rendered sides.
  const summaryRows = data.items.map(it => {
    if (data.hasSubField) {
      const worst = it.sub.diff < it.main.diff ? it.sub : it.main;
      const fieldName = worst === it.main ? t('auction.field_main_short') : t('auction.field_sub_short');
      const statusText = worst.statusCls === "none" ? t('auction.not_dragged') : `${fieldName}: ${worst.status}`;
      return `
        <tr>
          <td class="item">${it.label}</td>
          <td class="num"><b>${it.total}</b></td>
          <td class="num" style="color:#fbbf24">${it.main.need}/<b>${it.main.pool}</b></td>
          <td class="num" style="color:#06b6d4">${it.sub.need}/<b>${it.sub.pool}</b></td>
          <td class="status-cell ${worst.statusCls}">${statusText}</td>
        </tr>`;
    }
    return `
      <tr>
        <td class="item">${it.label}</td>
        <td class="num"><b>${it.total}</b></td>
        <td class="num">${it.main.need}/<b>${it.main.pool}</b></td>
        <td class="status-cell ${it.main.statusCls}">${it.main.status}</td>
      </tr>`;
  }).join("");

  const shortPairs = [];
  data.items.forEach(it => {
    const fields = data.hasSubField ? ["main","sub"] : ["main"];
    fields.forEach(f => {
      if (it[f].diff < 0) shortPairs.push({ label: it.label, field: f, short: -it[f].diff });
    });
  });
  const fieldLabel = (f) => f === "main" ? t('auction.field_main') : t('auction.field_sub');
  const warning = (data.people > 0 && shortPairs.length) ? `
    <div class="auction-warning">
      ⚠️ <b>${t('auction.not_enough')}</b> — ${shortPairs.map(s => data.hasSubField
          ? `${s.label.replace(/^[^\s]+\s/, "")}(${fieldLabel(s.field)}) ${t('status.short',{n:s.short})}`
          : `${s.label.replace(/^[^\s]+\s/, "")} ${t('status.short',{n:s.short})}`).join(", ")}
    </div>` : "";

  // GL main/sub split %: admin types main %, sub = 100 − main (live). Remainder
  // on an uneven split goes to main (see computeAuction's ceil). GL only.
  const splitPct = data.splitMainPercent;
  const splitSection = isGL ? `
    <div class="auction-section split">
      <h3>${t('auction.split_title')}</h3>
      <div class="auction-split-row">
        <span class="label">${t('auction.split_to_main')}</span>
        ${isAdmin()
          ? `<input class="auction-split-input" type="text" inputmode="numeric" pattern="[0-9]*"
                    value="${splitPct}" data-auction-split-kind="gl"
                    oninput="setAuctionSplitPercent('gl', this.value)" onfocus="this.select()" />`
          : `<b class="auction-split-static">${splitPct}</b>`}
        <span class="label">${t('auction.split_rest_sub')} <b>${100 - splitPct}%</b></span>
      </div>
      <div class="auction-split-note">${t('auction.split_note',{pct:splitPct, a:Math.ceil(5*splitPct/100), b:5-Math.ceil(5*splitPct/100)})}</div>
    </div>` : "";

  // Two sets of 3 drag-drop columns: สนามหลัก (main, 70% pool) + สนามรอง (sub, 30% pool).
  // Each column = drop zone for member chips; per-person quantity auto-filled by rate.
  const COL_STYLES = {
    cards:    "#ec4899",
    illusion: "#a855f7",
    white:    "#fbbf24",
    black:    "#6b7280"
  };
  const buildAuctionCol = (field, it) => {
    const side = it[field];
    const ids = data.assignments[field][it.key];
    // Page numbering:
    //  - GL: ONE continuous chain across all 8 buckets in order:
    //      การ์ดสนามหลัก → การ์ดสนามรอง → Illusion-หลัก → Illusion-รอง
    //      → ขนขาว-หลัก → ขนขาว-รอง → ขนดำ-หลัก → ขนดำ-รอง
    //    chainOffset for a bucket = cumulative items used by earlier buckets
    //    in the chain (each bucket's people × that bucket's item rate). Page =
    //    ceil(startItem / 4), no reset within a bucket.
    //  - Overrun: chain is INDEPENDENT per column (cards/illusion/white/black
    //    each start at item #1). Within a column, items run sequentially across
    //    auction pages of 4 slots, splitting a person's allocation across pages
    //    when needed (e.g. Overrun white/black rate=10 → 1 คน กิน 3 หน้า).
    // Per-person badge offset = where this bucket's items START in the real
    // auction, taken from the pool-anchored page-map (computeAuction). This makes
    // a person's page correct even when earlier columns are underfilled. GL chains
    // across all 8 buckets by item pool; Overrun is independent (pageOffset 0).
    const chainOffset = (side.page && typeof side.page.pageOffset === "number") ? side.page.pageOffset : 0;
    const rows = ids.map((memId, i) => {
      const m = findMember(memId);
      if (!m) return "";
      // Search filter — if a query is active, hide rows that don't match the
      // name. Index `i` is preserved so page calculation stays correct for the
      // visible rows (a person searched mid-list still sees their real page).
      if (_auctionSearch && !(m.name || "").toLowerCase().includes(_auctionSearch)) {
        return "";
      }
      // Items number 1-4 LOCAL to each page (reset whenever the page changes).
      // Split the person's allocation into segments per real auction page (one
      // badge per page they touch). Both modes share the same chain math; only
      // chainOffset differs (GL chains across buckets, Overrun resets to 0 per
      // column).
      const segments = [];
      {
        let remaining = it.rate;
        let cursor    = chainOffset + i * it.rate + 1;
        while (remaining > 0) {
          const pg         = Math.ceil(cursor / AUCTION_ITEMS_PER_PAGE);
          const startLocal = ((cursor - 1) % AUCTION_ITEMS_PER_PAGE) + 1;
          const slotsLeft  = AUCTION_ITEMS_PER_PAGE - startLocal + 1;
          const take       = Math.min(slotsLeft, remaining);
          segments.push({ page: pg, startLocal, endLocal: startLocal + take - 1 });
          cursor    += take;
          remaining -= take;
        }
      }
      const pageBadge = segments.map(s => {
        const itemsTxt = s.startLocal === s.endLocal ? t('auction.item_n',{a:s.startLocal}) : t('auction.item_range',{a:s.startLocal,b:s.endLocal});
        return `<span class="aar-page">${t('auction.page_badge',{page:s.page,items:itemsTxt})}</span>`;
      }).join("");
      return `
        <div class="auction-assigned-row">
          <span class="aar-rk">${i + 1}.</span>
          <div class="aar-info">
            <span class="aar-name">${escapeHtml(m.name)}</span>
            <span class="aar-job">${escapeHtml(m.job || "")}</span>
            ${pageBadge}
          </div>
          <span class="aar-del" title="${t('auction.remove')}"
                onclick="unassignAuctionMember('${data.kind}','${field}','${it.key}','${m.id}')">×</span>
        </div>`;
    }).join("");

    // per-person unit is one label in pt/en (the 3 Thai classifiers ใบ/ชิ้น/ขน collapse)
    const ppLabel = t('auction.per_person_unit');
    const poolLabel = !data.hasSubField ? t('auction.total_short')
                    : field === "main"  ? (t('auction.field_main_short') + data.splitMainPercent + "%")
                                        : (t('auction.field_sub_short') + (100 - data.splitMainPercent) + "%");
    // Real auction pages this column's item pool occupies (supply-based).
    const pg = side.page;
    // Show the exact slot range, not just the page, so a partial page reads
    // correctly (e.g. 2 items on page 6 = "หน้า 6 ชิ้น 1-2", not "ทั้งหน้า 6").
    const PP_chip = AUCTION_ITEMS_PER_PAGE;
    let pageChip;
    if (side.pool > 0 && pg && pg.startPage != null) {
      const endSlot = ((pg.endCursor - 1) % PP_chip) + 1;
      if (pg.startPage === pg.endPage) {
        const slotTxt = pg.startSlot === endSlot ? t('auction.item_n',{a:pg.startSlot}) : t('auction.item_range',{a:pg.startSlot,b:endSlot});
        pageChip = t('auction.pagechip_single',{page:pg.startPage,slots:slotTxt,items:pg.items});
      } else {
        pageChip = t('auction.pagechip_multi',{sp:pg.startPage,ss:pg.startSlot,ep:pg.endPage,es:endSlot,items:pg.items});
      }
    } else {
      pageChip = t('auction.no_items');
    }
    // Coverage: how far the people DRAGGED IN so far fill this column's pool,
    // vs the target pages above — so the admin sees what's still missing without
    // counting. side.need = count × rate (items the assigned people will take).
    let coverageChip = "", coverageCls = "";
    if (side.pool > 0 && pg && pg.startCursor != null) {
      if (side.count === 0) {
        coverageChip = t('auction.cov_none',{n:side.pool});
        coverageCls = "none";
      } else if (side.need >= side.pool) {
        const over = side.need - side.pool;
        coverageChip = over > 0 ? t('auction.cov_over',{n:over}) : t('auction.cov_done');
        coverageCls = over > 0 ? "over" : "ok";
      } else {
        const coveredEndPage = Math.ceil((pg.startCursor + side.need - 1) / AUCTION_ITEMS_PER_PAGE);
        const remain = side.pool - side.need;
        const remainPages = Math.max(0, pg.endPage - coveredEndPage);
        coverageChip = t('auction.cov_short',{page:coveredEndPage,n:remain,pages: remainPages > 0 ? t('auction.cov_short_pages',{n:remainPages}) : ""});
        coverageCls = "short";
      }
    }
    return `
      <div class="auction-column" style="--col:${COL_STYLES[it.key]}">
        <div class="ac-head">
          <span>${it.label}</span>
          <span class="ac-rate"><b>${it.rate}</b> ${ppLabel}</span>

        <div class="ac-stats">
          <div>
            <span class="ac-stat-label">${t('auction.stat_people')}</span>
            <span class="ac-stat-val">${side.count}</span>
          </div>
          <div>
            <span class="ac-stat-label">${t('auction.stat_used',{pool:poolLabel})}</span>
            <span class="ac-stat-val">${side.need}/${side.pool}</span>
          </div>
          <div>
            <span class="ac-stat-label">${t('common.status')}</span>
            <span class="ac-stat-val ac-status ${side.statusCls}">${side.status}</span>
          </div>
        </div>
        <div class="ac-pagemap ${side.pool > 0 ? "" : "empty"}">${pageChip}</div>
        ${coverageChip ? `<div class="ac-coverage ${coverageCls}">${coverageChip}</div>` : ""}
        <div class="ac-droplist"
             ondragover="dragOverEl(event)"
             ondragleave="dragLeaveEl(event)"
             ondrop="dropAuctionColumn(event,'${data.kind}','${field}','${it.key}')">
          ${rows || (_auctionSearch
            ? `<div class="ac-empty">🔍 ${t('auction.col_no_match',{q:escapeHtml(_auctionSearch)})}</div>`
            : `<div class="ac-empty">${t('auction.drop_here')}</div>`)}
        </div>
        <div class="ac-actions">
          <button onclick="autoFillAuctionColumn('${data.kind}','${field}','${it.key}')">${t('auction.fill_all')}</button>
          <button class="danger" onclick="clearAuctionColumn('${data.kind}','${field}','${it.key}')">${t('auction.clear')}</button>
        </div>
      </div>`;
  };

  const mainCols = data.items.map(it => buildAuctionCol("main", it)).join("");
  const subCols  = data.hasSubField ? data.items.map(it => buildAuctionCol("sub",  it)).join("") : "";

  const noMembersFallback = `
    <div style="color:var(--muted);text-align:center;padding:30px">
      ${t('auction.no_members')}
    </div>`;
  const mainHeader = data.hasSubField
    ? t('auction.main_header_gl',{pct:data.splitMainPercent})
    : t('auction.main_header_ov');

  // Search input — lets guests filter by their name to see only their rows.
  // The search applies to BOTH main + sub columns; columns without a match
  // show a placeholder so it's clear "ไม่มีชื่อนี้ในคอลัมน์นี้".
  const searchSection = `
    <div class="auction-section" style="padding:10px 14px">
      <input class="auction-search-input"
             placeholder="${t('auction.search_ph')}"
             value="${escapeHtml(_auctionSearch || "")}"
             oninput="auctionSearchInput(this.value)" />
      ${_auctionSearch ? `<button onclick="auctionSearchInput('')" style="margin-left:6px;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px">${t('auction.clear_search')}</button>` : ""}
    </div>`;
  const memberSection = `
    <div class="auction-section">
      <h3>${mainHeader}</h3>
      ${data.members.length ? `<div class="auction-columns">${mainCols}</div>` : noMembersFallback}

  const subSection = data.hasSubField ? `
    <div class="auction-section">
      <h3>${t('auction.sub_header',{pct:100-data.splitMainPercent})}</h3>
      ${data.members.length ? `<div class="auction-columns">${subCols}</div>` : noMembersFallback}
    </div>` : "";

  // Top page ruler — today's whole-day auction layout from the item pool.
  const pm = data.pageMap;
  const typeChips = pm.perType.filter(tc => tc.items > 0).map(tc => {
    const span = (tc.startPage === tc.endPage) ? t('auction.page_n',{n:tc.startPage}) : t('auction.page_range',{a:tc.startPage,b:tc.endPage});
    return `<span class="apm-chip" style="--col:${COL_STYLES[tc.key]}">${tc.label} ${span}</span>`;
  }).join("");
  let pageMapStrip;
  if (pm.totalItems === 0) {
    pageMapStrip = `<div class="auction-pagemap-strip empty">${t('auction.pm_empty')}</div>`;
  } else {
    const head = data.hasSubField
      ? `📄 ${t('auction.pm_today_total')} <b>${pm.totalItems}</b> ${t('auction.unit_pcs')} = <b>${pm.totalPages}</b> ${t('auction.unit_pages')} <span class="apm-sub">(${t('auction.pm_note_gl')})</span>`
      : `📄 ${t('auction.pm_today_total')} <b>${pm.totalItems}</b> ${t('auction.unit_pcs')} <span class="apm-sub">(${t('auction.pm_note_ov')})</span>`;
    pageMapStrip = `<div class="auction-pagemap-strip"><div class="apm-head">${head}</div><div class="apm-chips">${typeChips}</div></div>`;
  }

  return `
    <div class="auction-view">
      <div class="auction-hero ${isGL ? "" : "overrun"}">
        <h2>${titleIcon} ${title}</h2>
        <div class="spacer" style="flex:1"></div>
        <div class="auction-meta">
          <span class="rate-pill">${t('auction.meta_people')} <b>${data.people}</b></span>
          <span class="rate-pill">${t('auction.meta_rate')} <b>${rateLabel}</b></span>
        </div>
      </div>

      <div class="auction-section">
        <h3>${t('auction.qty_title')}</h3>
        <div class="auction-inputs">${itemCountInputs}</div>
      </div>

      ${splitSection}

      <div class="auction-section">
        <h3>${t('auction.summary_title')}</h3>
        <table class="auction-summary-table">
          <thead>
            <tr>
              <th style="text-align:left">${t('auction.col_item')}</th>
              <th>${t('auction.total_short')}</th>
              ${data.hasSubField ? `
                <th>${t('auction.field_main')}<br><span style="font-weight:400;font-size:9px">${t('auction.used_slash')}${data.splitMainPercent}%</span></th>
                <th>${t('auction.field_sub')}<br><span style="font-weight:400;font-size:9px">${t('auction.used_slash')}${100 - data.splitMainPercent}%</span></th>
              ` : `<th>${t('auction.used_have')}</th>`}
              <th>${t('common.status')}</th>
            </tr>
          </thead>
          <tbody>${summaryRows}</tbody>
        </table>
        ${warning}

      ${pageMapStrip}
