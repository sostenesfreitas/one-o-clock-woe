}

function buildAuctionGlHtml()      { return buildAuctionView("gl"); }
function buildAuctionOverrunHtml() { return buildAuctionView("overrun"); }

/* =====================================================================
 * Auction Request page (ขอประมูล)
 * =====================================================================
 * Guest claims their identity, picks date + items, submits a request.
 * Admin sees a queue grouped by item × main/sub, approves/rejects.
 * Auto-routes (main vs sub) by checking which party the member is in.
 * Auto-cuts when an item's capacity is reached.
 * Auto-clears on the day after activity ends.
 *
 * Data shape (Firebase):
 *   /auction_requests/{date}/{mode}/{requestId} = {
 *     id, memberId, memberName, items: ["cards", ...],
 *     note, status, computedField, requestedAt, decidedAt, decidedBy,
 *     rejectReason
 *   }
 */
const AR_CLAIMED_KEY    = "roo_party_claimed_member";
const AR_ITEM_META = {
  cards:    { label: "🎴 Card",           rateKey: "card",     unit: "pcs"  },
  illusion: { label: "🔮 Illusion Frag.", rateKey: "illusion", unit: "pcs"  },
  white:    { label: "🪶 White",          rateKey: "white",    unit: "pcs"  },
  black:    { label: "🪶 Black",          rateKey: "black",    unit: "pcs"  }
};

// View state for the request page (not persisted; rebuilt on render)
let _arSelectedDate = null;
let _arModalState   = null;  // { date, mode, items: Set, note } when modal open

/* Canonical claim helpers — the claim is a cross-page member identity used
 * by BOTH the Auction Request page and the Roster self-edit feature. The
 * ar* names are kept as aliases so the existing auction wiring (inline
 * onclick strings included) keeps working. */
function claimGetMemberId() {
  return localStorage.getItem(AR_CLAIMED_KEY) || "";
}
function claimSetMember(id) {
  if (id) localStorage.setItem(AR_CLAIMED_KEY, id);
  else    localStorage.removeItem(AR_CLAIMED_KEY);
  render();
}
function arGetClaimedMemberId() { return claimGetMemberId(); }
function arSetClaimedMember(id) { claimSetMember(id); }

/** Shared <option> list for the claim choosers (Roster + Auction Request).
 *  Ghost rows (blank name — deliberately kept for dedupe) are NOT selectable:
 *  claiming one would let edits ride an anonymous "guest" updatedBy stamp. */
function claimOptionsHtml(members) {
  return (members || [])
    .filter(m => (m.name || "").trim())
    .map(m => `<option value="${escapeHtml(m.id)}">${escapeHtml(m.name)} (${escapeHtml(m.job || "?")})</option>`)
    .join("");
}

/** Has the member registered leave for the given date in /leaves/?
 *  state.leaves[memberId][date] === true means "ลา". Members on leave
 *  for the war day forfeit their auction request right.
 */
function arHasLeaveOnDate(memberId, date) {
  if (!memberId || !date || !state.leaves) return false;
  const bucket = state.leaves[memberId];
  return !!(bucket && bucket[date]);
}

function arGetDateRange() {
  // Auction requests are accepted for the CURRENT event day only — never in
  // advance. So the range is just today (Brasília). Non-event days (and any future
  // date) render a locked page; see buildAuctionRequestHtml / isEventDay.
  return [todayBkkISO()];
}

// Auction Request opens ONLY on the current event day (อังคาร/พฤหัส = GL,
// อาทิตย์ = Overrun via isEventDay), and only for that day's event — no
// requesting a future event in advance. Non-event days are locked. Daily
// reset wipes the auction pages at 00:00 Brasília so each event day starts fresh.

/** Detect main/sub for a member in a given mode. Returns "main" | "sub" | null. */
function arDetectField(memberId, mode) {
  const parties = mode === "gl" ? state.partiesLeague : state.partiesOverrun;
  if (!Array.isArray(parties)) return null;
  for (let i = 0; i < parties.length; i++) {
    const p = parties[i];
    if (p && Array.isArray(p.slots) && p.slots.includes(memberId)) {
      // Parties 1-8 (index 0-7) = main field; 9-16 = sub field
      return i < 8 ? "main" : "sub";
    }
  }
  return null;
}

function arGetRequests(date, mode) {
  const all = (state.auctionRequests && state.auctionRequests[date]) || {};
  const list = (all[mode]) || {};
  return Object.values(list).sort((a, b) => (a.requestedAt || 0) - (b.requestedAt || 0));
}

// "13:05:22" in America/Sao_Paulo (Brasília) for a request timestamp; "—" for legacy
// entries without one. Seconds matter — people race at event open.
function arFormatTime(ms) {
  if (typeof ms !== "number" || !isFinite(ms) || ms <= 0) return "—";
  return new Date(ms).toLocaleTimeString("pt-BR",
    { timeZone: "America/Sao_Paulo", hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function arGetMyRequests(memberId) {
  if (!memberId || !state.auctionRequests) return [];
  const out = [];
  Object.entries(state.auctionRequests).forEach(([date, byMode]) => {
    Object.entries(byMode || {}).forEach(([mode, byId]) => {
      Object.values(byId || {}).forEach(r => {
        if (r.memberId === memberId) out.push({ ...r, date, mode });
      });
    });
  });
  return out.sort((a, b) => (b.requestedAt || 0) - (a.requestedAt || 0));
}

/** The member's current ACTIVE request for this event (pending or approved), or
 *  null. Rejected/withdrawn don't count — those let the member ask again. This is
 *  the single source of truth for the "one item per person per event" rule. */
function arActiveRequestFor(memberId, date, mode) {
  if (!memberId) return null;
  return arGetRequests(date, mode).find(r =>
    r.memberId === memberId && r.status !== "rejected" && r.status !== "withdrawn"
  ) || null;
}

/** Returns true if the request was kicked off (modal can close), false on
 *  any synchronous validation failure (modal should stay open so the user
 *  doesn't lose their selections). The async write itself may still fail
 *  later — that's surfaced via toast in .catch. */
function arCreateRequest({ date, mode, items, note }) {
  if (!_fbDB) { toast(t("toast.fb_not_ready"), "error"); return false; }
  const memberId = arGetClaimedMemberId();
  if (!memberId) { toast(t("toast.ar_select_name_first"), "error"); return false; }
  const m = findMember(memberId);
  if (!m) { toast(t("toast.ar_member_not_found"), "error"); return false; }
  // Event-day + mode + leave gate (current day only, GL/Overrun must match
  // today's event — see arRequestBlockReason).
  const block = arRequestBlockReason(memberId, date, mode);
  if (block) { toast(block, "error"); return false; }
  if (!Array.isArray(items) || items.length === 0) { toast(t("toast.ar_pick_one"), "error"); return false; }
  // One item TYPE per person per event (the modal is single-select; guard here too).
  if (items.length > 1) { toast(t("toast.ar_only_one"), "error"); return false; }

  // One ACTIVE request per person per event: if they already have a pending or
  // approved request for this date+mode, they must withdraw the old one before
  // asking for something else. (Rejected/withdrawn don't count.)
  const active = arActiveRequestFor(memberId, date, mode);
  if (active) {
    const cur = (active.items || []).map(k => (AR_ITEM_META[k] ? AR_ITEM_META[k].label : k)).join(", ");
    toast(t("toast.ar_already", { item: cur }), "error");
    return false;
  }

  const id = "req_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7);
  const computedField = arDetectField(memberId, mode);
  const req = {
    id,
    memberId,
    memberName: m.name || "",
    items: items.slice(),
    note: (note || "").slice(0, 200),
    status: "pending",
    computedField,
    // SERVER clock, not the guest's device clock — the queue page sorts and
    // numbers by this, so a skewed/forged client time must not jump the line.
    // (The compat SDK substitutes its server-offset estimate in the local
    // echo, so the row shows a sane time immediately.)
    requestedAt: firebase.database.ServerValue.TIMESTAMP,
    decidedAt: null,
    decidedBy: null,
    rejectReason: null
  };
  _fbDB.ref(`auction_requests/${date}/${mode}/${id}`).set(req)
    .then(() => toast(t("toast.ar_sent"), "success"))
    .catch(e => {
      toast(t("toast.ar_send_fail", { msg: e.message }), "error");
      console.error("[auction-request] create failed", e);
    });
  return true;   // all synchronous checks passed — let arSubmitModal close the modal
}

async function arApproveRequest(date, mode, requestId) {
  if (!isAdmin()) { toast(t("toast.users_need_admin"), "error"); return; }
  const r = ((state.auctionRequests || {})[date] || {})[mode] || {};
  const req = r[requestId];
  if (!req) return;
  if (req.status === "approved") return;
  // Re-detect field at approve time so the member lands in the column
  // matching their CURRENT party assignment, not whatever snapshot the
  // request was created with. Falls back to the stored value (if any)
  // then to "main" if the member isn't in any party.
  let field = arDetectField(req.memberId, mode) || req.computedField || "main";
  // Overrun has no sub-field column in the auction UI — force main so
  // approved members don't vanish into an invisible bucket.
  if (mode === "overrun") field = "main";
  const auctionKey = mode === "gl" ? "auctionGL" : "auctionOverrun";
  const obj = state[auctionKey];
  if (!obj) { toast(t("toast.ar_no_auction_state"), "error"); return; }
  if (!obj.assignments) obj.assignments = { main: {}, sub: {} };
  ["main","sub"].forEach(f => {
    if (!obj.assignments[f]) obj.assignments[f] = { cards: [], illusion: [], white: [], black: [] };
    ["cards","illusion","white","black"].forEach(k => {
      if (!Array.isArray(obj.assignments[f][k])) obj.assignments[f][k] = [];
    });
  });
  (req.items || []).forEach(item => {
    const bucket = obj.assignments[field][item];
    if (bucket && !bucket.includes(req.memberId)) bucket.push(req.memberId);
  });
  // Persist auction state — await so bulk-approve loop serializes writes
  // and the next iteration sees the listener's echo before mutating obj
  try {
    if (_fbDB) await _fbDB.ref(mode === "gl" ? "auction_gl" : "auction_overrun").set(obj);
  } catch (e) {
    toast(t("toast.ar_write_fail", { msg: e.message }), "error");
    console.error("[auction-request] write auction state failed", e);
    return;
  }
  // Mark request approved
  await _fbDB.ref(`auction_requests/${date}/${mode}/${requestId}`).update({
    status: "approved",
    decidedAt: Date.now(),
    decidedBy: (_fbUser && _fbUser.email) || "admin",
    computedField: field
  }).catch(e => {
    toast(t("toast.ar_approve_fail", { msg: e.message }), "error");
    console.error("[auction-request] approve failed", e);
  });
}

function arRejectRequest(date, mode, requestId, reason) {
  if (!isAdmin()) { toast(t("toast.users_need_admin"), "error"); return; }
  // If was previously approved, also remove from auction columns
  const r = ((state.auctionRequests || {})[date] || {})[mode] || {};
  const req = r[requestId];
  if (req && req.status === "approved") {
    const auctionKey = mode === "gl" ? "auctionGL" : "auctionOverrun";
    const obj = state[auctionKey];
    const field = req.computedField || "main";
    if (obj && obj.assignments && obj.assignments[field]) {
      (req.items || []).forEach(item => {
        const arr = obj.assignments[field][item];
        if (Array.isArray(arr)) {
          const idx = arr.indexOf(req.memberId);
          if (idx >= 0) arr.splice(idx, 1);
        }
      });
      if (_fbDB) _fbDB.ref(mode === "gl" ? "auction_gl" : "auction_overrun").set(obj);
    }
  }
  _fbDB.ref(`auction_requests/${date}/${mode}/${requestId}`).update({
    status: "rejected",
    decidedAt: Date.now(),
    decidedBy: (_fbUser && _fbUser.email) || "admin",
    rejectReason: reason || ""
  }).catch(e => {
    toast(t("toast.ar_reject_fail", { msg: e.message }), "error");
    console.error("[auction-request] reject failed", e);
  });
}

function arWithdrawRequest(date, mode, requestId) {
  const r = ((state.auctionRequests || {})[date] || {})[mode] || {};
  const req = r[requestId];
  if (!req) return;
  const me = arGetClaimedMemberId();
  if (req.memberId !== me && !isAdmin()) { toast(t("toast.ar_withdraw_others"), "error"); return; }
  if (req.status === "approved") { toast(t("toast.ar_withdraw_approved"), "error"); return; }
  _fbDB.ref(`auction_requests/${date}/${mode}/${requestId}`).remove();
}

/** Bulk approve all pending. FIFO (main field before sub, then oldest
 *  first). No capacity check — every request goes into the auction
 *  column even if it overflows the pool. Admin trims excess people
 *  manually on the Auction GL / Auction Overrun pages.
 */
async function arBulkApprove(date, mode) {
  if (!isAdmin()) { toast(t("toast.users_need_admin"), "error"); return; }
  if (!confirm(t("toast.ar_bulk_confirm", { date, mode: mode === "gl" ? "GL" : "Overrun" }))) return;
  const pending = arGetRequests(date, mode)
    .filter(r => r.status === "pending")
    .sort((a, b) => {
      const fa = a.computedField === "sub" ? 1 : 0;
      const fb = b.computedField === "sub" ? 1 : 0;
      if (fa !== fb) return fa - fb;
      return (a.requestedAt || 0) - (b.requestedAt || 0);
    });
  // Await each approve serially so the auction_gl/overrun .set writes don't
  // race against the listener echoes (which would otherwise re-seed state
  // from a stale snapshot mid-loop and drop later approvals).
  for (const r of pending) {
    await arApproveRequest(date, mode, r.id);
  }
  toast(t('toast.ar_bulk_done', { ppl: plural(pending.length, 'unit.people'), mode: mode === "gl" ? "GL" : "Overrun" }), "success");
}

function arClearDay(date) {
  if (!isAdmin()) { toast(t("toast.users_need_admin"), "error"); return; }
  if (!confirm(t("toast.ar_clear_confirm", { date }))) return;
  _fbDB.ref(`auction_requests/${date}`).remove()
    .catch(e => { toast(t('toast.ar_clear_fail', { msg: e.message }), "error"); console.error(e); });
}

/** Auto-clear past dates (anything before today). Called from the daily
 *  reset cron. Admin-only; guests skip and next admin login picks it up.
 */
function arAutoClearPast() {
  if (!isAdmin() || !_fbDB || !state.auctionRequests) return;
  const today = todayBkkISO();
  Object.keys(state.auctionRequests || {}).forEach(date => {
    if (date < today) _fbDB.ref(`auction_requests/${date}`).remove();
  });
}

/** Reset both Auction GL and Auction Overrun pages — clear base inputs +
 *  drag-drop assignments. Called automatically on the daily reset boundary
 *  so each event day starts with a fresh sheet. Also exposed as a manual
 *  admin button in case something needs to be wiped early.
 */
function arResetAuctionPages() {
  if (!isAdmin() || !_fbDB) { toast(t("toast.users_need_admin"), "error"); return; }
  // Kill any queued debounced fbPushAll so a stale snapshot (from a drag
  // or CP edit in the last 300ms) can't echo back AFTER we've reset and
  // re-clobber yesterday's data into auction_gl/overrun.
  clearTimeout(_fbPushTimer);
  // Preserve each mode's editable per-person rates across the reset — they're
  // config, not per-event tallies, so a daily wipe shouldn't clobber them.
  const fresh = (kind) => ({
    cards: 0, illusion: 0, white: 0, black: 0,
    rates: getAuctionRates(kind),
    assignments: {
      main: { cards: [], illusion: [], white: [], black: [] },
      sub:  { cards: [], illusion: [], white: [], black: [] }
    }
  });
  // Also seed local state to the fresh values so any subsequent write
  // (post-listener echo) uses fresh, not stale.
  state.auctionGL      = fresh("gl");
  state.auctionOverrun = fresh("overrun");
  _fbDB.ref("auction_gl").set(state.auctionGL)
    .catch(e => { toast(t('toast.ar_reset_gl_fail', { msg: e.message }), "error"); console.error(e); });
  _fbDB.ref("auction_overrun").set(state.auctionOverrun)
    .catch(e => { toast(t('toast.ar_reset_or_fail', { msg: e.message }), "error"); console.error(e); });
}

/* ---------- Modal helpers ---------- */
/** Shared gate for opening / submitting a request. Returns an error string
 *  (to toast) if the request is not allowed, or null if it's OK. Enforces:
 *  current day only, must be an event day, and the request mode must match
 *  that day's event (GL on อังคาร/พฤหัส, Overrun on อาทิตย์), plus leave. */
function arRequestBlockReason(memberId, date, mode) {
  if (date !== todayBkkISO()) return t('ar.block_today_only');
  const ev = isEventDay(date);  // "GL" | "Overrun" | null
  if (!ev) return t('ar.locked_noevent');
  const allowedMode = ev === "GL" ? "gl" : "overrun";
  if (mode !== allowedMode) return t('ar.block_wrong_mode', { ev });
  if (arHasLeaveOnDate(memberId, date)) return t('ar.block_on_leave', { date });
  return null;
}

function arOpenRequestModal(date, mode) {
  const memberId = arGetClaimedMemberId();
  if (!memberId) { toast(t("toast.ar_select_name_first"), "error"); return; }
  if (!findMember(memberId)) { toast(t("toast.ar_member_reselect"), "error"); return; }
  const block = arRequestBlockReason(memberId, date, mode);
  if (block) { toast(block, "error"); return; }
  _arModalState = { date, mode, items: new Set(), note: "" };
  render();
}
function arCloseModal() {
  _arModalState = null;
  render();
}
function arToggleModalItem(item) {
  if (!_arModalState) return;
  // Single-select: one item type per request. Clicking the chosen item clears it;
  // clicking another replaces the choice (radio behavior, not multi-tick).
  if (_arModalState.items.has(item)) _arModalState.items.clear();
  else _arModalState.items = new Set([item]);
  render();
}
function arSetModalNote(v) {
  if (!_arModalState) return;
  _arModalState.note = v;
}
function arSubmitModal() {
  if (!_arModalState) return;
  const { date, mode, items, note } = _arModalState;
  // Only close the modal if arCreateRequest passed all synchronous checks.
  // A rejected submit (e.g. crossed midnight, member is on leave, missing
  // selections) returns false — keep the modal so the user doesn't lose
  // their picks + note.
  const ok = arCreateRequest({ date, mode, items: Array.from(items), note });
  if (ok) {
    _arModalState = null;
    render();
  }
}

/** Format yyyy-mm-dd as short Thai weekday + dd/mm */
function formatDayShortBkk(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  const wd = dowShort(dt.getUTCDay());
  return `${wd} ${d}/${m}`;
}

function arRenderRow(r, asAdmin, queueNo) {
  const m = findMember(r.memberId);
  const name = m ? m.name : (r.memberName || "?");
  const job  = m ? (m.job || "") : "";
  const items = (r.items || []).map(k => `<span class="ar-item-chip">${AR_ITEM_META[k] ? AR_ITEM_META[k].label : k}</span>`).join("");
  // Re-detect field at render time so the main/sub tag tracks the
  // member's current party assignment instead of the snapshot from
  // request-creation time. The parties listener calls safeRender on
  // change, so this stays realtime without extra plumbing.
  const liveField = arDetectField(r.memberId, r.mode);
  // Overrun has no main/sub split — only GL gets the field tag.
  const fieldTag = (r.mode !== "gl") ? ""
    : liveField
      ? `<span class="ar-field-tag ${liveField === "sub" ? "sub" : ""}">${liveField === "sub" ? t('auction.field_sub_short') : t('auction.field_main_short')}</span>`
      : `<span class="ar-field-tag" style="background:#3f3f46;color:#a1a1aa">${t('ar.not_in_party')}</span>`;
  const leaveTag = arHasLeaveOnDate(r.memberId, r.date)
    ? `<span class="ar-field-tag" style="background:#7c2d12;color:#fdba74">🌴 ${t('leave.title')}</span>` : "";
  const modeTag = `<span style="font-size:10px;color:var(--muted)">${r.mode === "gl" ? "GL" : "OR"} · ${r.date}</span>`;
  const statusTag = `<span class="ar-status-tag ${r.status}">${r.status === "pending" ? t('ar.status_pending') : r.status === "approved" ? t('ar.status_approved') : t('ar.status_rejected')}</span>`;
  const noteRow = r.note ? `<div class="ar-note">"${escapeHtml(r.note)}"</div>` : "";
  const rejectRow = r.rejectReason ? `<div class="ar-note" style="color:#fca5a5">⚠ ${escapeHtml(r.rejectReason)}</div>` : "";

  let actions = "";
  if (asAdmin && r.status === "pending") {
    actions = `
      <button class="ar-action-btn approve" onclick="arApproveRequest('${r.date}','${r.mode}','${r.id}')">${t('ar.approve')}</button>
      <button class="ar-action-btn reject" onclick="arPromptReject('${r.date}','${r.mode}','${r.id}')">${t('ar.reject')}</button>`;
  } else if (!asAdmin && r.status === "pending") {
    actions = `<button class="ar-action-btn reject" onclick="arWithdrawRequest('${r.date}','${r.mode}','${r.id}')">${t('ar.withdraw')}</button>`;
  } else if (asAdmin && r.status === "approved") {
    actions = `<button class="ar-action-btn reject" onclick="arPromptReject('${r.date}','${r.mode}','${r.id}')">${t('ar.revert')}</button>`;
  } else if (asAdmin && r.status === "rejected") {
    // Re-consider a rejected request (e.g. rejected by mistake) — approve it
    // back into the auction. History stays until the day is cleared.
    actions = `<button class="ar-action-btn approve" onclick="arApproveRequest('${r.date}','${r.mode}','${r.id}')">${t('ar.approve')}</button>`;
  }

  return `<div class="ar-req-row ${r.status}">
    ${queueNo ? `<span class="ar-queue-no" title="${t('ar.queue_tip')}">#${queueNo}</span>` : ""}
    <span class="ar-name">${escapeHtml(name)}</span>
    <span class="ar-job">${escapeHtml(job)}</span>
    <span class="ar-time" title="${t('ar.time_tip')}">🕐 ${arFormatTime(r.requestedAt)}</span>
    ${fieldTag}
    ${leaveTag}
    <span class="ar-items">${items}</span>
    ${modeTag}
    ${statusTag}
    ${actions}
    ${noteRow}
    ${rejectRow}
  </div>`;
}

function arPromptReject(date, mode, requestId) {
  const reason = prompt(t('ar.reject_reason_prompt'), "");
  if (reason === null) return;
  arRejectRequest(date, mode, requestId, reason);
}

function arBuildAdminQueue(date, eventMode) {
  const all = ((state.auctionRequests || {})[date] || {});
  const pendingGl      = arGetRequests(date, "gl").filter(r => r.status === "pending");
  const pendingOverrun = arGetRequests(date, "overrun").filter(r => r.status === "pending");
  const approvedGl     = arGetRequests(date, "gl").filter(r => r.status === "approved");
  const approvedOver   = arGetRequests(date, "overrun").filter(r => r.status === "approved");
  const rejectedGl     = arGetRequests(date, "gl").filter(r => r.status === "rejected");
  const rejectedOver   = arGetRequests(date, "overrun").filter(r => r.status === "rejected");
  const totalPending = pendingGl.length + pendingOverrun.length;

  const renderGroup = (title, mode, reqs, asQueue) => {
    if (!reqs.length) return "";
    // Pending = the QUEUE: pure first-come-first-served with visible #N so
    // the admin can approve in arrival order (the หลัก/รอง tag stays on each
    // row). arGetRequests is the single sort authority (requestedAt asc) and
    // filter() preserves it — don't re-sort here, or queue-order changes made
    // there would silently not apply. History keeps main-before-sub grouping.
    const sorted = asQueue
      ? reqs
      : reqs.slice().sort((a, b) => {
          const fa = a.computedField === "sub" ? 1 : 0;
          const fb = b.computedField === "sub" ? 1 : 0;
          if (fa !== fb) return fa - fb;
          return (a.requestedAt || 0) - (b.requestedAt || 0);
        });
    return `<div class="ar-queue-group">
      <h4>${title} (${reqs.length})</h4>
      ${sorted.map((r, i) => arRenderRow({ ...r, date, mode }, true, asQueue ? i + 1 : 0)).join("")}
    </div>`;
  };

  const bulkBar = `
    <div class="ar-bulk-bar">
      ${eventMode === "gl" ? `<button class="primary" ${!pendingGl.length ? "disabled" : ""}
        onclick="arBulkApprove('${date}','gl')">${t('ar.auto_gl')}</button>` : ""}
      ${eventMode === "overrun" ? `<button class="primary" ${!pendingOverrun.length ? "disabled" : ""}
        onclick="arBulkApprove('${date}','overrun')">${t('ar.auto_overrun')}</button>` : ""}
      <div style="flex:1"></div>
      <button onclick="arAutoClearPast()">${t('ar.clear_past')}</button>
    </div>`;

  const pendingSection = `
    <div class="ar-section">
      <h3>${t('ar.pending_title',{n: totalPending})}</h3>
      ${bulkBar}
      ${totalPending === 0 ? `<div class="ar-queue-empty">${t('ar.no_pending')}</div>` : ""}
      ${renderGroup("⚔️ GL", "gl", pendingGl, true)}
      ${renderGroup("🏆 Overrun", "overrun", pendingOverrun, true)}
    </div>`;

  const approvedSection = (approvedGl.length || approvedOver.length) ? `
    <div class="ar-section">
      <h3>${t('ar.approved_title',{n: approvedGl.length + approvedOver.length})}</h3>
      ${renderGroup("⚔️ GL", "gl", approvedGl)}
      ${renderGroup("🏆 Overrun", "overrun", approvedOver)}
    </div>` : "";

  // Rejected history — kept for the rest of the day so admins can see who was
  // turned down (and re-approve if it was a mistake). Cleared together with the
  // whole date by arClearDay / arAutoClearPast / the daily reset (same-day scope).
  const rejectedSection = (rejectedGl.length || rejectedOver.length) ? `
    <div class="ar-section ar-section-rejected">
      <h3>${t('ar.rejected_title',{n: rejectedGl.length + rejectedOver.length})}</h3>
      ${renderGroup("⚔️ GL", "gl", rejectedGl)}
      ${renderGroup("🏆 Overrun", "overrun", rejectedOver)}
    </div>` : "";

  return pendingSection + approvedSection + rejectedSection;
}

function arBuildModal() {
  const { date, mode, items, note } = _arModalState;
  const memberId = arGetClaimedMemberId();
  const field = arDetectField(memberId, mode);
  const fieldTxt = field === "main" ? `<b>${t('auction.field_main_short')}</b>` : field === "sub" ? `<b class="sub">${t('auction.field_sub_short')}</b>` : `<span style="color:var(--danger)">${t('ar.not_in_party')}</span>`;

  const itemRows = ["cards","illusion","white","black"].map(k => {
    const meta = AR_ITEM_META[k];
    const sel = items.has(k);
    return `<div class="ar-item-row ${sel ? "selected" : ""}" onclick="arToggleModalItem('${k}')">
      <span style="font-size:18px">${sel ? "◉" : "○"}</span>
      <span>${meta.label}</span>
      <span class="ar-routing ${field === "sub" ? "sub" : ""}">${t('ar.routing_label')} ${fieldTxt}</span>
    </div>`;
  }).join("");

  return `<div class="ar-modal-backdrop" onclick="if(event.target===this)arCloseModal()">
    <div class="ar-modal">
      <h3>${t('ar.modal_title', {mode: mode === "gl" ? "GL" : "Overrun", date})}</h3>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${t('ar.modal_pick_one')}</div>
      ${itemRows}
      <div style="font-size:12px;color:var(--muted);margin:10px 0 4px">${t('ar.modal_note_label')}</div>
      <textarea rows="2" maxlength="200" oninput="arSetModalNote(this.value)" placeholder="${t('ar.modal_note_ph')}">${escapeHtml(note || "")}</textarea>
      <div class="ar-modal-actions">
        <button onclick="arCloseModal()">${t('common.cancel')}</button>
        <button class="primary" onclick="arSubmitModal()">${t('ar.modal_submit')}</button>
      </div>
    </div>
  </div>`;
}

/* =====================================================================
 * Users page (admin-only) — create / list / delete app login accounts
 * ===================================================================== *
 * Admin types a username + password (or hits "🎲 สุ่ม" for an auto-
 * generated one), and createAppUser() spins up a secondary Firebase
 * Auth instance to register the account without disturbing the admin
 * session. The resulting credentials are surfaced in a copy-friendly
 * box so the admin can pass them to the new user out of band.
 */

// Local-only state — tracks the most recently created credential so it
// can be displayed once. Cleared on tab switch / re-render.
let _lastCreatedUser = null;

async function handleCreateUser() {
  const uEl = document.getElementById("newUserId");
  const pEl = document.getElementById("newUserPw");
  const username = (uEl && uEl.value) || "";
  const password = (pEl && pEl.value) || "";
  const result = await createAppUser(username, password);
  if (result) {
    _lastCreatedUser = result;
    if (uEl) uEl.value = "";
    if (pEl) pEl.value = "";
    render();
  }
}

function genUserPwIntoInput() {
  const el = document.getElementById("newUserPw");
  if (!el) return;
  el.type = "text";  // reveal so admin can copy
  el.value = genRandomPassword(10);
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    toast(t('toast.copied'), "success");
  } catch (e) {
    toast(t('toast.copy_fail'), "error");
  }
}

function dismissLastCredential() {
  _lastCreatedUser = null;
  render();
}

function buildUsersHtml() {
  if (!isAdmin()) {
    return `<div class="users-view">
      <div class="users-hero">
        <h2>👥 Users</h2>
        <div class="users-meta">${t('wheel.admin_only')}</div>
      </div>
      <div class="users-section">
        <div class="users-empty">${t('wheel.login_first')}</div>
      </div>
    </div>`;
  }

/* =====================================================================
 * Leave page (ลา)
 * =====================================================================
 * Anyone (guest + admin) can register leave for any roster member on any
 * future or current date. The leave activates on that date (mark visible
 * on League/Overrun), then auto-deactivates when the date passes. Whole
 * /leaves/ tree resets every Monday 00:00 Brasília (autoCheckResets()).
 */

// Form state — only kept on the local client during interaction. Submitted
// values are written to Firebase immediately, so no local persistence needed.
let _leaveFormMemberId = "";
let _leaveFormDate     = "";  // default = next event day (computed on render)
let _leaveHideToday    = false; // checkbox: hide past entries

function nextEventDayISO() {
  // Find the soonest upcoming Tue/Thu/Sun (today inclusive). Default form
  // value so common case (registering for the next match) is one click.
  let iso = todayBkkISO();
  for (let i = 0; i < 8; i++) {
    if (isEventDay(iso)) return iso;
    // add one day
    const [y, m, d] = iso.split("-").map(Number);
    const dt = new Date(Date.UTC(y, m - 1, d + 1));
    iso = `${dt.getUTCFullYear()}-${String(dt.getUTCMonth()+1).padStart(2,"0")}-${String(dt.getUTCDate()).padStart(2,"0")}`;
  }
  return todayBkkISO();
}

function buildLeaveHtml() {
  if (!firebaseConfigured()) {
    return `
      <div class="leave-view">
        <div class="leave-hero">
          <h2>${t('leave.title')}</h2>
        </div>
        <div class="auction-warning">⚠️ ${t('roster.fb_not_set')}</div>
      </div>`;
  }
  const today    = todayBkkISO();
  const todayDow = dowName(bkkDow(today));
  const todayEv  = isEventDay(today);
  // Default form values (only set if not already set by user this session)
  if (!_leaveFormDate) _leaveFormDate = nextEventDayISO();
  // Member dropdown — sorted by name, exclude visually-blank entries
  const members = state.members
    .filter(m => !isVisuallyBlank(m.name))
    .slice()
    .sort((a, b) => (a.name || "").localeCompare(b.name || "", "th"));
  const memOpts = members.map(m =>
    `<option value="${m.id}" ${m.id === _leaveFormMemberId ? "selected" : ""}>${escapeHtml(m.name)}${m.job ? ` (${escapeHtml(m.job)})` : ""}</option>`
  ).join("");
  // Form hint for selected date
  const formDow = bkkDow(_leaveFormDate);
  const formEv  = isEventDay(_leaveFormDate);
  const hintHtml = formEv
    ? `<div class="leave-hint has-event">📅 ${dowName(formDow)} · ${t('leave.event_label')} <b>${formEv}</b> ${t('leave.today_word')}</div>`
    : `<div class="leave-hint no-event">📅 ${dowName(formDow)} · ${t('leave.no_event_today')}</div>`;
  // Group all leave entries by date
  const byDate = {}; // { "YYYY-MM-DD": [ {id, name, job}, ... ] }
  for (const [memId, dates] of Object.entries(state.leaves || {})) {
    if (!dates || typeof dates !== "object") continue;
    for (const [date, on] of Object.entries(dates)) {
      if (!on) continue;
      const m = findMember(memId);
      if (!m || isVisuallyBlank(m.name)) continue;
      if (!byDate[date]) byDate[date] = [];
      byDate[date].push({ id: memId, name: m.name, job: m.job || "" });
    }
  }
  const allDates = Object.keys(byDate).sort();
  const visibleDates = _leaveHideToday ? allDates.filter(d => d >= today) : allDates;
  const groupsHtml = visibleDates.map(date => {
    const entries = byDate[date].sort((a, b) => (a.name || "").localeCompare(b.name || "", "th"));
    const dow = bkkDow(date);
    const ev = isEventDay(date);
    const isToday = date === today;
    const isPast  = date < today;
    const evPill = ev
      ? `<span class="leave-group-event ${ev === "GL" ? "gl" : "overrun"}">${ev}</span>`
      : `<span class="leave-group-event none">${t('leave.no_event')}</span>`;
    const todayBadge = isToday ? `<span class="leave-group-event" style="background:rgba(34,197,94,0.18);border-color:#22c55e;color:#4ade80">${t('leave.today_word')}</span>` : "";
    const cardsHtml = entries.map(e => `
      <div class="leave-card">
        ${e.job ? `<span class="leave-card-job">${escapeHtml(e.job)}</span>` : ""}
        <span class="leave-card-name">${escapeHtml(e.name)}</span>
        <button class="leave-card-del" onclick="leaveRemove('${e.id}','${date}')" title="${t('leave.cancel_leave')}">✕</button>
      </div>
    `).join("");
    return `
      <div class="leave-group ${isToday ? "is-today" : ""} ${isPast ? "is-past" : ""}">
        <div class="leave-group-head">
          <span class="leave-group-date">${fmtDate(date)} <span class="leave-group-dow">· ${dowName(dow)}</span></span>
          ${evPill}
          ${todayBadge}
          <span class="leave-group-count">${plural(entries.length, 'unit.people')}</span>
        </div>
        <div class="leave-list">${cardsHtml}</div>
      </div>`;
  }).join("");
  const emptyHtml = visibleDates.length === 0
    ? `<div class="leave-empty">${t('leave.empty')}<br><span style="font-size:11px">${t('leave.empty_hint')}</span></div>`
    : "";
  return `
    <div class="leave-view">
      <div class="leave-hero">
        <h2>${t('leave.hero')}</h2>
        <span class="leave-today ${todayEv ? "" : "no-event"}">
          ${t('leave.today_word')} ${todayDow} · ${todayEv ? `${t('leave.event_label')} ${todayEv}` : t('leave.no_event')}
        </span>
        <div style="flex:1"></div>
        <span style="font-size:11px;color:var(--muted)">${t('leave.clear_note')}</span>
      </div>
      <div class="leave-form">
        <div class="leave-form-field">
          <label>${t('leave.select_name')}</label>
          <select id="leaveMemberSelect" onchange="leaveFormSetMember(this.value)">
            <option value="">${t('leave.select_member')}</option>
            ${memOpts}
          </select>
        </div>
        <div class="leave-form-field">
          <label>${t('leave.date_label')}</label>
          <input type="date" id="leaveDateInput" min="${today}" value="${_leaveFormDate}" onchange="leaveFormSetDate(this.value)" />
        </div>
        <button class="leave-add-btn" onclick="leaveAdd()" ${!_leaveFormMemberId || !_leaveFormDate ? "disabled" : ""}>
          ${t('leave.add_btn')}
        </button>
        ${hintHtml}
      </div>
      <div class="leave-filter-bar">
        <label><input type="checkbox" ${_leaveHideToday ? "checked" : ""} onchange="leaveSetHidePast(this.checked)" /> ${t('leave.hide_past')}</label>
        <span style="color:var(--muted);font-size:11px;margin-left:auto">Total ${plural(allDates.length, 'leave.days')} · ${plural(Object.values(byDate).reduce((s,a)=>s+a.length,0), 'leave.entries')}</span>
      </div>
      <div class="leave-groups">
        ${groupsHtml}
        ${emptyHtml}
      </div>
    </div>`;
}

/* ---------- Leave form handlers ---------- */
function leaveFormSetMember(v) { _leaveFormMemberId = v; render(); }
function leaveFormSetDate(v)   { _leaveFormDate     = v; render(); }
function leaveSetHidePast(v)   { _leaveHideToday    = !!v; render(); }

function leaveAdd() {
  if (!_leaveFormMemberId || !_leaveFormDate) return;
  if (!_fbDB) { toast(t("toast.fb_not_ready"), "error"); return; }
  const memId = _leaveFormMemberId;
  const date  = _leaveFormDate;
  // Reflect locally for snappy UI; Firebase listener will confirm.
  if (!state.leaves[memId]) state.leaves[memId] = {};
  state.leaves[memId][date] = true;
  // Push to Firebase. Path-level write so race-safe.
  _fbDB.ref(`leaves/${memId}/${date}`).set(true)
    .catch(e => { console.warn("[leave] write failed", e); toast(t("toast.leave_add_fail"), "error"); });
  // Keep member selected but offer to clear for the next add — clearing makes
  // it easier to add many people for the same date.
  _leaveFormMemberId = "";
  render();
  toast(t("toast.leave_added"), "success");
}

function leaveRemove(memId, date) {
  if (!_fbDB) return;
  if (state.leaves[memId]) delete state.leaves[memId][date];
  _fbDB.ref(`leaves/${memId}/${date}`).remove()
    .catch(e => console.warn("[leave] remove failed", e));
  render();
}


function updateJobTarget(input) {
  const job = input.dataset.job;
  if (!job) return;
  if (!state.jobTargets) state.jobTargets = {};
  let n = parseInt(input.value, 10);
  if (isNaN(n) || n < 0) n = 0;
  state.jobTargets[job] = n;
  save();
  const counts = getMergedJobCounts();
  const { status, cls } = classifyJobStatus(counts[job] || 0, n);
  const tr = input.closest("tr");
  if (tr) {
    const cell = tr.querySelector(".status-cell");
    if (cell) { cell.textContent = status; cell.className = "status-cell " + cls; }
  }
  const tfootTargetCell = document.querySelector(".summary-table tfoot td.target");
  if (tfootTargetCell) {
    const jobsList = getSummaryJobs(counts, state.jobTargets);
    const totalTarget = jobsList.reduce((s, j) => s + (state.jobTargets[j] || 0), 0);
    tfootTargetCell.textContent = totalTarget;
  }
  const aiBox = document.querySelector(".ai-comment");
  if (aiBox) {
    const jobs = getSummaryJobs(counts, state.jobTargets);
    aiBox.innerHTML = `<div class="ai-title">💡 AI Comment</div>${buildAiComment(jobs, counts, state.jobTargets, state.members.length)}`;
  }
}

function median(arr) {
  if (!arr.length) return 0;
  const s = arr.slice().sort((a,b)=>a-b);
  const m = Math.floor(s.length/2);
  return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
}

function findUnderperformers(players, threshold) {
  const scores = players.map(p=>p[7]);
  const med = median(scores);
  const cutoff = med * threshold;
  return players.filter(p => {
    const [_, n, fort, mi, k, a, d, total] = p;
    return total < cutoff || d > (k + a) || (k + a === 0);
  }).map(p => {
    const [rank, name, fort, mi, k, a, d, total] = p;
    const reasons = [];
    if (total < cutoff) reasons.push(t('gl.reason_score', { total, cutoff: Math.round(cutoff) }));
    if (d > (k + a)) reasons.push(t('gl.reason_defeat', { d, ka: k + a }));
    if (k + a === 0) reasons.push(t('gl.reason_no_ka'));
    return { rank, name, total, k, a, d, reasons };
  });
}

/* =====================================================================
 * Wheel page (admin-only) — 🎡 สุ่มรางวัลจากรายชื่อ Roster
 * ===================================================================== *
 * Everyone in the roster stays in the wheel EVERY round (no winner
 * removal — by design; ทุกคนมีสิทธิ์ทุกรอบ). Admin can manually exclude
 * people for the session (checkbox / "ตัดคนลาวันนี้") — exclusions are
 * local-only, never synced. Saved winners go to /wheel_history
 * (admin-write, shape-locked by DB rules; trimmed to the newest
 * WHEEL_HISTORY_MAX). The winner is picked with rejection-sampled
 * crypto randomness BEFORE the animation starts — the spin is
 * presentation only.
 * NOTE for tests: don't invoke wheelSpin()/wheelConfetti() in the vm
 * harness — its requestAnimationFrame stub re-enters synchronously.
 */
let wheelUI = {
  excluded: {},        // memberId -> true (session-only, not synced)
  spinning: false,
  spinList: null,      // frozen eligible list while spinning — a /members
                       // snapshot mid-spin must NOT re-slice the wheel, or the
                       // pointer would land on a different name than the
                       // pre-picked winner shown in the modal
  rot: -Math.PI / 2,   // current wheel rotation (rad)
  prize: "",           // mirrors the prize input across re-renders
  pendingResult: null, // { id, name, job } awaiting save/discard
};
const WHEEL_HISTORY_MAX = 200;
const WHEEL_COLORS = ["#7c3aed", "#0e7490", "#b45309", "#be185d", "#15803d", "#1d4ed8", "#b91c1c"];

// Firebase keys we interpolate into inline onclick handlers must stay inside
// this charset — escapeHtml can't help there (the browser entity-decodes
// attribute values back before parsing the JS), so anything else is skipped
// at render time. Push keys and uid()-style member ids always match.
const WHEEL_SAFE_KEY_RE = /^[A-Za-z0-9_-]+$/;

function wheelEligibleMembers() {
  return (state.members || []).filter(m => m && !wheelUI.excluded[m.id]);
}

// Uniform int in [0, n). Rejection sampling kills modulo bias. `rng` is an
// injectable () => [0,1) for deterministic tests; default is crypto.
function wheelRandIndex(n, rng) {
  if (!(n > 0)) return -1;
  if (typeof rng === "function") return Math.min(n - 1, Math.floor(rng() * n));
  const limit = Math.floor(4294967296 / n) * n;
  const buf = new Uint32Array(1);
  let x;
  do { crypto.getRandomValues(buf); x = buf[0]; } while (x >= limit);
  return x % n;
}

function wheelMakeHistoryEntry(member, prize, by, at) {
  return {
    at: at,
    by: String(by || "admin").slice(0, 64),
    winnerId: String(member.id).slice(0, 64),
    winnerName: String(member.name || "?").slice(0, 64),
    prize: String(prize || "").trim().slice(0, 120),
  };
}

// History keys sorted oldest→newest in, keys to DELETE out (keep newest max).
function wheelTrimDeletions(sortedKeys, max) {
  if (!Array.isArray(sortedKeys) || sortedKeys.length <= max) return [];
  return sortedKeys.slice(0, sortedKeys.length - max);
}

function wheelHistorySorted() {
  const h = state.wheelHistory || {};
  return Object.keys(h)
    .map(k => ({ key: k, e: h[k] || {} }))
    .sort((a, b) => (b.e.at || 0) - (a.e.at || 0));
}

function buildWheelHtml() {
  if (!isAdmin()) {
    return `<div class="wheel-view">
      <div class="wheel-hero">
        <h2>${t('nav.wheel')}</h2>
        <div class="wheel-meta">${t('wheel.admin_only')}</div>
      </div>
      <div class="wheel-section">
        <div class="wheel-empty">${t('wheel.login_first')}</div>
      </div>
    </div>`;
  }
  const rows = wheelHistorySorted();
  const histHtml = rows.length
    ? rows.map(r => {
        const when = new Date(r.e.at || 0).toLocaleString(currentLocale === "en" ? "en-GB" : "pt-BR",
          { timeZone: "America/Sao_Paulo", day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
        const del = WHEEL_SAFE_KEY_RE.test(r.key)
          ? `<button class="wh-del" onclick="wheelDeleteHistory('${r.key}')" title="${t('wheel.del_entry')}">✕</button>`
          : "";
        return `<div class="wheel-history-row">
          <span class="wh-when">${escapeHtml(when)}</span>
          <span class="wh-name">🏆 ${escapeHtml(r.e.winnerName || "?")}</span>
          <span class="wh-prize">${escapeHtml(r.e.prize || "—")}</span>
          <span class="wh-by">${t('wheel.by', { by: escapeHtml(String(r.e.by || "").split("@")[0]) })}</span>
          ${del}
        </div>`;
      }).join("")
    : `<div class="wheel-empty">${t('wheel.no_history')}</div>`;

  const membersHtml = (state.members || []).filter(Boolean).map(m => {
    const on = !wheelUI.excluded[m.id];
    const id = String(m.id);
    const box = WHEEL_SAFE_KEY_RE.test(id)
      ? `<input type="checkbox" ${on ? "checked" : ""} onchange="wheelToggleMember('${id}', this.checked, this)">`
      : "";
    return `<label class="wheel-member${on ? "" : " off"}">
      ${box}
      <span>${escapeHtml(m.name)}</span>
      <span class="wm-job">${escapeHtml(m.job || "")}</span>
    </label>`;
  }).join("");

  const r = wheelUI.pendingResult;
  const overlay = !r ? "" : `
  <div class="wheel-overlay">
    <div class="wheel-result-card">
      <div class="wr-label">${t('wheel.winner_label')}</div>
      <div class="wr-name">${escapeHtml(r.name)}</div>
      <div class="wr-job">${escapeHtml(r.job || "")}</div>
      <div class="wr-prize">🎁 ${escapeHtml((wheelUI.prize || "").trim() || t('wheel.no_prize'))}</div>
      <div class="wr-actions">
        <button class="wr-save" onclick="wheelSaveResult()">${t('wheel.save_result')}</button>
        <button class="wr-skip" onclick="wheelDiscardResult()">${t('wheel.discard')}</button>
      </div>
    </div>
  </div>`;

  return `<div class="wheel-view">
    <div class="wheel-hero">
      <h2>${t('nav.wheel')}</h2>
      <div class="wheel-meta">${t('wheel.subtitle')}</div>
    </div>
    <div class="wheel-layout">
      <div class="wheel-stage">
        <div class="wheel-canvas-wrap">
          <canvas id="wheelCanvas"></canvas>
          <canvas id="wheelConfetti"></canvas>
          <button class="wheel-spin-btn" id="wheelSpinBtn" onclick="wheelSpin()">${t('wheel.spin')}</button>
        </div>
        <div class="wheel-count" id="wheelCount"></div>
      </div>
      <div class="wheel-panel">
        <div class="wheel-section">
          <h3>${t('wheel.prize_this_round')}</h3>
          <input class="wheel-prize-input" id="wheelPrize" maxlength="120" placeholder="${t('wheel.prize_ph')}"
                 value="${escapeHtml(wheelUI.prize)}" oninput="wheelUI.prize = this.value">
          <div class="wheel-tools">
            <button onclick="wheelExcludeOnLeaveToday()" title="${t('wheel.exclude_leave_tip')}">${t('wheel.exclude_leave_btn')}</button>
            <button onclick="wheelIncludeAll()">${t('wheel.include_all')}</button>
          </div>
        </div>
        <div class="wheel-section">
          <h3>${t('wheel.members_title')}</h3>
          <div class="wheel-members">${membersHtml || `<div class="wheel-empty">${t('wheel.roster_empty')}</div>`}</div>
        </div>
        <div class="wheel-section">
          <h3>${t('wheel.history_title')}</h3>
          <div class="wheel-history-list">${histHtml}</div>
        </div>
      </div>
    </div>
    ${overlay}
  </div>`;
}

// Label layout (truncated names, font size, palette) is invariant while only
// the rotation changes — cache it so the rAF spin loop doesn't redo
// measureText for every slice on every frame (78 names × ~276 frames).
let _wheelLayout = null; // { key, labels: string[], fontPx, pal }

function wheelComputeLayout(ctx, list, R) {
  const n = list.length;
  const key = R + "|" + list.map(m => m.name || "?").join("");
  if (_wheelLayout && _wheelLayout.key === key) return _wheelLayout;

  // Cycle the palette; the seam (last slice next to slice 0) clashes exactly
  // when n % pal.length === 1, so shrink until it doesn't.
  let pal = WHEEL_COLORS;
  while (pal.length > 3 && n > 1 && n % pal.length === 1) pal = pal.slice(0, pal.length - 1);

  const fontPx = n <= 16 ? 14 : n <= 32 ? 12 : n <= 56 ? 10.5 : 9.5;
  ctx.font = "600 " + fontPx + "px 'Segoe UI', Sarabun, sans-serif";
  const maxW = R - 58;
  const labels = list.map(m => {
    let label = String(m.name || "?");
    if (ctx.measureText(label).width > maxW) {
      while (label.length > 1 && ctx.measureText(label + "…").width > maxW) label = label.slice(0, -1);
      label += "…";
    }
    return label;
  });
  _wheelLayout = { key, labels, fontPx, pal };
  return _wheelLayout;
}

function drawWheel() {
  const cv = document.getElementById("wheelCanvas");
  if (!cv || typeof cv.getContext !== "function") return;
  const ctx = cv.getContext("2d");
  if (!ctx || typeof ctx.beginPath !== "function") return; // vm-test ctx stub
  const wrap = cv.parentElement;
  const wrapW = wrap && typeof wrap.clientWidth === "number" ? wrap.clientWidth : 440;
  const cssW = Math.max(240, Math.min(440, wrapW || 440));
  const dpr = window.devicePixelRatio || 1;
  const W = Math.round(cssW * dpr);
  // Only touch canvas dimensions when they actually change — assigning
  // .width resets the backing store (3MB+ realloc at dpr=2) and would run
  // on every animation frame otherwise.
  if (cv.width !== W || cv.height !== W) {
    cv.width = W; cv.height = W;
    cv.style.width = cssW + "px";
    cv.style.height = cssW + "px";
    const cf = document.getElementById("wheelConfetti");
    if (cf) {
      cf.width = W; cf.height = W;
      cf.style.width = cv.style.width; cf.style.height = cv.style.height;
    }
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssW, cssW);

  const C = cssW / 2, R = C - 6;
  // While spinning, draw the FROZEN list the winner was picked from — a
  // members snapshot mid-spin must not re-slice the wheel under the pointer.
  const list = (wheelUI.spinning && wheelUI.spinList) ? wheelUI.spinList : wheelEligibleMembers();
  const n = list.length;

  if (n === 0) {
    ctx.beginPath(); ctx.arc(C, C, R, 0, Math.PI * 2);
    ctx.fillStyle = "#232a33"; ctx.fill();
    ctx.fillStyle = "#8b949e";
    ctx.font = "13px 'Segoe UI', Sarabun, sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(t('toast.wheel_empty'), C, C - 64);
  } else {
    const L = wheelComputeLayout(ctx, list, R);
    const sa = (Math.PI * 2) / n;
    ctx.font = "600 " + L.fontPx + "px 'Segoe UI', Sarabun, sans-serif";
    for (let i = 0; i < n; i++) {
      const a0 = wheelUI.rot + i * sa;
      ctx.beginPath(); ctx.moveTo(C, C); ctx.arc(C, C, R, a0, a0 + sa); ctx.closePath();
      ctx.fillStyle = L.pal[i % L.pal.length]; ctx.fill();
      ctx.strokeStyle = "#0d1117"; ctx.lineWidth = 1; ctx.stroke();
      ctx.save();
      ctx.translate(C, C);
      ctx.rotate(a0 + sa / 2);
      ctx.textAlign = "right"; ctx.textBaseline = "middle";
      ctx.fillStyle = "#fff";
      ctx.fillText(L.labels[i], R - 8, 0);
      ctx.restore();
    }
  }

  // Hub (sits under the absolutely-positioned spin button) + pointer on top.
  ctx.beginPath(); ctx.arc(C, C, 46, 0, Math.PI * 2);
  ctx.fillStyle = "#161b22"; ctx.fill();
  ctx.strokeStyle = "#444c56"; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(C - 12, 2); ctx.lineTo(C + 12, 2); ctx.lineTo(C, 30); ctx.closePath();
  ctx.fillStyle = "#f0d896"; ctx.strokeStyle = "#0d1117"; ctx.lineWidth = 1.5;
  ctx.fill(); ctx.stroke();

  const cnt = document.getElementById("wheelCount");
  if (cnt) cnt.textContent = t('wheel.count', { n: n, total: (state.members || []).length });
  const btn = document.getElementById("wheelSpinBtn");
  if (btn) btn.disabled = wheelUI.spinning || n === 0;
}

function wheelToggleMember(id, on, inputEl) {
  if (wheelUI.spinning) { if (inputEl) inputEl.checked = !on; return; }
  if (on) delete wheelUI.excluded[id];
  else wheelUI.excluded[id] = true;
  if (inputEl && typeof inputEl.closest === "function") {
    const row = inputEl.closest(".wheel-member");
    if (row && row.classList) row.classList.toggle("off", !on);
  }
  drawWheel();
}

function wheelExcludeOnLeaveToday() {
  if (wheelUI.spinning) return;
  // /leaves is the only synced source of "ลาวันนี้" — the manual onLeave*
  // flags never survive the members listener mirror, so don't pretend to
  // honor them here.
  let n = 0;
  (state.members || []).forEach(m => {
    if (!m) return;
    if (hasScheduledLeaveToday(m.id)) {
      if (!wheelUI.excluded[m.id]) n++;
      wheelUI.excluded[m.id] = true;
    }
  });
  toast(n ? t('toast.wheel_excluded', { ppl: plural(n, 'unit.people') }) : t('toast.wheel_none_leave'), n ? "success" : "");
  render();
}

function wheelIncludeAll() {
  if (wheelUI.spinning) return;
  wheelUI.excluded = {};
  render();
}

function wheelSpin() {
  if (!isAdmin()) { toast(t('toast.wheel_admin_spin'), "error"); return; }
  if (wheelUI.spinning || wheelUI.pendingResult) return;
  const list = wheelEligibleMembers();
  if (!list.length) { toast(t('toast.wheel_empty'), "error"); return; }

  // Winner decided HERE, before any animation (fair + glitch-proof). The
  // list is frozen for the whole spin so drawWheel keeps slicing the wheel
  // exactly as it was when the winner was picked.
  const idx = wheelRandIndex(list.length);
  const winner = list[idx];
  wheelUI.spinList = list;

  const sa = (Math.PI * 2) / list.length;
  const targetWithin = -Math.PI / 2 - (idx + 0.5) * sa; // slice center → pointer (top)
  const delta = ((targetWithin - wheelUI.rot) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const start = wheelUI.rot;
  const total = Math.PI * 2 * 7 + delta;
  const dur = 4600;
  const t0 = Date.now();
  wheelUI.spinning = true;
  drawWheel(); // repaint immediately so the spin button disables this frame

  (function step() {
    if (state.mode !== "wheel") { // tab switched mid-spin — abort silently
      wheelUI.spinning = false;
      wheelUI.spinList = null;
      return;
    }
    const p = Math.min(1, (Date.now() - t0) / dur);
    const ease = 1 - Math.pow(1 - p, 3);
    wheelUI.rot = start + total * ease;
    drawWheel();
    if (p < 1) { requestAnimationFrame(step); return; }
    wheelUI.spinning = false;
    wheelUI.spinList = null;
    wheelUI.rot = (start + total) % (Math.PI * 2);
    wheelUI.pendingResult = { id: winner.id, name: winner.name || "?", job: winner.job || "" };
    render();
    wheelConfetti(); // render() is synchronous — the confetti canvas exists now
  })();
}

function wheelSaveResult() {
  const r = wheelUI.pendingResult;
  if (!r) return;
  if (!isAdmin() || !_fbDB) { toast(t('toast.wheel_admin_online'), "error"); return; }
  const entry = wheelMakeHistoryEntry(r, wheelUI.prize, (_fbUser && _fbUser.email) || "admin", Date.now());
  // Close the modal before the write so the local listener echo renders the
  // already-dismissed state (one rebuild, not overlay-then-dismiss).
  wheelUI.pendingResult = null;
  const ref = _fbDB.ref("wheel_history").push();
  ref.set(entry)
    .then(() => {
      toast(t('toast.wheel_saved', { name: entry.winnerName }), "success");
      // Trim to the newest WHEEL_HISTORY_MAX by entry time (same ordering the
      // history panel displays — key order isn't trustworthy if an entry was
      // ever written under a custom key).
      const all = Object.assign({}, state.wheelHistory);
      all[ref.key] = entry;
      const oldestFirst = Object.keys(all).sort((a, b) => ((all[a] && all[a].at) || 0) - ((all[b] && all[b].at) || 0));
      const dels = wheelTrimDeletions(oldestFirst, WHEEL_HISTORY_MAX);
      if (dels.length) {
        const upd = {};
        dels.forEach(k => { upd[k] = null; });
        // Trim failure must NOT read as "save failed" — the entry IS saved.
        return _fbDB.ref("wheel_history").update(upd)
          .catch(e => console.warn("[wheel] history trim failed (entry saved fine)", e));
      }
    })
    .catch(e => {
      console.warn("[wheel] save failed", e);
      toast(t('toast.wheel_save_fail', { msg: e && e.message || e }), "error");
      // Bring the result back so the admin can retry — losing the draw to a
      // network blip would force an unfair re-spin.
      wheelUI.pendingResult = r;
      if (state.mode === "wheel") render();
    });
  render();
}

function wheelDiscardResult() {
  wheelUI.pendingResult = null;
  render();
}

function wheelDeleteHistory(key) {
  if (!isAdmin() || !_fbDB) return;
  if (typeof key !== "string" || !/^[A-Za-z0-9_-]+$/.test(key)) return;
  if (!confirm(t('toast.wheel_del_confirm'))) return;
  _fbDB.ref("wheel_history/" + key).remove()
    .then(() => toast(t('toast.deleted'), "success"))
    .catch(e => toast(t('toast.del_fail', { msg: e && e.message || e }), "error"));
}

function wheelConfetti() {
  const cf = document.getElementById("wheelConfetti");
  if (!cf || typeof cf.getContext !== "function") return;
  const ctx = cf.getContext("2d");
  if (!ctx || typeof ctx.fillRect !== "function") return; // vm-test ctx stub
  const dpr = window.devicePixelRatio || 1;
  const W = cf.width / dpr, H = cf.height / dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const ps = [];
  for (let i = 0; i < 90; i++) {
    ps.push({
      x: W / 2, y: H / 2,
      vx: (Math.random() - 0.5) * 11,
      vy: -Math.random() * 9 - 3,
      s: Math.random() * 5 + 3,
      c: WHEEL_COLORS[i % WHEEL_COLORS.length],
      r: Math.random() * Math.PI,
    });
  }
  const t0 = Date.now();
  (function f() {
    const el = Date.now() - t0;
    ctx.clearRect(0, 0, W, H);
    if (el > 1700 || state.mode !== "wheel") return;
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.28; p.r += 0.1;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
      ctx.fillStyle = p.c; ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6);
      ctx.restore();
    });
    requestAnimationFrame(f);
  })();
}

// Keep the wheel crisp on window resizes (no-op off the wheel page / mid-spin).
window.addEventListener("resize", () => {
  if (state.mode === "wheel" && !wheelUI.spinning) drawWheel();
});

function renderBattlefields() {
  const center = document.getElementById("center");
  if (state.mode === "overrun") {
    center.innerHTML = buildOverrunHtml();
  } else if (state.mode === "roster") {
    // Preserve the unclaimed guest's in-progress chooser pick across the
    // full re-renders that fire on every /members snapshot (busy nights
    // re-render every few seconds while everyone updates CP).
    const prevClaimSel = document.getElementById("rosterClaimSelect");
    const prevClaimVal = prevClaimSel ? prevClaimSel.value : "";
    center.innerHTML = buildRosterHtml();
    if (prevClaimVal) {
      const sel = document.getElementById("rosterClaimSelect");
      if (sel) sel.value = prevClaimVal;
    }
  } else if (state.mode === "summary") {
    center.innerHTML = buildSummaryHtml();
  } else if (state.mode === "auction-gl") {
    center.innerHTML = buildAuctionGlHtml();
  } else if (state.mode === "auction-overrun") {
    center.innerHTML = buildAuctionOverrunHtml();
  } else if (state.mode === "leave") {
    center.innerHTML = buildLeaveHtml();
  } else if (state.mode === "auction-request") {
    center.innerHTML = buildAuctionRequestHtml();
  } else if (state.mode === "users") {
    center.innerHTML = buildUsersHtml();
  } else if (state.mode === "help") {
    center.innerHTML = buildHelpHtml();
  } else if (state.mode === "wheel") {
    // Mid-spin renders are skipped so a Firebase snapshot can't tear down
    // the canvas while it's animating; the post-spin render() repaints.
    // This is the ONLY spin guard — every render path funnels through here.
    if (!wheelUI.spinning) {
      // Preserve prize-input focus/caret across snapshot re-renders (same
      // teardown problem the roster claim-select works around above).
      const ae = document.activeElement;
      const prizeFocused = !!(ae && ae.id === "wheelPrize");
      const caret = prizeFocused ? ae.selectionStart : 0;
      center.innerHTML = buildWheelHtml();
      drawWheel();
      if (prizeFocused) {
        const inp = document.getElementById("wheelPrize");
        if (inp) {
          inp.focus();
          try { inp.setSelectionRange(caret, caret); } catch (e) {}
        }
      }
    }
  } else {
    center.innerHTML =
      buildBfHtml(0) +
      buildBfHtml(1) +
      // Row 1 = both MAIN plans, row 2 = both SUB plans (2026-06-12: was
      // main/sub per plan, which interleaved sub between the two mains).
      '<div class="maps-row">' + buildMapHtml(1) + buildMapHtml(4) + '</div>' +
      '<div class="maps-row">' + buildMapHtml(2) + buildMapHtml(5) + '</div>';
    applyMapBg(1); applyMapBg(2); applyMapBg(4); applyMapBg(5);
  }
}

function updateStatusInfo() {
  const total = state.members.length;
  const assigned = state.members.filter(m => isAssigned(m.id)).length;
  document.getElementById("statusInfo").textContent =
    t('header.status', { ppl: plural(total, 'unit.people'), assigned: assigned, free: total - assigned });
}

function render() {
  renderMembers();
  renderBattlefields();
  if (state.mode === "league") renderMarkers();
  else if (state.mode === "overrun") {
    applyMapBg(3);
    renderOverrunMarkers();
  }
  updateStatusInfo();
}

/* ===== Save / Apply / Reset ===== */
function buildTeamData() {
  if (state.mode === "league") state.partiesLeague = state.parties;
  else if (state.mode === "overrun") state.partiesOverrun = state.parties;
  const ser = (parties) => (parties || makeEmptyParties()).map(p => ({
    name: p.name,
    slots: p.slots.map(memberId => {
      if (!memberId) return null;
      const m = findMember(memberId);
      return m ? { name: m.name, job: m.job } : null;
    })
  }));
  return {
    savedAt: new Date().toISOString(),
    mode: state.mode,
    league: ser(state.partiesLeague || makeEmptyParties()),
    overrun: ser(state.partiesOverrun || makeEmptyParties()),
    jobTargets: state.jobTargets || {}
  };
}

function applySavedTeam(data) {
  if (!data) return;
  const apply = (target, saved) => {
    if (!Array.isArray(saved)) return;
    saved.forEach((savedParty, i) => {
      if (i >= target.length) return;
      const party = target[i];
      if (savedParty.name) party.name = savedParty.name;
      if (Array.isArray(savedParty.slots)) {
        const newSlots = savedParty.slots.map(slot => {
          if (!slot || !slot.name) return null;
          // exact name+job first; fall back to name-only so a member who
          // changed job in the sheet is NOT dropped from the party
          const m = state.members.find(mem => mem.name === slot.name && mem.job === slot.job)
                 || state.members.find(mem => mem.name === slot.name);
          return m ? m.id : null;
        });
        while (newSlots.length < PARTY_SLOTS) newSlots.push(null);
        target[i].slots = newSlots.slice(0, PARTY_SLOTS);
      }
    });
  };
  if (Array.isArray(data.parties) && !data.league && !data.overrun) {
    if (state.mode === "league") apply(state.parties, data.parties);
    return;
  }
  if (!state.partiesLeague || state.partiesLeague.length !== PARTIES) state.partiesLeague = makeEmptyParties();
  if (!state.partiesOverrun || state.partiesOverrun.length !== PARTIES) state.partiesOverrun = makeEmptyParties();
  if (Array.isArray(data.league)) apply(state.partiesLeague, data.league);
  if (Array.isArray(data.overrun)) apply(state.partiesOverrun, data.overrun);
  // Legacy: ignore data.dimension / data.dimensionNames from older saves
  if (data.jobTargets && typeof data.jobTargets === "object") {
    state.jobTargets = { ...state.jobTargets, ...data.jobTargets };
  }
  state.parties = state.mode === "league" ? state.partiesLeague
                : state.mode === "overrun" ? state.partiesOverrun
                : state.partiesLeague;
}

const TEAM_SAVE_KEY = "roo_party_team_v1";

function saveTeam() {
  try {
    const teamData = buildTeamData();
    localStorage.setItem(TEAM_SAVE_KEY, JSON.stringify(teamData));
    toast(t('toast.team_saved'), "success");
  } catch (e) {
    toast(t('toast.save_fail', { msg: e.message }), "error");
  }
}

function loadSavedTeam() {
  try {
    const raw = localStorage.getItem(TEAM_SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn(e); }
  return null;
}

function resetAll() {
  if (!confirm(t('confirm.reset_all'))) return;
  localStorage.removeItem("roo_party_v2");
  localStorage.removeItem(TEAM_SAVE_KEY);
  location.reload();
}

/* ===== Init ===== */
load();
if (!Array.isArray(state.partiesLeague) || state.partiesLeague.length !== PARTIES) {
  state.partiesLeague = (state.mode === "league") ? state.parties : makeEmptyParties();
}
if (!Array.isArray(state.partiesOverrun) || state.partiesOverrun.length !== PARTIES) {
  state.partiesOverrun = (state.mode === "overrun") ? state.parties : makeEmptyParties();
}
// Strip legacy dimension state from older saves
delete state.partiesDimension;
delete state.dimensionNames;
// Legacy modes redirect to league
if (state.mode === "dimension" || state.mode === "glsummary") state.mode = "league";
if (state.mode === "summary" || state.mode === "auction-gl" || state.mode === "auction-overrun" || state.mode === "roster" || state.mode === "auction-request" || state.mode === "users" || state.mode === "wheel" || state.mode === "help") {
  state.parties = state.partiesLeague;
} else {
  state.parties = state.mode === "overrun" ? state.partiesOverrun : state.partiesLeague;
}
if (!state.jobTargets || typeof state.jobTargets !== "object") state.jobTargets = {};
if (!state.wheelHistory || typeof state.wheelHistory !== "object" || Array.isArray(state.wheelHistory)) state.wheelHistory = {};
// Normalize one auction object: ensure shape + migrate legacy flat assignments
// (cards/white/black at top level → main bucket, fresh sub bucket). Also
// backfills "illusion" key on saves that pre-date the Illusion Fragment item.
function normalizeAuctionState(obj, kind) {
  const defRates = AUCTION_DEFAULT_RATES[kind] || AUCTION_DEFAULT_RATES.gl;
  if (!obj || typeof obj !== "object") {
    return { cards: 0, illusion: 0, white: 0, black: 0, splitMainPercent: 70,
      rates: { ...defRates },
      assignments: { main: { cards: [], illusion: [], white: [], black: [] }, sub: { cards: [], illusion: [], white: [], black: [] } } };
  }
  // bonus system retired 2026-06: counts are entered as final totals now.
  delete obj.bonusCards; delete obj.bonusWhite; delete obj.bonusBlack;
  delete obj.bonusPercent;
  if (typeof obj.illusion !== "number") obj.illusion = 0;
  // Backfill GL main/sub split % (added 2026-05). Valid range 0..100, default 70.
  if (typeof obj.splitMainPercent !== "number" || !isFinite(obj.splitMainPercent)
      || obj.splitMainPercent < 0 || obj.splitMainPercent > 100) obj.splitMainPercent = 70;
  // Backfill / validate editable per-person rates (added 2026-05). Any missing
  // or invalid (<1) key falls back to this mode's default.
  if (!obj.rates || typeof obj.rates !== "object") obj.rates = {};
  ["card", "illusion", "white", "black"].forEach(k => {
    const v = obj.rates[k];
    if (typeof v !== "number" || !isFinite(v) || v < 1) obj.rates[k] = defRates[k];
  });
  let a = obj.assignments;
  if (!a || typeof a !== "object") a = {};
  // Legacy flat shape → migrate into main
  if (Array.isArray(a.cards) || Array.isArray(a.white) || Array.isArray(a.black) || Array.isArray(a.illusion)) {
    a = { main: { cards: a.cards || [], illusion: a.illusion || [], white: a.white || [], black: a.black || [] },
          sub:  { cards: [], illusion: [], white: [], black: [] } };
  }
  ["main","sub"].forEach(f => {
    if (!a[f] || typeof a[f] !== "object") a[f] = { cards: [], illusion: [], white: [], black: [] };
    ["cards","illusion","white","black"].forEach(k => {
      if (!Array.isArray(a[f][k])) a[f][k] = [];
    });
  });
  obj.assignments = a;
  return obj;
}
state.auctionGL      = normalizeAuctionState(state.auctionGL, "gl");
state.auctionOverrun = normalizeAuctionState(state.auctionOverrun, "overrun");
if (!state.overrunMarkers || typeof state.overrunMarkers !== "object") state.overrunMarkers = {};
if (!state.mapBg) state.mapBg = { 1: null, 2: null, 3: null };
if (!(3 in state.mapBg)) state.mapBg[3] = null;

updateModeToggleUI();
document.body.dataset.mode = state.mode;
initMarkers();
initRangeCircles();
rebuildJobFilter();
setupSidebarDrop();
setupTooltip();

if (state.members.length) {
  const savedTeam = loadSavedTeam();
  if (savedTeam) applySavedTeam(savedTeam);
}

render();
applyStaticI18n(document);
updateLocaleSwitcherUI();
renderVersionStamp();
applyMapBg(1); applyMapBg(2); applyMapBg(3);
tryAutoLoadMapImages();
if (state.mode === "league") renderMarkers();
else if (state.mode === "overrun") renderOverrunMarkers();

// Auth + data sync: Firebase handles everything now (members, parties, auction).
// Anonymous sign-in lets guests read; Google sign-in promotes admins.
initSync();          // no-op (legacy stub, just updates UI)
initFirebase();      // sets up auth + realtime listeners
</script>
</body>
