function firebaseConfigured() {
  return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "TODO_REPLACE_ME";
}

async function initFirebase() {
  if (!firebaseConfigured()) {
    console.warn("[firebase] Not configured — Roster tab will show setup hint.");
    return;
  }
  if (typeof firebase === "undefined") {
    console.error("[firebase] SDK not loaded.");
    return;
  }
  try {
    _fbApp     = firebase.initializeApp(FIREBASE_CONFIG);
    _fbAuth    = firebase.auth();
    _fbDB      = firebase.database();
    _fbStorage = firebase.storage();
    _fbReady   = true;

    // Track auth state. On first ever load, sign in anonymously so DB rules
    // (auth != null) pass. If user signs in with Google later, the anonymous
    // session is replaced.
    _fbAuth.onAuthStateChanged(user => {
      _fbUser = user;
      if (!user) {
        // No session at all → sign in anonymously
        _fbAuth.signInAnonymously().catch(e => console.warn("[firebase] anon sign-in failed", e));
        return;
      }
      // First-time setup of listeners (once we have a user, rules let us read)
      if (!_fbSubscribed) fbSubscribeAll();
      // Refresh UI for the new auth state (admin vs guest controls)
      applyViewerMode();
      updateAuthUI();
      if (typeof render === "function") render();
    });
  } catch (e) {
    console.error("[firebase] init failed", e);
  }
}

/* ---------- Firebase subscriptions: realtime listeners on every path ----- */
function fbSubscribeAll() {
  if (!_fbDB || _fbSubscribed) return;
  _fbSubscribed = true;
  _fbMembersRef = _fbDB.ref("members");

  // members → mirror to state.members + rosterCache
  _fbMembersRef.on("value", snap => {
    const v = snap.val() || {};
    rosterCache = Object.entries(v)
      .map(([id, r]) => ({
        id,
        name:    r.name    || "",
        job:     r.job     || "",
        discord: r.discord || "",
        cp:      r.cp      || 0,
        updatedAt: r.updatedAt || 0
      }))
      .sort((a, b) => (a.name || "").localeCompare(b.name || "", "th"));
    _fbApplyingRemote = true;
    state.members = rosterCache.map(r => ({
      id: r.id, name: r.name, job: r.job, discord: r.discord, cp: r.cp, source: "firebase"
    }));
    _fbApplyingRemote = false;
    rebuildJobFilter();
    // Now that members are loaded, re-sanitize party slots — first listener
    // run may have skipped because members weren't ready yet.
    if (state.partiesLeague && sanitizeSlots(state.partiesLeague) && isAdmin()) {
      _fbDB.ref("parties/league").set(state.partiesLeague);
    }
    if (state.partiesOverrun && sanitizeSlots(state.partiesOverrun) && isAdmin()) {
      _fbDB.ref("parties/overrun").set(state.partiesOverrun);
    }
    safeRender();
  }, e => console.warn("[firebase] members listener error", e));

  // Sanitize party slots — drop references to members that no longer exist
  // or have no name/job (ghost rows from migration / dedupe etc).
  // SAFETY: skip if members haven't loaded yet — otherwise we'd wipe valid
  // slots just because their members haven't arrived from Firebase yet.
  // Sanitize uses the LOOSER check (isFullyBlankMember) so we only DELETE the
  // slot reference if there's nothing left to recover. A member with name "X"
  // and no job is rendered as Empty visually but keeps its slot assignment,
  // so admin can complete the roster without losing party data.
  const sanitizeSlots = (parties) => {
    if (!state.members || !state.members.length) return false;
    let dirty = false;
    parties.forEach(p => {
      p.slots = p.slots.map(id => {
        if (!id) return null;
        if (isFullyBlankMember(findMember(id))) { dirty = true; return null; }
        return id;
      });
    });
    return dirty;
  };

  // Diagnostic helpers — exposed on window so the user can call them from the
  // DevTools console when ghost-slot bug is suspected. Returns an array of
  // {kind, party, slot, memId, member, severity}.
  // severity = 'fully-blank' (auto-deleted by sanitize) or 'incomplete' (kept
  // in slot, rendered as Empty visually).
  window.diagGhostSlots = () => {
    const out = [];
    const scan = (kind, parties) => {
      if (!Array.isArray(parties)) return;
      parties.forEach((p, pi) => {
        if (!p || !Array.isArray(p.slots)) return;
        p.slots.forEach((id, si) => {
          if (!id) return;
          const m = findMember(id);
          if (isGhostMember(m)) {
            const severity = isFullyBlankMember(m) ? "fully-blank" : "incomplete";
            out.push({ kind, party: pi + 1, slot: si + 1, memId: id,
                       name: m && m.name, job: m && m.job, severity });
          }
        });
      });
    };
    scan("league",  state.partiesLeague);
    scan("overrun", state.partiesOverrun);
    console.table(out);
    console.log("Members loaded:", state.members.length, "Ghost slots:", out.length);
    return out;
  };

  // Force-clean ghost slots and push to Firebase (admin only).
  window.repairGhostSlots = () => {
    if (!isAdmin()) { console.warn("[repair] need admin to write"); return false; }
    let changed = 0;
    if (sanitizeSlots(state.partiesLeague))  { _fbDB.ref("parties/league").set(state.partiesLeague);   changed++; }
    if (sanitizeSlots(state.partiesOverrun)) { _fbDB.ref("parties/overrun").set(state.partiesOverrun); changed++; }
    console.log("[repair] cleaned", changed, "parties tree(s)");
    if (typeof render === "function") render();
    return changed > 0;
  };

  // parties/league
  _fbDB.ref("parties/league").on("value", snap => {
    const v = snap.val();
    if (!Array.isArray(v) || v.length !== PARTIES) return;
    _fbApplyingRemote = true;
    state.partiesLeague = v.map(p => ({
      id: p.id, name: p.name || "",
      slots: Array.isArray(p.slots) ? p.slots.slice(0, PARTY_SLOTS).concat(Array(PARTY_SLOTS).fill(null)).slice(0, PARTY_SLOTS) : Array(PARTY_SLOTS).fill(null)
    }));
    if (state.mode === "league") state.parties = state.partiesLeague;
    _fbApplyingRemote = false;
    // Sanitize after applying — if anything was orphaned, push the cleaned
    // version back (admin only). Avoids infinite loop via the dirty flag.
    if (sanitizeSlots(state.partiesLeague) && isAdmin()) {
      _fbDB.ref("parties/league").set(state.partiesLeague);
    }
    safeRender();
  });

  // parties/overrun
  _fbDB.ref("parties/overrun").on("value", snap => {
    const v = snap.val();
    if (!Array.isArray(v) || v.length !== PARTIES) return;
    _fbApplyingRemote = true;
    state.partiesOverrun = v.map(p => ({
      id: p.id, name: p.name || "",
      slots: Array.isArray(p.slots) ? p.slots.slice(0, PARTY_SLOTS).concat(Array(PARTY_SLOTS).fill(null)).slice(0, PARTY_SLOTS) : Array(PARTY_SLOTS).fill(null)
    }));
    if (state.mode === "overrun") state.parties = state.partiesOverrun;
    _fbApplyingRemote = false;
    if (sanitizeSlots(state.partiesOverrun) && isAdmin()) {
      _fbDB.ref("parties/overrun").set(state.partiesOverrun);
    }
    safeRender();
  });

  // auction_gl
  _fbDB.ref("auction_gl").on("value", snap => {
    const v = snap.val();
    if (!v || typeof v !== "object") return;
    _fbApplyingRemote = true;
    state.auctionGL = normalizeAuctionState(v);
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "auction-gl") render();
  });

  // auction_overrun
  _fbDB.ref("auction_overrun").on("value", snap => {
    const v = snap.val();
    if (!v || typeof v !== "object") return;
    _fbApplyingRemote = true;
    state.auctionOverrun = normalizeAuctionState(v);
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "auction-overrun") render();
  });

  // job_targets
  _fbDB.ref("job_targets").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.jobTargets = v;
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "summary") render();
  });

  // markers (League mode — party positions on map + movement arrows)
  _fbDB.ref("markers").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.markers = v;
    _fbApplyingRemote = false;
    if (typeof renderMarkers === "function" && state.mode === "league") renderMarkers();
  });

  // overrun_markers (Overrun mode — 4 big-party positions)
  _fbDB.ref("overrun_markers").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.overrunMarkers = v;
    _fbApplyingRemote = false;
    if (typeof renderOverrunMarkers === "function" && state.mode === "overrun") renderOverrunMarkers();
  });

  // leaves (scheduled leave registrations — anyone can read/write to their own
  // entries). Listener fires whenever someone in the guild adds/removes a leave
  // so the page updates realtime.
  _fbDB.ref("leaves").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.leaves = v;
    _fbApplyingRemote = false;
    // Re-render League/Overrun if today's scheduled-leave changed; safeRender
    // because the user might be dragging when a remote leave registers.
    safeRender();
  });

  // auction_requests: per-date guest requests + admin queue. Lives entirely
  // in Firebase so multiple guests see updates instantly; we keep a local
  // mirror in state.auctionRequests for render.
  _fbDB.ref("auction_requests").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.auctionRequests = v;
    _fbApplyingRemote = false;
    if (typeof render === "function" && state.mode === "auction-request") render();
  });

  // system: reset bookkeeping. Read-only for most of the app, written only by
  // autoCheckResets() when crossing a reset boundary.
  _fbDB.ref("system").on("value", snap => {
    const v = snap.val() || {};
    _fbApplyingRemote = true;
    state.system = { lastDailyReset: v.lastDailyReset || "", lastWeeklyReset: v.lastWeeklyReset || "" };
    _fbApplyingRemote = false;
    // Whenever we hear about the system stamps, run a reset check — if our
    // local clock has crossed a boundary the remote stamp hasn't caught yet,
    // we'll perform the reset ourselves.
    autoCheckResets();
  });

  // map_urls: NOT synced — map images are embedded as static assets so they
  // never change. Only markers + arrows sync above.
}

/* ---------- Auto-reset job (daily manual leave + weekly /leaves) ----- */
// Idempotent: each client checks on load + every minute. First client past
// the reset boundary wins (using state.system.lastDailyReset / lastWeeklyReset
// as a "have we already reset for this period?" stamp).
function autoCheckResets() {
  if (!_fbDB || !state.system) return;
  const today  = todayBkkISO();
  const monday = thisMondayISO();
  // Daily reset: clear manual-leave flags on members. We do this on EVERY
  // calendar day in BKK that hasn't been stamped yet.
  if (state.system.lastDailyReset !== today) {
    let cleared = 0;
    // Stamp first to claim ownership of this reset (prevents two clients
    // from racing the work).
    _fbDB.ref("system/lastDailyReset").set(today).catch(()=>{});
    state.system.lastDailyReset = today;
    // Clear the per-member manual flags. We must touch each member because
    // the field lives inside /members/{id} which has admin-only write on
    // most paths. For now, we ONLY clear if admin — guest clients will let
    // the next admin login do it. This keeps Rules simple.
    if (isAdmin() && state.members && state.members.length) {
      state.members.forEach(m => {
        const upd = {};
        if (m.onLeaveLeague)  upd.onLeaveLeague  = false;
        if (m.onLeaveOverrun) upd.onLeaveOverrun = false;
        if (Object.keys(upd).length) {
          _fbDB.ref(`members/${m.id}`).update(upd);
          cleared++;
        }
      });
      if (cleared) console.log(`[reset] daily: cleared manual leave on ${cleared} members`);
    } else if (!isAdmin()) {
      // Guests can't write to /members. The next admin login will pick this up.
      console.log("[reset] daily: skipped (guest cannot clear manual flags) — admin will clear on next login");
    }
    // Auction-request: drop any past-date auction request branches so /auction_requests
    // never grows unbounded. Admin-only; guests skip and the next admin login picks it up.
    if (typeof arAutoClearPast === "function") arAutoClearPast();
    // Reset the Auction GL + Overrun pages so each event day starts fresh
    // — guild rules say the auction is a per-day activity. Admin-only.
    if (isAdmin() && typeof arResetAuctionPages === "function") arResetAuctionPages();
  }
  // Weekly reset: wipe /leaves/ every Monday 00:00 BKK. Stamp uses the
  // Monday ISO so "lastWeeklyReset = <this Monday>" means we're up to date.
  if (state.system.lastWeeklyReset !== monday) {
    _fbDB.ref("system/lastWeeklyReset").set(monday).catch(()=>{});
    state.system.lastWeeklyReset = monday;
    // Any auth'd user can wipe /leaves (Rules allow auth != null write).
    _fbDB.ref("leaves").remove()
      .then(() => console.log("[reset] weekly: /leaves cleared on Monday"))
      .catch(e => console.warn("[reset] weekly clear failed", e));
  }
}
// Re-check every minute so the moment the clock crosses 00:00 BKK we reset
// without needing a page reload.
setInterval(() => {
  if (typeof autoCheckResets === "function") autoCheckResets();
}, 60 * 1000);

/* ---------- Firebase writes (admin only) ---------- */
function fbPushDebounced() {
  if (!_fbDB || !isAdmin() || _fbApplyingRemote) return;
  clearTimeout(_fbPushTimer);
  // Snappy realtime — 300ms collapses a burst of drags into one Firebase write
  _fbPushTimer = setTimeout(fbPushAll, 300);
  flashSyncIndicator("saving");
}

function flashSyncIndicator(state) {
  const el = document.getElementById("syncIndicator");
  if (!el) return;
  if (state === "saving") {
    el.dataset.flash = "1";
    el.style.color = "#fbbf24";
  } else if (state === "done") {
    el.dataset.flash = "";
    el.style.color = "";
  }
}

function fbPushAll() {
  if (!_fbDB || !isAdmin() || _fbApplyingRemote) return;
  try {
    _fbDB.ref("parties/league").set(state.partiesLeague || makeEmptyParties());
    _fbDB.ref("parties/overrun").set(state.partiesOverrun || makeEmptyParties());
    _fbDB.ref("auction_gl").set(state.auctionGL);
    _fbDB.ref("auction_overrun").set(state.auctionOverrun);
    _fbDB.ref("job_targets").set(state.jobTargets || {});
    _fbDB.ref("markers").set(state.markers || {});
    _fbDB.ref("overrun_markers").set(state.overrunMarkers || {});
    // map_urls intentionally not pushed — images are embedded as static assets
    setTimeout(() => flashSyncIndicator("done"), 200);
  } catch (e) {
    console.warn("[firebase] push failed", e);
    flashSyncIndicator("done");
  }
}

/* ---------- Google sign-in / sign-out ---------- */
async function signInWithGoogle() {
  if (!_fbAuth) { toast("Firebase ยังไม่พร้อม", "error"); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await _fbAuth.signInWithPopup(provider);
    // onAuthStateChanged will handle the rest
  } catch (e) {
    if (e.code === "auth/popup-closed-by-user" || e.code === "auth/cancelled-popup-request") return;
    toast("Login ไม่สำเร็จ: " + (e.message || e.code), "error");
  }
}

async function signOutUser() {
  if (!_fbAuth) return;
  try {
    await _fbAuth.signOut();
    // onAuthStateChanged will sign in anonymously again
  } catch (e) {
    console.warn("[firebase] sign out failed", e);
  }
}

function updateAuthUI() {
  const el = document.getElementById("syncIndicator");
  if (el) {
    if (!_fbUser) {
      el.className = "status sync-indicator viewer";
      el.textContent = "🔵 Connecting…";
    } else if (isAdmin()) {
      el.className = "status sync-indicator live";
      el.textContent = `🟢 Admin · ${_fbUser.email}`;
      el.title = "Logged in as admin";
    } else {
      el.className = "status sync-indicator viewer";
      el.textContent = _fbUser.email ? `👤 ${_fbUser.email}` : "👁 Guest";
      el.title = "Guest mode — กรอกได้แค่ CP";
    }
  }
  const loginBtn = document.getElementById("btnSyncSettings");
  if (loginBtn) {
    if (!_fbUser) loginBtn.textContent = "🔗 Login";
    else if (isAdmin()) loginBtn.textContent = "🔓 Logout";
    else loginBtn.textContent = "🔓 Login";
  }
}

/* ---------- Migration (one-time push of localStorage state) ---------- */
function migrateToFirebase() {
  if (!isAdmin()) { toast("Admin only", "error"); return; }
  if (!_fbDB) { toast("Firebase ยังไม่พร้อม", "error"); return; }
  if (!confirm("Migrate localStorage state → Firebase?\n\nจะส่ง:\n• members (รายชื่อ + job)\n• parties (League + Overrun)\n• auction state (GL + Overrun)\n• job targets\n\n(ของใน Firebase ตอนนี้จะถูกเขียนทับ)")) return;

  // Push members (preserves IDs)
  let memberCount = 0;
  (state.members || []).forEach(m => {
    if (!m.id || !m.name) return;
    _fbDB.ref("members/" + m.id).set({
      name: m.name,
      job: m.job || "",
      cp: m.cp || 0,
      updatedAt: Date.now()
    });
    memberCount++;
  });
  // Push parties + auction
  fbPushAll();
  toast(`✅ Migrated ${memberCount} คน + parties + auction`, "success");
}

/* ----- Roster CRUD ----- */
function rosterAdd() {
  if (!isAdmin()) { toast("Admin only", "error"); return; }
  if (!_fbMembersRef) { toast("Firebase ยังไม่ตั้งค่า", "error"); return; }
  const name = prompt("ชื่อตัวละคร (Guild Member):");
  if (!name || !name.trim()) return;
  const job     = prompt(`Job (ปล่อยว่างได้ — เลือกจาก dropdown หลังเพิ่ม):\n\n${JOB_LIST.join(" / ")}`, "") || "";
  const discord = prompt("Discord username:", "") || "";
  _fbMembersRef.push({
    name:    name.trim(),
    job:     job.trim(),
    discord: discord.trim(),
    cp:      0,
    updatedAt: Date.now()
  });
}

function rosterUpdate(id, field, value) {
  if (!_fbMembersRef) return;
  // Frontend gating: name/job/discord restricted to admin; cp open to everyone
  if ((field === "name" || field === "job" || field === "discord") && !isAdmin()) {
    toast("เพิ่ม/แก้ ชื่อ + Job + Discord ทำได้เฉพาะ Admin", "error");
    renderBattlefields();
    return;
  }
  let val;
  if (field === "cp") val = Math.max(0, parseInt(String(value).replace(/[^0-9]/g, ""), 10) || 0);
  else val = String(value).trim();
  _fbMembersRef.child(id).update({ [field]: val, updatedAt: Date.now() });
}

function rosterDelete(id) {
  if (!isAdmin()) { toast("Admin only", "error"); return; }
  const m = rosterCache.find(r => r.id === id);
  if (!m) return;
  if (!confirm(`ลบ ${m.name} (${m.job}) ?`)) return;
  _fbMembersRef.child(id).remove();
}

function rosterImportFromSheet() {
  if (!isAdmin()) { toast("Admin only", "error"); return; }
  if (!_fbMembersRef) { toast("Firebase ยังไม่ตั้งค่า", "error"); return; }
  const sheetUrl = state.sheetUrl || DEFAULT_SHEET;
  if (!sheetUrl) { toast("ไม่มี Sheet URL", "error"); return; }
  if (!confirm("Import จาก Google Sheet เข้า Roster?\n\nจะดึง 4 fields: ชื่อ / Job / Discord / CP\n• เพิ่มคนใหม่\n• อัพเดต Discord/CP ของคนที่มีอยู่แล้ว (match by name+job)\n\n* ระบบจะ dedupe อัตโนมัติหลัง import")) return;
  (async () => {
    try {
      toast("⏳ กำลังโหลดจาก Sheet…", "");
      const { id, gid } = parseSheetUrl(sheetUrl);
      const resp = await fetchSheetJSON(id, gid);
      const rows = gvizToRows(resp);
      const fetched = extractMembersFromRows(rows);
      // Fetch latest snapshot first — guarantees dedup check sees current Firebase
      // state (avoids race if listener hasn't fired yet on first load).
      const snap = await _fbMembersRef.once("value");
      const existing = [];
      snap.forEach(child => {
        existing.push({ id: child.key, ...child.val() });
      });
      let added = 0, updated = 0;
      for (const m of fetched) {
        const dup = existing.find(r => r.name === m.name && r.job === m.job);
        const payload = {
          name:    m.name,
          job:     m.job,
          discord: m.discord || "",
          cp:      m.cp || 0,
          updatedAt: Date.now()
        };
        if (dup) {
          await _fbMembersRef.child(dup.id).update(payload);
          updated++;
        } else {
          const ref = _fbMembersRef.push();
          await ref.set(payload);
          // Track so subsequent rows in this batch don't re-add the same name+job
          existing.push({ id: ref.key, ...payload });
          added++;
        }
      }
      toast(`✅ Import เสร็จ: เพิ่ม ${added} · อัพเดต ${updated} — กำลัง dedupe…`, "success");
      // Auto-dedupe any leftover duplicates from previous broken imports
      await rosterDedupe(true);
    } catch (e) {
      console.error("[import] failed", e);
      toast("Import ไม่สำเร็จ: " + e.message, "error");
    }
  })();
}

/* Merge duplicates by name+job — keeps the best entry (has discord + higher cp). */
async function rosterDedupe(silent) {
  if (!isAdmin()) { toast("Admin only", "error"); return; }
  if (!_fbMembersRef) { toast("Firebase ยังไม่พร้อม", "error"); return; }
  if (!silent && !confirm("ล้างของซ้ำ?\nระบบจะ merge แถวที่ ชื่อ + Job ซ้ำกัน ให้เหลือแค่แถวเดียว (เลือกแถวที่มี Discord + CP สูงสุด).")) return;
  // Pull latest snapshot — don't rely on local cache
  const snap = await _fbMembersRef.once("value");
  const all = [];
  snap.forEach(child => { all.push({ id: child.key, ...child.val() }); });
  const buckets = {};
  for (const m of all) {
    const key = (m.name || "") + "|" + (m.job || "");
    if (!buckets[key]) buckets[key] = [];
    buckets[key].push(m);
  }
  let removed = 0, merged = 0;
  for (const key in buckets) {
    const group = buckets[key];
    if (group.length <= 1) continue;
    // Pick "best" entry — has discord wins; tiebreaker: highest cp; tiebreaker: lowest id
    const best = group.reduce((a, b) => {
      const sa = (a.discord ? 1000000 : 0) + (a.cp || 0);
      const sb = (b.discord ? 1000000 : 0) + (b.cp || 0);
      return sb > sa ? b : a;
    });
    // Optionally merge any discord/cp into best if best is missing them
    const mergedPayload = {
      name:    best.name,
      job:     best.job,
      discord: best.discord || group.find(g => g.discord)?.discord || "",
      cp:      Math.max(...group.map(g => g.cp || 0)),
      updatedAt: Date.now()
    };
    await _fbMembersRef.child(best.id).update(mergedPayload);
    merged++;
    // Remove all others
    for (const m of group) {
      if (m.id === best.id) continue;
      await _fbMembersRef.child(m.id).remove();
      removed++;
    }
  }
  toast(`✅ Dedupe เสร็จ: merge ${merged} กลุ่ม · ลบซ้ำ ${removed} entries`, "success");
}

/** Members eligible to receive loot (excludes ลา for the matching mode). */
function getAuctionMembers(kind) {
  const leaveFlag = kind === "gl" ? "onLeaveLeague" : "onLeaveOverrun";
  return state.members.filter(m => !m[leaveFlag]);
}

function getAuctionAssignments(kind) {
  const obj = kind === "gl" ? state.auctionGL : state.auctionOverrun;
  if (!obj.assignments || !obj.assignments.main || !obj.assignments.sub) {
    obj.assignments = {
      main: { cards: [], white: [], black: [] },
      sub:  { cards: [], white: [], black: [] }
    };
  }
  return obj.assignments;
}

/** Compute effective totals + per-person allocation + shortage/leftover.
 *  GL bonus formula (derived from base × multiplier — no separate inputs):
 *    - % > 0: cards + illusion ×2 (so bonus = base), feathers ×(1 + %/100)
 *    - % = 0: no bonus at all (bonus = 0 for all)
 *  Overrun: no bonus ever.
 *
 *  Demand is computed from the per-column assignment counts, not the total
 *  member list — user drags names into Card / Illusion / ขาว / ดำ columns
 *  themselves so the system only needs to know who's in each bucket.
 */
function computeAuction(kind) {
  const members = getAuctionMembers(kind);
  const people = members.length;
  const rate = AUCTION_RATES[kind];
  const assignments = getAuctionAssignments(kind);

  // Prune stale member IDs (member-set changed via sheet refresh / delete /
  // manual edit) so .length matches what actually renders. Without this the
  // count says "14 ppl" but the droplist shows zero rows.
  let assignmentsDirty = false;
  ["main", "sub"].forEach(field => {
    if (!assignments[field]) return;
    ["cards", "illusion", "white", "black"].forEach(key => {
      if (!Array.isArray(assignments[field][key])) { assignments[field][key] = []; return; }
      const before = assignments[field][key].length;
      assignments[field][key] = assignments[field][key].filter(id => findMember(id));
      if (assignments[field][key].length !== before) assignmentsDirty = true;
    });
  });
  if (assignmentsDirty) save();

  let base, percent;
  if (kind === "gl") {
    const a = state.auctionGL;
    base = { cards: a.cards|0, illusion: a.illusion|0, white: a.white|0, black: a.black|0 };
    percent = a.bonusPercent|0;
  } else {
    const a = state.auctionOverrun;
    base = { cards: a.cards|0, illusion: a.illusion|0, white: a.white|0, black: a.black|0 };
    percent = 0;
  }

  const bonusActive       = percent > 0;
  const effBonusCards     = bonusActive ? base.cards    : 0;  // ×2 total = +base
  const effBonusIllusion  = bonusActive ? base.illusion : 0;  // ×2 like cards
  const effBonusWhite     = bonusActive ? Math.round(base.white * percent / 100) : 0;
  const effBonusBlack     = bonusActive ? Math.round(base.black * percent / 100) : 0;

  const totalCards    = base.cards    + effBonusCards;
  const totalIllusion = base.illusion + effBonusIllusion;
  const totalWhite    = base.white    + effBonusWhite;
  const totalBlack    = base.black    + effBonusBlack;

  // GL splits each item 70/30 across main+sub fields. Overrun has no sub
  // field — main pool absorbs the full total (sub pool = 0, not rendered).
  const hasSubField = (kind === "gl");
  const splitMain = (n) => hasSubField ? Math.floor(n * 0.7) : n;

  const buildSide = (field, key, pool, perPersonRate) => {
    const ids = assignments[field][key];
    const count = ids.length;
    const need = count * perPersonRate;
    const diff = pool - need;
    let status, statusCls;
    if (count === 0)        { status = "ยังไม่ลาก",  statusCls = "none" }
    else if (diff < 0)      { status = `ขาด ${-diff}`, statusCls = "short" }
    else if (diff === 0)    { status = "พอดี",        statusCls = "ok" }
    else                    { status = `เหลือ ${diff}`, statusCls = "over" }
    return { pool, count, need, diff, status, statusCls };
  };

  const ITEM_META = {
    cards:    { label: "🎴 การ์ด",         rateKey: "card",     unit: "ใบ"   },
    illusion: { label: "🔮 Illusion Frag.", rateKey: "illusion", unit: "ชิ้น" },
    white:    { label: "🪶 ขนขาว",         rateKey: "white",    unit: "ขน"   },
    black:    { label: "🪶 ขนดำ",          rateKey: "black",    unit: "ขน"   }
  };
  const totals    = { cards: totalCards, illusion: totalIllusion, white: totalWhite, black: totalBlack };
  const bonusVals = { cards: effBonusCards, illusion: effBonusIllusion, white: effBonusWhite, black: effBonusBlack };
  const items = ["cards","illusion","white","black"].map(key => {
    const total    = totals[key];
    const mainPool = splitMain(total);
    const subPool  = total - mainPool;
    const meta     = ITEM_META[key];
    const itemRate = rate[meta.rateKey];
    return {
      key,
      label: meta.label,
      unit:  meta.unit,
      rate:  itemRate,
      total, base: base[key], bonus: bonusVals[key],
      main: buildSide("main", key, mainPool, itemRate),
      sub:  buildSide("sub",  key, subPool,  itemRate)
    };
  });

  return { kind, members, people, percent, rate, base, items, assignments, hasSubField };
}

// All four mutators call render() (not just renderBattlefields) so the sidebar's
// .assigned styling + "ซ่อนคนที่จัดตี้แล้ว" filter update with each drag/drop.
// `field` = "main" (70% pool) or "sub" (30% pool).
function assignAuctionMember(kind, field, item, memberId) {
  const a = getAuctionAssignments(kind);
  const bucket = a[field] && a[field][item];
  if (!bucket || bucket.includes(memberId)) return;
  bucket.push(memberId);
  save(); render();
}
function unassignAuctionMember(kind, field, item, memberId) {
  const a = getAuctionAssignments(kind);
  if (!a[field] || !a[field][item]) return;
  a[field][item] = a[field][item].filter(id => id !== memberId);
  save(); render();
}
function clearAuctionColumn(kind, field, item) {
  const a = getAuctionAssignments(kind);
  const bucket = a[field] && a[field][item];
  if (!bucket || !bucket.length) return;
  if (!confirm("ล้างรายชื่อทั้งคอลัมน์นี้?")) return;
  a[field][item] = [];
  save(); render();
}
function autoFillAuctionColumn(kind, field, item) {
  const eligibleMembers = getAuctionMembers(kind);
  const a = getAuctionAssignments(kind);
  if (!a[field]) return;
  a[field][item] = eligibleMembers.map(m => m.id);
  save(); render();
}
function dropAuctionColumn(e, kind, field, item) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  if (drag.type === "member") {
    assignAuctionMember(kind, field, item, drag.payload.memberId);
  }
}

function setAuctionField(kind, field, value) {
  // Strip non-digits so the displayed value can't drift from parsed state.
  const cleaned = String(value).replace(/[^0-9]/g, "");
  let n = parseInt(cleaned, 10);
  if (isNaN(n) || n < 0) n = 0;
  if (kind === "gl") {
    if (state.auctionGL[field] === n) return;
    state.auctionGL[field] = n;
  } else {
    if (state.auctionOverrun[field] === n) return;
    state.auctionOverrun[field] = n;
  }
  save();
  // Preserve focus + cursor across re-render so user can keep typing.
  let cursorPos = null;
  const focused = document.activeElement;
  if (focused && focused.tagName === "INPUT") {
    try { cursorPos = focused.selectionStart; } catch (e) {}
  }
  renderBattlefields();
  const newInput = document.querySelector(
    `input[data-auction-kind="${kind}"][data-auction-field="${field}"]`
  );
  if (newInput) {
    newInput.focus();
    // Cursor: keep where the user had it if known; otherwise park at end
    // (typing happens at end). Never default to position 0 — that's the bug
    // the user reported ("เด้งมาข้างหน้า").
    const pos = (cursorPos != null) ? Math.min(cursorPos, newInput.value.length) : newInput.value.length;
    try { newInput.setSelectionRange(pos, pos); } catch (e) {}
  }
}

function setAuctionPercent(kind, value) {
  const n = parseInt(value, 10) || 0;
  if (kind !== "gl") return;
  if (state.auctionGL.bonusPercent === n) return;
  state.auctionGL.bonusPercent = n;
  save();
  renderBattlefields();
}

function buildAuctionInputCard(opts) {
  const { icon, label, value, rate, perPersonLabel, effective, status, statusCls, kind, field } = opts;
  const effectiveLine = effective != null
    ? `<div class="ai-effective">= ${effective} (ใช้จริง)</div>` : "";
  const statusLine = status
    ? `<div class="ai-status ${statusCls || ""}">${status}</div>` : "";
  return `
    <div class="auction-input-card">
      <div class="ai-label"><span class="ai-icon">${icon}</span>${label}</div>
      <input type="text" inputmode="numeric" pattern="[0-9]*" value="${value}"
             data-auction-kind="${kind}" data-auction-field="${field}"
             oninput="setAuctionField('${kind}','${field}',this.value)"
             onfocus="this.select()" />
      ${rate != null ? `<div class="ai-rate"><b>${rate}</b> ${perPersonLabel}</div>` : ""}
      ${effectiveLine}
      ${statusLine}
    </div>`;
}

function buildAuctionView(kind) {
  const data = computeAuction(kind);
  const isGL = kind === "gl";
  const titleIcon = "🎴";
  const title = isGL ? "Auction GL" : "Auction Overrun";
  const rateLabel = `1 / ${data.rate.white} / ${data.rate.black}`;

  // Base inputs
  const baseInputs = ["cards","illusion","white","black"].map(field => {
    const it = data.items.find(i => i.key === field);
    const labelMap = {
      cards:    ["🎴","การ์ด",         "ใบ/คน"  ],
      illusion: ["🔮","Illusion Frag.", "ชิ้น/คน"],
      white:    ["🪶","ขนขาว",         "ขน/คน"  ],
      black:    ["🪶","ขนดำ",          "ขน/คน"  ]
    };
    const [icon, lbl, ppLbl] = labelMap[field];
    return buildAuctionInputCard({
      icon, label: lbl,
      value: it.base,
      rate: it.rate,
      perPersonLabel: ppLbl,
      kind, field
    });
  }).join("");

  // Status summary — for GL shows main+sub split; for Overrun a single combined
  // pool. Status column gives the worst of the rendered sides.
  const summaryRows = data.items.map(it => {
    if (data.hasSubField) {
      const worst = it.sub.diff < it.main.diff ? it.sub : it.main;
      const fieldName = worst === it.main ? "หลัก" : "รอง";
      const statusText = worst.statusCls === "none" ? "ยังไม่ลาก" : `${fieldName}: ${worst.status}`;
      return `
        <tr>
          <td class="item">${it.label}</td>
          <td class="num"><b>${it.total}</b></td>
          <td class="num" style="color:#fbbf24">${it.main.need}/<b>${it.main.pool}</b></td>
          <td class="num" style="color:#06b6d4">${it.sub.need}/<b>${it.sub.pool}</b></td>
          <td class="status-cell ${worst.statusCls}">${statusText}</td>
        </tr>`;
    }
    return `
      <tr>
        <td class="item">${it.label}</td>
        <td class="num"><b>${it.total}</b></td>
        <td class="num">${it.main.need}/<b>${it.main.pool}</b></td>
        <td class="status-cell ${it.main.statusCls}">${it.main.status}</td>
      </tr>`;
  }).join("");

  const shortPairs = [];
  data.items.forEach(it => {
    const fields = data.hasSubField ? ["main","sub"] : ["main"];
    fields.forEach(f => {
      if (it[f].diff < 0) shortPairs.push({ label: it.label, field: f, short: -it[f].diff });
    });
  });
  const fieldThai = (f) => f === "main" ? "หลัก" : "รอง";
  const warning = (data.people > 0 && shortPairs.length) ? `
    <div class="auction-warning">
      ⚠️ <b>ของไม่พอ</b> — ${shortPairs.map(s => data.hasSubField
          ? `${s.label.replace(/^[^\s]+\s/, "")}(สนาม${fieldThai(s.field)}) ขาด ${s.short}`
          : `${s.label.replace(/^[^\s]+\s/, "")} ขาด ${s.short}`).join(", ")}
    </div>` : "";

  // Bonus section (GL only) — % picker only; system derives bonus from base × multiplier.
  // Cards + Illusion always ×2 when bonus active; feathers ×(1+%/100).
  const bonusActive = data.percent > 0;
  const featherMult = (1 + data.percent / 100).toFixed(2);
  const bonusRows = isGL ? data.items.map(it => {
    const isFixedDouble = (it.key === "cards" || it.key === "illusion");
    const multLabel     = isFixedDouble ? (bonusActive ? "×2" : "×1") : `×${featherMult}`;
    return `
      <tr>
        <td class="item">${it.label}</td>
        <td class="num">${it.base}</td>
        <td class="num">${multLabel}</td>
        <td class="num"><b>${it.total}</b> ${bonusActive ? `<span style="color:var(--muted);font-weight:400">(+${it.bonus})</span>` : ""}</td>
      </tr>`;
  }).join("") : "";
  const bonusSection = isGL ? `
    <div class="auction-section bonus">
      <h3>⭐ Bonus rate</h3>
      <div class="auction-percent-row">
        <span class="label">เลือก % เบิ้ลของวันนี้ (การ์ด ×2 เมื่อ %>0, ขน ×(1+%)):</span>
        ${AUCTION_PERCENTS.map(p => `
          <button class="auction-percent-btn ${data.percent === p ? "active" : ""}"
                  onclick="setAuctionPercent('gl', ${p})">${p}%</button>`).join("")}
      </div>
      <table class="auction-summary-table">
        <thead>
          <tr>
            <th style="text-align:left">รายการ</th>
            <th>Base (รับมา)</th>
            <th>คูณ</th>
            <th>หลัง Bonus</th>
          </tr>
        </thead>
        <tbody>${bonusRows}</tbody>
      </table>
    </div>` : "";

  // Two sets of 3 drag-drop columns: สนามหลัก (main, 70% pool) + สนามรอง (sub, 30% pool).
  // Each column = drop zone for member chips; per-person quantity auto-filled by rate.
  const COL_STYLES = {
    cards:    "#ec4899",
    illusion: "#a855f7",
    white:    "#fbbf24",
    black:    "#6b7280"
  };
  const buildAuctionCol = (field, it) => {
    const side = it[field];
    const ids = data.assignments[field][it.key];
    // Page numbering:
    //  - GL: ONE continuous chain across all 8 buckets in order:
    //      การ์ดสนามหลัก → การ์ดสนามรอง → Illusion-หลัก → Illusion-รอง
    //      → ขนขาว-หลัก → ขนขาว-รอง → ขนดำ-หลัก → ขนดำ-รอง
    //    chainOffset for a bucket = cumulative items used by earlier buckets
    //    in the chain (each bucket's people × that bucket's item rate). Page =
    //    ceil(startItem / 4), no reset within a bucket.
    //  - Overrun: chain is INDEPENDENT per column (cards/illusion/white/black
    //    each start at item #1). Within a column, items run sequentially across
    //    auction pages of 4 slots, splitting a person's allocation across pages
    //    when needed (e.g. Overrun white/black rate=10 → 1 คน กิน 3 หน้า).
    const isGLChain = (data.kind === "gl");
    let chainOffset = 0;
    if (isGLChain) {
      const a     = data.assignments;
      const cRate = data.rate.card;
      const iRate = data.rate.illusion;
      const wRate = data.rate.white;
      const bRate = data.rate.black;
      const afterCardMain     = a.main.cards.length    * cRate;
      const afterCardSub      = afterCardMain     + a.sub.cards.length    * cRate;
      const afterIllusionMain = afterCardSub      + a.main.illusion.length * iRate;
      const afterIllusionSub  = afterIllusionMain + a.sub.illusion.length  * iRate;
      const afterWhiteMain    = afterIllusionSub  + a.main.white.length    * wRate;
      const afterWhiteSub     = afterWhiteMain    + a.sub.white.length     * wRate;
      const afterBlackMain    = afterWhiteSub     + a.main.black.length    * bRate;
      chainOffset =
          it.key === "cards"    && field === "main" ? 0
        : it.key === "cards"    && field === "sub"  ? afterCardMain
        : it.key === "illusion" && field === "main" ? afterCardSub
        : it.key === "illusion" && field === "sub"  ? afterIllusionMain
        : it.key === "white"    && field === "main" ? afterIllusionSub
        : it.key === "white"    && field === "sub"  ? afterWhiteMain
        : it.key === "black"    && field === "main" ? afterWhiteSub
        : /* black sub */                              afterBlackMain;
    }
    const rows = ids.map((memId, i) => {
      const m = findMember(memId);
      if (!m) return "";
      // Search filter — if a query is active, hide rows that don't match the
      // name. Index `i` is preserved so page calculation stays correct for the
      // visible rows (a person searched mid-list still sees their real page).
      if (_auctionSearch && !(m.name || "").toLowerCase().includes(_auctionSearch)) {
        return "";
      }
      // Items number 1-4 LOCAL to each page (reset whenever the page changes).
      // Split the person's allocation into segments per real auction page (one
      // badge per page they touch). Both modes share the same chain math; only
      // chainOffset differs (GL chains across buckets, Overrun resets to 0 per
      // column).
      const segments = [];
      {
        let remaining = it.rate;
        let cursor    = chainOffset + i * it.rate + 1;
        while (remaining > 0) {
          const pg         = Math.ceil(cursor / AUCTION_ITEMS_PER_PAGE);
          const startLocal = ((cursor - 1) % AUCTION_ITEMS_PER_PAGE) + 1;
          const slotsLeft  = AUCTION_ITEMS_PER_PAGE - startLocal + 1;
          const take       = Math.min(slotsLeft, remaining);
          segments.push({ page: pg, startLocal, endLocal: startLocal + take - 1 });
          cursor    += take;
          remaining -= take;
        }
      }
      const pageBadge = segments.map(s => {
        const itemsTxt = s.startLocal === s.endLocal ? `ชิ้น ${s.startLocal}` : `ชิ้น ${s.startLocal}-${s.endLocal}`;
        return `<span class="aar-page">หน้า ${s.page} · ${itemsTxt}</span>`;
      }).join("");
      return `
        <div class="auction-assigned-row">
          <span class="aar-rk">${i + 1}.</span>
          <div class="aar-info">
            <span class="aar-name">${escapeHtml(m.name)}</span>
            <span class="aar-job">${escapeHtml(m.job || "")}</span>
            ${pageBadge}
          </div>
          <span class="aar-del" title="ลบออก"
                onclick="unassignAuctionMember('${data.kind}','${field}','${it.key}','${m.id}')">×</span>
        </div>`;
    }).join("");

    const ppLabel = it.key === "cards" ? "ใบ/คน"
                  : it.key === "illusion" ? "ชิ้น/คน"
                  : "ขน/คน";
    const poolLabel = !data.hasSubField ? "รวม"
                    : field === "main"  ? "หลัก70%" : "รอง30%";
    return `
      <div class="auction-column" style="--col:${COL_STYLES[it.key]}">
        <div class="ac-head">
          <span>${it.label}</span>
          <span class="ac-rate"><b>${it.rate}</b> ${ppLabel}</span>
        </div>
        <div class="ac-stats">
          <div>
            <span class="ac-stat-label">คน</span>
            <span class="ac-stat-val">${side.count}</span>
          </div>
          <div>
            <span class="ac-stat-label">ใช้/${poolLabel}</span>
            <span class="ac-stat-val">${side.need}/${side.pool}</span>
          </div>
          <div>
            <span class="ac-stat-label">สถานะ</span>
            <span class="ac-stat-val ac-status ${side.statusCls}">${side.status}</span>
          </div>
        </div>
        <div class="ac-droplist"
             ondragover="dragOverEl(event)"
             ondragleave="dragLeaveEl(event)"
             ondrop="dropAuctionColumn(event,'${data.kind}','${field}','${it.key}')">
          ${rows || (_auctionSearch
            ? `<div class="ac-empty">🔍 ไม่มี "${escapeHtml(_auctionSearch)}"<br>ในคอลัมน์นี้</div>`
            : `<div class="ac-empty">ลากชื่อจาก sidebar<br>มาวางที่นี่</div>`)}
        </div>
        <div class="ac-actions">
          <button onclick="autoFillAuctionColumn('${data.kind}','${field}','${it.key}')">✨ ใส่ทุกคน</button>
          <button class="danger" onclick="clearAuctionColumn('${data.kind}','${field}','${it.key}')">🗑 ล้าง</button>
        </div>
      </div>`;
  };

  const mainCols = data.items.map(it => buildAuctionCol("main", it)).join("");
  const subCols  = data.hasSubField ? data.items.map(it => buildAuctionCol("sub",  it)).join("") : "";

  const noMembersFallback = `
    <div style="color:var(--muted);text-align:center;padding:30px">
      ยังไม่มีสมาชิก — กด "🔄 Refresh จาก Sheet"
    </div>`;
  const mainHeader = data.hasSubField
    ? "👥 สนามหลัก (70%) — ลากชื่อจาก sidebar มาวางในคอลัมน์"
    : "👥 รายชื่อรับของ — ลากชื่อจาก sidebar มาวางในคอลัมน์";

  // Search input — lets guests filter by their name to see only their rows.
  // The search applies to BOTH main + sub columns; columns without a match
  // show a placeholder so it's clear "ไม่มีชื่อนี้ในคอลัมน์นี้".
  const searchSection = `
    <div class="auction-section" style="padding:10px 14px">
      <input class="auction-search-input"
             placeholder="🔎 ค้นหาชื่อตัวเอง — แสดงเฉพาะแถวที่มีชื่อนี้ (ใส่ทีละ 1 ชื่อ)"
             value="${escapeHtml(_auctionSearch || "")}"
             oninput="auctionSearchInput(this.value)" />
      ${_auctionSearch ? `<button onclick="auctionSearchInput('')" style="margin-left:6px;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px">ล้างค้นหา</button>` : ""}
    </div>`;
  const memberSection = `
    <div class="auction-section">
      <h3>${mainHeader}</h3>
      ${data.members.length ? `<div class="auction-columns">${mainCols}</div>` : noMembersFallback}
    </div>`;
  const subSection = data.hasSubField ? `
    <div class="auction-section">
      <h3>🛡️ สนามรอง (30%) — ลากชื่อจาก sidebar มาวางในคอลัมน์</h3>
      ${data.members.length ? `<div class="auction-columns">${subCols}</div>` : noMembersFallback}
    </div>` : "";

  return `
    <div class="auction-view">
      <div class="auction-hero ${isGL ? "" : "overrun"}">
        <h2>${titleIcon} ${title}</h2>
        <div class="spacer" style="flex:1"></div>
        <div class="auction-meta">
          <span class="rate-pill">คน: <b>${data.people}</b></span>
          <span class="rate-pill">อัตรา: <b>${rateLabel}</b></span>
          ${isGL ? `<span class="rate-pill">Bonus: <b>${data.percent}%</b></span>` : ""}
        </div>
      </div>

      <div class="auction-section">
        <h3>📦 ของหลัก (Base)</h3>
        <div class="auction-inputs">${baseInputs}</div>
      </div>

      ${bonusSection}

      <div class="auction-section">
        <h3>📊 สรุปการแจก</h3>
        <table class="auction-summary-table">
          <thead>
            <tr>
              <th style="text-align:left">รายการ</th>
              <th>รวม</th>
              ${data.hasSubField ? `
                <th>สนามหลัก<br><span style="font-weight:400;font-size:9px">ใช้/70%</span></th>
                <th>สนามรอง<br><span style="font-weight:400;font-size:9px">ใช้/30%</span></th>
              ` : `<th>ใช้/มี</th>`}
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody>${summaryRows}</tbody>
        </table>
        ${warning}
      </div>

      ${searchSection}

      ${memberSection}

      ${subSection}
    </div>`;
}

function buildAuctionGlHtml()      { return buildAuctionView("gl"); }
function buildAuctionOverrunHtml() { return buildAuctionView("overrun"); }

/* =====================================================================
 * Auction Request page (ขอประมูล)
 * =====================================================================
 * Guest claims their identity, picks date + items, submits a request.
 * Admin sees a queue grouped by item × main/sub, approves/rejects.
 * Auto-routes (main vs sub) by checking which party the member is in.
 * Auto-cuts when an item's capacity is reached.
 * Auto-clears on the day after activity ends.
 *
 * Data shape (Firebase):
 *   /auction_requests/{date}/{mode}/{requestId} = {
 *     id, memberId, memberName, items: ["cards", ...],
 *     note, status, computedField, requestedAt, decidedAt, decidedBy,
 *     rejectReason
 *   }
 */
const AR_MAX_DAYS_AHEAD = 7;            // can request up to today+7 days
const AR_CLAIMED_KEY    = "roo_party_claimed_member";
const AR_ITEM_META = {
  cards:    { label: "🎴 การ์ด",         rateKey: "card",     unit: "ใบ"   },
  illusion: { label: "🔮 Illusion Frag.", rateKey: "illusion", unit: "ชิ้น" },
  white:    { label: "🪶 ขนขาว",         rateKey: "white",    unit: "ขน"   },
  black:    { label: "🪶 ขนดำ",          rateKey: "black",    unit: "ขน"   }
};

// View state for the request page (not persisted; rebuilt on render)
let _arSelectedDate = null;
let _arModalState   = null;  // { date, mode, items: Set, note } when modal open

function arGetClaimedMemberId() {
  return localStorage.getItem(AR_CLAIMED_KEY) || "";
}
function arSetClaimedMember(id) {
  if (id) localStorage.setItem(AR_CLAIMED_KEY, id);
  else    localStorage.removeItem(AR_CLAIMED_KEY);
  render();
}

/** Has the member registered leave for the given date in /leaves/?
 *  state.leaves[memberId][date] === true means "ลา". Members on leave
 *  for the war day forfeit their auction request right.
 */
function arHasLeaveOnDate(memberId, date) {
  if (!memberId || !date || !state.leaves) return false;
  const bucket = state.leaves[memberId];
  return !!(bucket && bucket[date]);
}

function arGetDateRange() {
  // Today plus next AR_MAX_DAYS_AHEAD days, BKK timezone
  const out = [];
  for (let i = 0; i < AR_MAX_DAYS_AHEAD; i++) {
    out.push(addDaysBkkISO(todayBkkISO(), i));
  }
  return out;
}

// Add N days to an ISO yyyy-mm-dd string (BKK). N can be 0.
function addDaysBkkISO(iso, n) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + n);
  return dt.toISOString().slice(0, 10);
}

// Auction Request is always open for the next AR_MAX_DAYS_AHEAD days —
// no per-day enable required. Daily reset wipes the auction pages at
// 00:00 BKK so each event day starts with a fresh sheet.

/** Detect main/sub for a member in a given mode. Returns "main" | "sub" | null. */
function arDetectField(memberId, mode) {
  const parties = mode === "gl" ? state.partiesLeague : state.partiesOverrun;
  if (!Array.isArray(parties)) return null;
  for (let i = 0; i < parties.length; i++) {
    const p = parties[i];
    if (p && Array.isArray(p.slots) && p.slots.includes(memberId)) {
      // Parties 1-8 (index 0-7) = main field; 9-16 = sub field
      return i < 8 ? "main" : "sub";
    }
  }
  return null;
}

function arGetRequests(date, mode) {
  const all = (state.auctionRequests && state.auctionRequests[date]) || {};
  const list = (all[mode]) || {};
  return Object.values(list).sort((a, b) => (a.requestedAt || 0) - (b.requestedAt || 0));
}

function arGetMyRequests(memberId) {
  if (!memberId || !state.auctionRequests) return [];
  const out = [];
  Object.entries(state.auctionRequests).forEach(([date, byMode]) => {
    Object.entries(byMode || {}).forEach(([mode, byId]) => {
      Object.values(byId || {}).forEach(r => {
        if (r.memberId === memberId) out.push({ ...r, date, mode });
      });
    });
  });
  return out.sort((a, b) => (b.requestedAt || 0) - (a.requestedAt || 0));
}

function arCreateRequest({ date, mode, items, note }) {
  if (!_fbDB) { toast("Firebase ยังไม่พร้อม", "error"); return; }
  const memberId = arGetClaimedMemberId();
  if (!memberId) { toast("กรุณาเลือกชื่อตัวเองก่อน", "error"); return; }
  const m = findMember(memberId);
  if (!m) { toast("ไม่พบสมาชิก", "error"); return; }
  if (arHasLeaveOnDate(memberId, date)) {
    toast(`คุณลงลาวันที่ ${date} ไว้แล้ว — ไม่มีสิทธิ์ขอประมูล (ถ้าเข้าได้ ยกเลิกลาก่อนในแท็บ "🌴 ลา")`, "error");
    return;
  }
  if (!Array.isArray(items) || items.length === 0) { toast("เลือกของอย่างน้อย 1 อย่าง", "error"); return; }

  // Block duplicate: same member + same date+mode + overlapping items
  const existing = arGetRequests(date, mode).filter(r =>
    r.memberId === memberId && r.status !== "rejected" && r.status !== "withdrawn"
  );
  const conflict = existing.find(r => (r.items || []).some(it => items.includes(it)));
  if (conflict) { toast("คุณขอของบางอย่างไปแล้ว ไปดูในคำขอของฉัน", "error"); return; }

  const id = "req_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7);
  const computedField = arDetectField(memberId, mode);
  const req = {
    id,
    memberId,
    memberName: m.name || "",
    items: items.slice(),
    note: (note || "").slice(0, 200),
    status: "pending",
    computedField,
    requestedAt: Date.now(),
    decidedAt: null,
    decidedBy: null,
    rejectReason: null
  };
  _fbDB.ref(`auction_requests/${date}/${mode}/${id}`).set(req)
    .then(() => toast("✅ ส่งคำขอแล้ว — รอ admin อนุมัติ", "success"))
    .catch(e => {
      toast(`ส่งไม่สำเร็จ: ${e.message}. ตรวจ Firebase Rules ที่ /auction_requests`, "error");
      console.error("[auction-request] create failed", e);
    });
}

function arApproveRequest(date, mode, requestId) {
  if (!isAdmin()) { toast("ต้องเป็น admin", "error"); return; }
  const r = ((state.auctionRequests || {})[date] || {})[mode] || {};
  const req = r[requestId];
  if (!req) return;
  if (req.status === "approved") return;
  // Place into auction column(s)
  const field = req.computedField || arDetectField(req.memberId, mode) || "main";
  const auctionKey = mode === "gl" ? "auctionGL" : "auctionOverrun";
  const obj = state[auctionKey];
  if (!obj) { toast("ยังไม่ได้ตั้งค่า auction state", "error"); return; }
  if (!obj.assignments) obj.assignments = { main: {}, sub: {} };
  ["main","sub"].forEach(f => {
    if (!obj.assignments[f]) obj.assignments[f] = { cards: [], illusion: [], white: [], black: [] };
    ["cards","illusion","white","black"].forEach(k => {
      if (!Array.isArray(obj.assignments[f][k])) obj.assignments[f][k] = [];
    });
  });
  (req.items || []).forEach(item => {
    const bucket = obj.assignments[field][item];
    if (bucket && !bucket.includes(req.memberId)) bucket.push(req.memberId);
  });
  // Persist auction state
  if (_fbDB) _fbDB.ref(mode === "gl" ? "auction_gl" : "auction_overrun").set(obj);
  // Mark request approved
  _fbDB.ref(`auction_requests/${date}/${mode}/${requestId}`).update({
    status: "approved",
    decidedAt: Date.now(),
    decidedBy: (_fbUser && _fbUser.email) || "admin",
    computedField: field
  }).catch(e => {
    toast(`อนุมัติไม่สำเร็จ: ${e.message}`, "error");
    console.error("[auction-request] approve failed", e);
  });
}

function arRejectRequest(date, mode, requestId, reason) {
  if (!isAdmin()) { toast("ต้องเป็น admin", "error"); return; }
  // If was previously approved, also remove from auction columns
  const r = ((state.auctionRequests || {})[date] || {})[mode] || {};
  const req = r[requestId];
  if (req && req.status === "approved") {
    const auctionKey = mode === "gl" ? "auctionGL" : "auctionOverrun";
    const obj = state[auctionKey];
    const field = req.computedField || "main";
    if (obj && obj.assignments && obj.assignments[field]) {
      (req.items || []).forEach(item => {
        const arr = obj.assignments[field][item];
        if (Array.isArray(arr)) {
          const idx = arr.indexOf(req.memberId);
          if (idx >= 0) arr.splice(idx, 1);
        }
      });
      if (_fbDB) _fbDB.ref(mode === "gl" ? "auction_gl" : "auction_overrun").set(obj);
    }
  }
  _fbDB.ref(`auction_requests/${date}/${mode}/${requestId}`).update({
    status: "rejected",
    decidedAt: Date.now(),
    decidedBy: (_fbUser && _fbUser.email) || "admin",
    rejectReason: reason || ""
  }).catch(e => {
    toast(`ปฏิเสธไม่สำเร็จ: ${e.message}`, "error");
    console.error("[auction-request] reject failed", e);
  });
}

function arWithdrawRequest(date, mode, requestId) {
  const r = ((state.auctionRequests || {})[date] || {})[mode] || {};
  const req = r[requestId];
  if (!req) return;
  const me = arGetClaimedMemberId();
  if (req.memberId !== me && !isAdmin()) { toast("ถอนคำขอของคนอื่นไม่ได้", "error"); return; }
  if (req.status === "approved") { toast("Admin อนุมัติแล้ว ถอนเองไม่ได้", "error"); return; }
  _fbDB.ref(`auction_requests/${date}/${mode}/${requestId}`).remove();
}

/** Bulk approve all pending. FIFO (main field before sub, then oldest
 *  first). No capacity check — every request goes into the auction
 *  column even if it overflows the pool. Admin trims excess people
 *  manually on the Auction GL / Auction Overrun pages.
 */
function arBulkApprove(date, mode) {
  if (!isAdmin()) { toast("ต้องเป็น admin", "error"); return; }
  if (!confirm(`อนุมัติทุก request ของ ${date} (${mode === "gl" ? "GL" : "Overrun"})?`)) return;
  const pending = arGetRequests(date, mode)
    .filter(r => r.status === "pending")
    .sort((a, b) => {
      const fa = a.computedField === "sub" ? 1 : 0;
      const fb = b.computedField === "sub" ? 1 : 0;
      if (fa !== fb) return fa - fb;
      return (a.requestedAt || 0) - (b.requestedAt || 0);
    });
  pending.forEach(r => arApproveRequest(date, mode, r.id));
  toast(`✅ อนุมัติ ${pending.length} คน · ถ้าเกินจำนวนของ ไป trim ในหน้า Auction ${mode === "gl" ? "GL" : "Overrun"}`, "success");
}

function arClearDay(date) {
  if (!isAdmin()) { toast("ต้องเป็น admin", "error"); return; }
  if (!confirm(`ล้างคำขอทั้งหมดของ ${date}?`)) return;
  _fbDB.ref(`auction_requests/${date}`).remove()
    .catch(e => { toast(`ล้างไม่สำเร็จ: ${e.message}`, "error"); console.error(e); });
}

/** Auto-clear past dates (anything before today). Called from the daily
 *  reset cron. Admin-only; guests skip and next admin login picks it up.
 */
function arAutoClearPast() {
  if (!isAdmin() || !_fbDB || !state.auctionRequests) return;
  const today = todayBkkISO();
  Object.keys(state.auctionRequests || {}).forEach(date => {
    if (date < today) _fbDB.ref(`auction_requests/${date}`).remove();
  });
}

/** Reset both Auction GL and Auction Overrun pages — clear base inputs +
 *  drag-drop assignments. Called automatically on the daily reset boundary
 *  so each event day starts with a fresh sheet. Also exposed as a manual
 *  admin button in case something needs to be wiped early.
 */
function arResetAuctionPages() {
  if (!isAdmin() || !_fbDB) { toast("ต้องเป็น admin", "error"); return; }
  const fresh = () => ({
    cards: 0, illusion: 0, white: 0, black: 0, bonusPercent: 0,
    assignments: {
      main: { cards: [], illusion: [], white: [], black: [] },
      sub:  { cards: [], illusion: [], white: [], black: [] }
    }
  });
  _fbDB.ref("auction_gl").set(fresh())
    .catch(e => { toast(`ล้าง Auction GL ไม่สำเร็จ: ${e.message}`, "error"); console.error(e); });
  _fbDB.ref("auction_overrun").set(fresh())
    .catch(e => { toast(`ล้าง Auction Overrun ไม่สำเร็จ: ${e.message}`, "error"); console.error(e); });
}

/* ---------- Modal helpers ---------- */
function arOpenRequestModal(date, mode) {
  const memberId = arGetClaimedMemberId();
  if (!memberId) { toast("กรุณาเลือกชื่อตัวเองก่อน", "error"); return; }
  if (!findMember(memberId)) { toast("ไม่พบสมาชิก — เลือกใหม่", "error"); return; }
  if (arHasLeaveOnDate(memberId, date)) {
    toast(`คุณลงลาวันที่ ${date} ไว้ — ไม่มีสิทธิ์ขอประมูล`, "error");
    return;
  }
  _arModalState = { date, mode, items: new Set(), note: "" };
  render();
}
function arCloseModal() {
  _arModalState = null;
  render();
}
function arToggleModalItem(item) {
  if (!_arModalState) return;
  if (_arModalState.items.has(item)) _arModalState.items.delete(item);
  else                                _arModalState.items.add(item);
  render();
}
function arSetModalNote(v) {
  if (!_arModalState) return;
  _arModalState.note = v;
}
function arSubmitModal() {
  if (!_arModalState) return;
  const { date, mode, items, note } = _arModalState;
  arCreateRequest({ date, mode, items: Array.from(items), note });
  _arModalState = null;
  render();
}

/** Format yyyy-mm-dd as short Thai weekday + dd/mm */
function formatDayShortBkk(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  const wd = ["อา","จ","อ","พ","พฤ","ศ","ส"][dt.getUTCDay()];
  return `${wd} ${d}/${m}`;
}

function arRenderRow(r, asAdmin) {
  const m = findMember(r.memberId);
  const name = m ? m.name : (r.memberName || "?");
  const job  = m ? (m.job || "") : "";
  const items = (r.items || []).map(k => `<span class="ar-item-chip">${AR_ITEM_META[k] ? AR_ITEM_META[k].label : k}</span>`).join("");
  const fieldTag = r.computedField
    ? `<span class="ar-field-tag ${r.computedField === "sub" ? "sub" : ""}">${r.computedField === "sub" ? "สนามรอง" : "สนามหลัก"}</span>`
    : `<span class="ar-field-tag" style="background:#3f3f46;color:#a1a1aa">ยังไม่อยู่ในตี้</span>`;
  const leaveTag = arHasLeaveOnDate(r.memberId, r.date)
    ? `<span class="ar-field-tag" style="background:#7c2d12;color:#fdba74">🌴 ลา</span>` : "";
  const modeTag = `<span style="font-size:10px;color:var(--muted)">${r.mode === "gl" ? "GL" : "OR"} · ${r.date}</span>`;
  const statusTag = `<span class="ar-status-tag ${r.status}">${r.status === "pending" ? "รออนุมัติ" : r.status === "approved" ? "อนุมัติ" : "ปฏิเสธ"}</span>`;
  const noteRow = r.note ? `<div class="ar-note">"${escapeHtml(r.note)}"</div>` : "";
  const rejectRow = r.rejectReason ? `<div class="ar-note" style="color:#fca5a5">⚠ ${escapeHtml(r.rejectReason)}</div>` : "";

  let actions = "";
  if (asAdmin && r.status === "pending") {
    actions = `
      <button class="ar-action-btn approve" onclick="arApproveRequest('${r.date}','${r.mode}','${r.id}')">✓ อนุมัติ</button>
      <button class="ar-action-btn reject" onclick="arPromptReject('${r.date}','${r.mode}','${r.id}')">✗ ปฏิเสธ</button>`;
  } else if (!asAdmin && r.status === "pending") {
    actions = `<button class="ar-action-btn reject" onclick="arWithdrawRequest('${r.date}','${r.mode}','${r.id}')">🗑 ถอน</button>`;
  } else if (asAdmin && r.status === "approved") {
    actions = `<button class="ar-action-btn reject" onclick="arPromptReject('${r.date}','${r.mode}','${r.id}')">↩ ยกเลิก</button>`;
  }

  return `<div class="ar-req-row ${r.status}">
    <span class="ar-name">${escapeHtml(name)}</span>
    <span class="ar-job">${escapeHtml(job)}</span>
    ${fieldTag}
    ${leaveTag}
    <span class="ar-items">${items}</span>
    ${modeTag}
    ${statusTag}
    ${actions}
    ${noteRow}
    ${rejectRow}
  </div>`;
}

function arPromptReject(date, mode, requestId) {
  const reason = prompt("เหตุผล (ไม่บังคับ):", "");
  if (reason === null) return;
  arRejectRequest(date, mode, requestId, reason);
}

function arBuildAdminQueue(date) {
  const all = ((state.auctionRequests || {})[date] || {});
  const pendingGl      = arGetRequests(date, "gl").filter(r => r.status === "pending");
  const pendingOverrun = arGetRequests(date, "overrun").filter(r => r.status === "pending");
  const approvedGl     = arGetRequests(date, "gl").filter(r => r.status === "approved");
  const approvedOver   = arGetRequests(date, "overrun").filter(r => r.status === "approved");
  const totalPending = pendingGl.length + pendingOverrun.length;

  const renderGroup = (title, mode, reqs) => {
    if (!reqs.length) return "";
    // Sort: main before sub, then by requestedAt
    const sorted = reqs.slice().sort((a, b) => {
      const fa = a.computedField === "sub" ? 1 : 0;
      const fb = b.computedField === "sub" ? 1 : 0;
      if (fa !== fb) return fa - fb;
      return (a.requestedAt || 0) - (b.requestedAt || 0);
    });
    return `<div class="ar-queue-group">
      <h4>${title} (${reqs.length})</h4>
      ${sorted.map(r => arRenderRow({ ...r, date, mode }, true)).join("")}
    </div>`;
  };

  const bulkBar = `
    <div class="ar-bulk-bar">
      <button class="primary" ${!pendingGl.length ? "disabled" : ""}
        onclick="arBulkApprove('${date}','gl')">🤖 จัดสรร GL อัตโนมัติ</button>
      <button class="primary" ${!pendingOverrun.length ? "disabled" : ""}
        onclick="arBulkApprove('${date}','overrun')">🤖 จัดสรร Overrun อัตโนมัติ</button>
      <div style="flex:1"></div>
      <button onclick="arAutoClearPast()">🧹 ล้างวันที่ผ่านมา</button>
    </div>`;

  const pendingSection = `
    <div class="ar-section">
      <h3>📥 รออนุมัติ (${totalPending})</h3>
      ${bulkBar}
      ${totalPending === 0 ? `<div class="ar-queue-empty">ไม่มีคำขอรออนุมัติ</div>` : ""}
      ${renderGroup("⚔️ GL", "gl", pendingGl)}
      ${renderGroup("🏆 Overrun", "overrun", pendingOverrun)}
    </div>`;

  const approvedSection = (approvedGl.length || approvedOver.length) ? `
    <div class="ar-section">
      <h3>✅ อนุมัติแล้ว (${approvedGl.length + approvedOver.length})</h3>
      ${renderGroup("⚔️ GL", "gl", approvedGl)}
      ${renderGroup("🏆 Overrun", "overrun", approvedOver)}
    </div>` : "";

  return pendingSection + approvedSection;
}

/* =====================================================================
 * Leave page (ลา)
 * =====================================================================
 * Anyone (guest + admin) can register leave for any roster member on any
 * future or current date. The leave activates on that date (mark visible
 * on League/Overrun), then auto-deactivates when the date passes. Whole
 * /leaves/ tree resets every Monday 00:00 BKK (autoCheckResets()).
 */

// Form state — only kept on the local client during interaction. Submitted
// values are written to Firebase immediately, so no local persistence needed.
let _leaveFormMemberId = "";
let _leaveFormDate     = "";  // default = next event day (computed on render)
let _leaveHideToday    = false; // checkbox: hide past entries

function nextEventDayISO() {
  // Find the soonest upcoming Tue/Thu/Sun (today inclusive). Default form
  // value so common case (registering for the next match) is one click.
  let iso = todayBkkISO();
  for (let i = 0; i < 8; i++) {
    if (isEventDay(iso)) return iso;
    // add one day
    const [y, m, d] = iso.split("-").map(Number);
    const dt = new Date(Date.UTC(y, m - 1, d + 1));
    iso = `${dt.getUTCFullYear()}-${String(dt.getUTCMonth()+1).padStart(2,"0")}-${String(dt.getUTCDate()).padStart(2,"0")}`;
  }
  return todayBkkISO();
}

function buildLeaveHtml() {
  if (!firebaseConfigured()) {
    return `
      <div class="leave-view">
        <div class="leave-hero">
          <h2>🌴 ลา</h2>
        </div>
        <div class="auction-warning">⚠️ Firebase ยังไม่ได้ตั้งค่า</div>
      </div>`;
  }
  const today    = todayBkkISO();
  const todayDow = DOW_TH[bkkDow(today)];
  const todayEv  = isEventDay(today);
  // Default form values (only set if not already set by user this session)
  if (!_leaveFormDate) _leaveFormDate = nextEventDayISO();
  // Member dropdown — sorted by name, exclude visually-blank entries
  const members = state.members
    .filter(m => !isVisuallyBlank(m.name))
    .slice()
    .sort((a, b) => (a.name || "").localeCompare(b.name || "", "th"));
  const memOpts = members.map(m =>
    `<option value="${m.id}" ${m.id === _leaveFormMemberId ? "selected" : ""}>${escapeHtml(m.name)}${m.job ? ` (${escapeHtml(m.job)})` : ""}</option>`
  ).join("");
  // Form hint for selected date
  const formDow = bkkDow(_leaveFormDate);
  const formEv  = isEventDay(_leaveFormDate);
  const hintHtml = formEv
    ? `<div class="leave-hint has-event">📅 ${DOW_TH[formDow]} · มีกิจ <b>${formEv}</b> วันนี้</div>`
    : `<div class="leave-hint no-event">📅 ${DOW_TH[formDow]} · ไม่มีกิจวันนี้ (กิจ GL = อังคาร/พฤหัส · Overrun = อาทิตย์)</div>`;
  // Group all leave entries by date
  const byDate = {}; // { "YYYY-MM-DD": [ {id, name, job}, ... ] }
  for (const [memId, dates] of Object.entries(state.leaves || {})) {
    if (!dates || typeof dates !== "object") continue;
    for (const [date, on] of Object.entries(dates)) {
      if (!on) continue;
      const m = findMember(memId);
      if (!m || isVisuallyBlank(m.name)) continue;
      if (!byDate[date]) byDate[date] = [];
      byDate[date].push({ id: memId, name: m.name, job: m.job || "" });
    }
  }
  const allDates = Object.keys(byDate).sort();
  const visibleDates = _leaveHideToday ? allDates.filter(d => d >= today) : allDates;
  const groupsHtml = visibleDates.map(date => {
    const entries = byDate[date].sort((a, b) => (a.name || "").localeCompare(b.name || "", "th"));
    const dow = bkkDow(date);
    const ev = isEventDay(date);
    const isToday = date === today;
    const isPast  = date < today;
    const evPill = ev
      ? `<span class="leave-group-event ${ev === "GL" ? "gl" : "overrun"}">${ev}</span>`
      : `<span class="leave-group-event none">ไม่มีกิจ</span>`;
    const todayBadge = isToday ? `<span class="leave-group-event" style="background:rgba(34,197,94,0.18);border-color:#22c55e;color:#4ade80">วันนี้</span>` : "";
    const cardsHtml = entries.map(e => `
      <div class="leave-card">
        ${e.job ? `<span class="leave-card-job">${escapeHtml(e.job)}</span>` : ""}
        <span class="leave-card-name">${escapeHtml(e.name)}</span>
        <button class="leave-card-del" onclick="leaveRemove('${e.id}','${date}')" title="ยกเลิกลา">✕</button>
      </div>
    `).join("");
    return `
      <div class="leave-group ${isToday ? "is-today" : ""} ${isPast ? "is-past" : ""}">
        <div class="leave-group-head">
          <span class="leave-group-date">${fmtThaiDate(date)} <span class="leave-group-dow">· ${DOW_TH[dow]}</span></span>
          ${evPill}
          ${todayBadge}
          <span class="leave-group-count">${entries.length} คน</span>
        </div>
        <div class="leave-list">${cardsHtml}</div>
      </div>`;
  }).join("");
  const emptyHtml = visibleDates.length === 0
    ? `<div class="leave-empty">— ยังไม่มีรายการลา —<br><span style="font-size:11px">ลงทะเบียนลาด้านบนได้เลย</span></div>`
    : "";
  return `
    <div class="leave-view">
      <div class="leave-hero">
        <h2>🌴 ลา · กิจ WoE</h2>
        <span class="leave-today ${todayEv ? "" : "no-event"}">
          วันนี้ ${todayDow} · ${todayEv ? `มีกิจ ${todayEv}` : "ไม่มีกิจ"}
        </span>
        <div style="flex:1"></div>
        <span style="font-size:11px;color:var(--muted)">รายการลาจะถูกล้างทุกวันจันทร์ 00:00</span>
      </div>
      <div class="leave-form">
        <div class="leave-form-field">
          <label>เลือกชื่อ</label>
          <select id="leaveMemberSelect" onchange="leaveFormSetMember(this.value)">
            <option value="">— เลือกสมาชิก —</option>
            ${memOpts}
          </select>
        </div>
        <div class="leave-form-field">
          <label>วันที่ลา</label>
          <input type="date" id="leaveDateInput" min="${today}" value="${_leaveFormDate}" onchange="leaveFormSetDate(this.value)" />
        </div>
        <button class="leave-add-btn" onclick="leaveAdd()" ${!_leaveFormMemberId || !_leaveFormDate ? "disabled" : ""}>
          ➕ เพิ่มลา
        </button>
        ${hintHtml}
      </div>
      <div class="leave-filter-bar">

/* ---------- Leave form handlers ---------- */
function leaveFormSetMember(v) { _leaveFormMemberId = v; render(); }
function leaveFormSetDate(v)   { _leaveFormDate     = v; render(); }
function leaveSetHidePast(v)   { _leaveHideToday    = !!v; render(); }

function leaveAdd() {
  if (!_leaveFormMemberId || !_leaveFormDate) return;
  if (!_fbDB) { toast("Firebase ยังไม่พร้อม", "error"); return; }
  const memId = _leaveFormMemberId;
  const date  = _leaveFormDate;
  // Reflect locally for snappy UI; Firebase listener will confirm.
  if (!state.leaves[memId]) state.leaves[memId] = {};
  state.leaves[memId][date] = true;
  // Push to Firebase. Path-level write so race-safe.
  _fbDB.ref(`leaves/${memId}/${date}`).set(true)
    .catch(e => { console.warn("[leave] write failed", e); toast("เพิ่มลาไม่สำเร็จ", "error"); });
  // Keep member selected but offer to clear for the next add — clearing makes
  // it easier to add many people for the same date.
  _leaveFormMemberId = "";
  render();
  toast("เพิ่มลาแล้ว", "success");
}

function leaveRemove(memId, date) {
  if (!_fbDB) return;
  if (state.leaves[memId]) delete state.leaves[memId][date];
  _fbDB.ref(`leaves/${memId}/${date}`).remove()
    .catch(e => console.warn("[leave] remove failed", e));
  render();
}


function updateJobTarget(input) {
  const job = input.dataset.job;
  if (!job) return;
  if (!state.jobTargets) state.jobTargets = {};
  let n = parseInt(input.value, 10);
  if (isNaN(n) || n < 0) n = 0;
  state.jobTargets[job] = n;
  save();
  const counts = getMergedJobCounts();
  const { status, cls } = classifyJobStatus(counts[job] || 0, n);
  const tr = input.closest("tr");
  if (tr) {
    const cell = tr.querySelector(".status-cell");
    if (cell) { cell.textContent = status; cell.className = "status-cell " + cls; }
  }
  const tfootTargetCell = document.querySelector(".summary-table tfoot td.target");
  if (tfootTargetCell) {
    const jobsList = Object.keys(counts);
    const totalTarget = jobsList.reduce((s, j) => s + (state.jobTargets[j] || 0), 0);
    tfootTargetCell.textContent = totalTarget;
  }
  const aiBox = document.querySelector(".ai-comment");
  if (aiBox) {
    const jobs = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
    aiBox.innerHTML = `<div class="ai-title">💡 AI Comment</div>${buildAiComment(jobs, counts, state.jobTargets, state.members.length)}`;
  }
}

function median(arr) {
  if (!arr.length) return 0;
  const s = arr.slice().sort((a,b)=>a-b);
  const m = Math.floor(s.length/2);
  return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
}

function findUnderperformers(players, threshold) {
  const scores = players.map(p=>p[7]);
  const med = median(scores);
  const cutoff = med * threshold;
  return players.filter(p => {
    const [_, n, fort, mi, k, a, d, total] = p;
    return total < cutoff || d > (k + a) || (k + a === 0);
  }).map(p => {
    const [rank, name, fort, mi, k, a, d, total] = p;
    const reasons = [];
    if (total < cutoff) reasons.push(`คะแนน ${total} < median × 0.5 (=${Math.round(cutoff)})`);
    if (d > (k + a)) reasons.push(`พ่ายแพ้ ${d} > kill+assist ${k+a}`);
    if (k + a === 0) reasons.push("ไม่ได้ kill/assist เลย");
    return { rank, name, total, k, a, d, reasons };
  });
}

  const pct = max > 0 ? (value / max * 100) : 0;

}

function buildGlPlayerTable(players, side, underSet) {

    const under = underSet.has(name) ? "under" : "";
    return `<tr class="${under}">

      <td class="pname">${escapeHtml(name)}</td>

/* ===== Save / Apply / Reset ===== */
function buildTeamData() {
  if (state.mode === "league") state.partiesLeague = state.parties;
  else if (state.mode === "overrun") state.partiesOverrun = state.parties;
  const ser = (parties) => (parties || makeEmptyParties()).map(p => ({
    name: p.name,
    slots: p.slots.map(memberId => {
      if (!memberId) return null;
      const m = findMember(memberId);
      return m ? { name: m.name, job: m.job } : null;
    })
  }));
  return {
    savedAt: new Date().toISOString(),
    mode: state.mode,
    league: ser(state.partiesLeague || makeEmptyParties()),
    overrun: ser(state.partiesOverrun || makeEmptyParties()),
    jobTargets: state.jobTargets || {}
  };
}

function applySavedTeam(data) {
  if (!data) return;
  const apply = (target, saved) => {
    if (!Array.isArray(saved)) return;
    saved.forEach((savedParty, i) => {
      if (i >= target.length) return;
      const party = target[i];
      if (savedParty.name) party.name = savedParty.name;
      if (Array.isArray(savedParty.slots)) {
        const newSlots = savedParty.slots.map(slot => {
          if (!slot || !slot.name) return null;
          // exact name+job first; fall back to name-only so a member who
          // changed job in the sheet is NOT dropped from the party
          const m = state.members.find(mem => mem.name === slot.name && mem.job === slot.job)
                 || state.members.find(mem => mem.name === slot.name);
          return m ? m.id : null;
        });
        while (newSlots.length < PARTY_SLOTS) newSlots.push(null);
        target[i].slots = newSlots.slice(0, PARTY_SLOTS);
      }
    });
  };
  if (Array.isArray(data.parties) && !data.league && !data.overrun) {
    if (state.mode === "league") apply(state.parties, data.parties);
    return;
  }
  if (!state.partiesLeague || state.partiesLeague.length !== PARTIES) state.partiesLeague = makeEmptyParties();
  if (!state.partiesOverrun || state.partiesOverrun.length !== PARTIES) state.partiesOverrun = makeEmptyParties();
  if (Array.isArray(data.league)) apply(state.partiesLeague, data.league);
  if (Array.isArray(data.overrun)) apply(state.partiesOverrun, data.overrun);
  // Legacy: ignore data.dimension / data.dimensionNames from older saves
  if (data.jobTargets && typeof data.jobTargets === "object") {
    state.jobTargets = { ...state.jobTargets, ...data.jobTargets };
  }
  state.parties = state.mode === "league" ? state.partiesLeague
                : state.mode === "overrun" ? state.partiesOverrun
                : state.partiesLeague;
}

const TEAM_SAVE_KEY = "roo_party_team_v1";

function saveTeam() {
  try {
    const teamData = buildTeamData();
    localStorage.setItem(TEAM_SAVE_KEY, JSON.stringify(teamData));
    toast("✅ บันทึกแล้ว — เปิดมาเรียกอัตโนมัติ", "success");
  } catch (e) {
    toast("บันทึกไม่สำเร็จ: " + e.message, "error");
  }
}

function loadSavedTeam() {
  try {
    const raw = localStorage.getItem(TEAM_SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn(e); }
  return null;
}

function resetAll() {
  if (!confirm("รีเซ็ตข้อมูลทั้งหมด?")) return;
  localStorage.removeItem("roo_party_v2");
  localStorage.removeItem(TEAM_SAVE_KEY);
  location.reload();
}

/* ===== Init ===== */
load();
if (!Array.isArray(state.partiesLeague) || state.partiesLeague.length !== PARTIES) {
  state.partiesLeague = (state.mode === "league") ? state.parties : makeEmptyParties();
}
if (!Array.isArray(state.partiesOverrun) || state.partiesOverrun.length !== PARTIES) {
  state.partiesOverrun = (state.mode === "overrun") ? state.parties : makeEmptyParties();
}
// Strip legacy dimension state from older saves
delete state.partiesDimension;
delete state.dimensionNames;
// Legacy modes redirect to league
if (state.mode === "dimension" || state.mode === "glsummary") state.mode = "league";
if (state.mode === "summary" || state.mode === "auction-gl" || state.mode === "auction-overrun" || state.mode === "roster" || state.mode === "auction-request") {
  state.parties = state.partiesLeague;
} else {
  state.parties = state.mode === "overrun" ? state.partiesOverrun : state.partiesLeague;
}
if (!state.jobTargets || typeof state.jobTargets !== "object") state.jobTargets = {};
// Normalize one auction object: ensure shape + migrate legacy flat assignments
// (cards/white/black at top level → main bucket, fresh sub bucket). Also
// backfills "illusion" key on saves that pre-date the Illusion Fragment item.
function normalizeAuctionState(obj) {
  if (!obj || typeof obj !== "object") {
    return { cards: 0, illusion: 0, white: 0, black: 0, bonusPercent: 0,
      assignments: { main: { cards: [], illusion: [], white: [], black: [] }, sub: { cards: [], illusion: [], white: [], black: [] } } };
  }
  delete obj.bonusCards; delete obj.bonusWhite; delete obj.bonusBlack;
  if (typeof obj.bonusPercent !== "number") obj.bonusPercent = 0;
  if (typeof obj.illusion !== "number") obj.illusion = 0;
  let a = obj.assignments;
  if (!a || typeof a !== "object") a = {};
  // Legacy flat shape → migrate into main
  if (Array.isArray(a.cards) || Array.isArray(a.white) || Array.isArray(a.black) || Array.isArray(a.illusion)) {
    a = { main: { cards: a.cards || [], illusion: a.illusion || [], white: a.white || [], black: a.black || [] },
          sub:  { cards: [], illusion: [], white: [], black: [] } };
  }
  ["main","sub"].forEach(f => {
    if (!a[f] || typeof a[f] !== "object") a[f] = { cards: [], illusion: [], white: [], black: [] };
    ["cards","illusion","white","black"].forEach(k => {
      if (!Array.isArray(a[f][k])) a[f][k] = [];
    });
  });
  obj.assignments = a;
  return obj;
}
state.auctionGL      = normalizeAuctionState(state.auctionGL);
state.auctionOverrun = normalizeAuctionState(state.auctionOverrun);
if (!state.overrunMarkers || typeof state.overrunMarkers !== "object") state.overrunMarkers = {};
if (!state.mapBg) state.mapBg = { 1: null, 2: null, 3: null };
if (!(3 in state.mapBg)) state.mapBg[3] = null;

updateModeToggleUI();
document.body.dataset.mode = state.mode;
initMarkers();
rebuildJobFilter();
setupSidebarDrop();
setupTooltip();

if (state.members.length) {
  const savedTeam = loadSavedTeam();
  if (savedTeam) applySavedTeam(savedTeam);
}

render();
applyMapBg(1); applyMapBg(2); applyMapBg(3);
tryAutoLoadMapImages();
if (state.mode === "league") renderMarkers();
else if (state.mode === "overrun") renderOverrunMarkers();

// Auth + data sync: Firebase handles everything now (members, parties, auction).
// Anonymous sign-in lets guests read; Google sign-in promotes admins.
initSync();          // no-op (legacy stub, just updates UI)
initFirebase();      // sets up auth + realtime listeners
</script>
</body>
</html>
