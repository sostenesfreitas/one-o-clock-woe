<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<meta name="theme-color" content="#0d1117" />
<title>ROO Party — Main/Sub Battlefield Organizer</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-2: #161b22;
    --panel: #1c2128;
    --panel-2: #232a33;
    --border: #30363d;
    --border-2: #444c56;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent-2: #ffb347;
    --main-bf: #1f6feb;
    --sub-bf: #b8703f;
    --danger: #f85149;
    --success: #3fb950;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Segoe UI", "Sarabun", Tahoma, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    font-size: 13px;
  }

  /* ===== Header ===== */
  header {
    display: flex; align-items: center; gap: 10px;
    height: 44px; padding: 0 14px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
  }
  header .brand {
    font-weight: 700; color: var(--accent);
    font-size: 14px;
    display: flex; align-items: center; gap: 6px;
  }
  header .spacer { flex: 1; }
  header button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 5px;
    font-size: 12px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
  }
  header button:hover { background: var(--panel-2); border-color: var(--accent); }
  header button.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
  header .status { font-size: 11px; color: var(--muted); padding: 0 10px; }
  header .sync-indicator {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: default;
  }
  header .sync-indicator.live    { color: #3fb950; border-color: rgba(63,185,80,0.3); }
  header .sync-indicator.writing { color: #fbbf24; border-color: rgba(251,191,36,0.4); }
  header .sync-indicator.error   { color: #f85149; border-color: rgba(248,81,73,0.4); }
  header .sync-indicator.viewer  { color: var(--muted); border-color: var(--border); }

  /* ===== Viewer mode (no PAT) — disable edit controls ===== */
  body.viewer-mode .admin-only { display: none !important; }
  body.viewer-mode .ac-actions,
  body.viewer-mode .aar-del,
  body.viewer-mode .slot-del,
  body.viewer-mode .slot-leave-btn,
  body.viewer-mode .dim-sub-clear,
  body.viewer-mode .sidebar h3 button,
  body.viewer-mode .auction-input-card input,
  body.viewer-mode .auction-percent-row,
  body.viewer-mode .filters .toggle {
    pointer-events: none;
    opacity: 0.45;
  }
  body.viewer-mode [draggable="true"] { cursor: default; }
  body.viewer-mode .member-row:hover { background: var(--panel); border-color: var(--border); }
  body.viewer-mode .ac-droplist { background: rgba(255,255,255,0.02); }

  /* ===== Mode toggle (League / Overrun) ===== */
  .mode-toggle {
    position: relative;
    display: flex;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
    margin-left: 6px;
  }
  .mode-toggle .seg {
    position: relative;
    z-index: 2;
    background: transparent;
    border: 0;
    padding: 5px 12px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: color .18s;
    border-radius: 4px;
  }
  .mode-toggle .seg.active { color: #fff; }
  .mode-toggle .seg:hover:not(.active) { color: var(--text); }
  .mode-toggle .seg-indicator {
    position: absolute;
    top: 3px; bottom: 3px;
    left: 3px;
    width: calc(50% - 3px);
    background: var(--accent);
    border-radius: 4px;
    z-index: 1;
    transition: left .22s ease, background .22s, width .22s;
  }
  /* Indicator: left/width set dynamically by updateModeToggleUI() in JS,
     so tabs can have variable widths (long labels like "Auction Overrun"
     no longer overflow). CSS here only controls background color per mode. */
  .mode-toggle.overrun-active .seg-indicator {
    background: linear-gradient(90deg, #ef4444, #eab308 33%, #22c55e 66%, #3b82f6);
  }
  .mode-toggle.summary-active .seg-indicator {
    background: var(--success);
  }
  .mode-toggle.auction-gl-active .seg-indicator {
    background: linear-gradient(90deg, #f59e0b, #fbbf24);
  }
  .mode-toggle.auction-overrun-active .seg-indicator {
    background: linear-gradient(90deg, #d97706, #f97316);
  }
  .mode-toggle .seg { flex-shrink: 0; white-space: nowrap; }
  .mode-toggle.roster-active .seg-indicator {
    background: linear-gradient(90deg, #10b981, #34d399);
  }
  .mode-toggle.leave-active .seg-indicator {
    background: linear-gradient(90deg, #f97316, #facc15);
  }
  .mode-toggle.auction-request-active .seg-indicator {
    background: linear-gradient(90deg, #8b5cf6, #ec4899);
  }
  .mode-toggle.users-active .seg-indicator {
    background: linear-gradient(90deg, #2563eb, #60a5fa);
  }
  /* Admin-only chrome (Users tab, mobile dropdown option). Hidden by
     default and only revealed when applyViewerMode() flags body
     data-admin="true". */
  .seg-admin, .user-option-admin { display: none; }
  body[data-admin="true"] .seg-admin { display: inline-flex; }
  body[data-admin="true"] .user-option-admin { display: list-item; }

  /* ===== Leave page ===== */
  .leave-view {
    display: flex; flex-direction: column;
    gap: 14px;
    padding-bottom: 20px;
  }
  .leave-hero {
    background: linear-gradient(135deg, #2d1810 0%, #1a0e08 100%);
    border: 1px solid var(--border-2);
    border-left: 4px solid #f97316;
    border-radius: 8px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .leave-hero h2 { margin: 0; font-size: 18px; color: #fed7aa; }
  .leave-hero .leave-today {
    background: rgba(249,115,22,0.15);
    border: 1px solid rgba(249,115,22,0.4);
    color: #fed7aa;
    padding: 4px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
  }
  .leave-hero .leave-today.no-event {
    background: rgba(148,163,184,0.1);
    border-color: rgba(148,163,184,0.3);
    color: var(--muted);
  }
  .leave-form {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: minmax(180px,1fr) minmax(140px,180px) auto;
    gap: 10px;
    align-items: end;
  }
  .leave-form-field { display: flex; flex-direction: column; gap: 4px; }
  .leave-form-field label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .leave-form-field select,
  .leave-form-field input[type="date"] {
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 10px; border-radius: 5px;
    font-size: 13px;
  }
  .leave-form-field input[type="date"]:focus,
  .leave-form-field select:focus {
    outline: none; border-color: var(--accent);
  }
  .leave-add-btn {
    background: var(--accent); color: #fff; border: 0;
    padding: 8px 16px; border-radius: 5px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .leave-add-btn:hover:not(:disabled) { background: #4a8de8; }
  .leave-add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .leave-hint {
    font-size: 11px; color: var(--muted);
    grid-column: 1 / -1;
    margin-top: 2px;
  }
  .leave-hint.has-event { color: #fbbf24; }
  .leave-hint.no-event { color: var(--muted); }

  .leave-filter-bar {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    font-size: 12px;
  }
  .leave-filter-bar label {
    display: flex; align-items: center; gap: 5px;
    cursor: pointer; color: var(--muted);
  }
  .leave-filter-bar label:hover { color: var(--text); }
  .leave-filter-bar input[type="checkbox"] { margin: 0; }

  .leave-groups {
    display: flex; flex-direction: column; gap: 12px;
  }
  .leave-group {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .leave-group-head {
    background: var(--panel-2);
    padding: 9px 14px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .leave-group.is-today .leave-group-head { background: rgba(249,115,22,0.12); border-bottom-color: #f97316; }
  .leave-group.is-past   .leave-group-head { opacity: 0.55; }
  .leave-group-date {
    font-size: 14px; font-weight: 700; color: var(--text);
  }
  .leave-group-dow { color: var(--muted); font-size: 12px; font-weight: 400; }
  .leave-group-event {
    background: rgba(251,191,36,0.18);
    border: 1px solid #fbbf24;
    color: #fbbf24;
    padding: 2px 8px; border-radius: 999px;
    font-size: 10px; font-weight: 700;
  }
  .leave-group-event.gl { background: rgba(88,166,255,0.18); border-color: var(--accent); color: var(--accent); }
  .leave-group-event.overrun { background: rgba(249,115,22,0.18); border-color: #f97316; color: #fb923c; }
  .leave-group-event.none { background: var(--bg-2); border-color: var(--border); color: var(--muted); }
  .leave-group-count {
    font-size: 11px; color: var(--muted);
    margin-left: auto;
  }
  .leave-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 6px; padding: 10px 12px;
  }
  .leave-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
  }
  .leave-card-job {
    background: rgba(88,166,255,0.12);
    color: var(--accent);
    padding: 2px 7px; border-radius: 3px;
    font-size: 10px; font-weight: 600;
    flex-shrink: 0;
  }
  .leave-card-name { flex: 1; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .leave-card-del {
    background: transparent; border: 0;
    color: var(--danger); cursor: pointer;
    font-size: 14px; padding: 0 4px;
    border-radius: 3px;
  }
  .leave-card-del:hover { background: rgba(248,81,73,0.15); }
  .leave-empty {
    padding: 24px; text-align: center;
    color: var(--muted); font-size: 13px;
    background: var(--panel); border: 1px dashed var(--border);
    border-radius: 8px;
  }
  @media (max-width: 700px) {
    .leave-form { grid-template-columns: 1fr; }
    .leave-add-btn { width: 100%; }
    .leave-list { grid-template-columns: 1fr; }
    .leave-hero { padding: 10px 12px; }
    .leave-hero h2 { font-size: 16px; }
  }
  body[data-mode="leave"] .sidebar          { display: none; }
  body[data-mode="leave"] .layout           { grid-template-columns: 1fr !important; }
  body[data-mode="leave"] .hamburger-btn    { display: none; }
  body[data-mode="leave"] .sidebar-backdrop { display: none !important; }

  body[data-mode="auction-request"] .sidebar          { display: none; }
  body[data-mode="auction-request"] .layout           { grid-template-columns: 1fr !important; }
  body[data-mode="auction-request"] .hamburger-btn    { display: none; }
  body[data-mode="auction-request"] .sidebar-backdrop { display: none !important; }

  body[data-mode="users"] .sidebar          { display: none; }
  body[data-mode="users"] .layout           { grid-template-columns: 1fr !important; }
  body[data-mode="users"] .hamburger-btn    { display: none; }
  body[data-mode="users"] .sidebar-backdrop { display: none !important; }

  /* ===== Users page (admin-only) ===== */
  .users-view { display: flex; flex-direction: column; gap: 14px; max-width: 900px; }
  .users-hero {
    background: linear-gradient(135deg, #1e3a8a 0%, #1e1b4b 100%);
    border: 1px solid #3b82f6;
    border-left: 4px solid #60a5fa;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .users-hero h2 { margin: 0; color: #93c5fd; font-size: 18px; }
  .users-hero .users-meta { color: var(--muted); font-size: 13px; }
  .users-section {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
  }
  .users-section h3 { margin: 0 0 12px 0; font-size: 14px; color: var(--text); }
  .users-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; }
  .users-form label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .users-form input {
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; font-size: 13px; width: 100%;
    font-family: monospace;
  }
  .users-form input:focus { border-color: #60a5fa; outline: none; }
  .users-form .pw-row { display: flex; gap: 6px; }
  .users-form .pw-row input { flex: 1; }
  .users-form .pw-row .gen-btn {
    background: var(--bg-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 12px;
    white-space: nowrap;
  }
  .users-form .gen-btn:hover { border-color: #60a5fa; }
  .users-form .create-btn {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white; border: none; border-radius: 6px;
    padding: 10px 18px; font-size: 13px; font-weight: 700;
    cursor: pointer; height: 100%;
  }
  .users-form .create-btn:hover { box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
  @media (max-width: 700px) {
    .users-form { grid-template-columns: 1fr; }
  }

  .users-credential-box {
    background: #052e16; border: 1px solid #10b981;
    border-radius: 6px; padding: 10px 14px; margin-top: 10px;
    font-family: monospace; font-size: 13px;
  }
  .users-credential-box b { color: #6ee7b7; }
  .users-credential-box .row {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    padding: 4px 0;
  }
  .users-credential-box .copy-btn {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 11px;
  }
  .users-credential-box .warn {
    color: #fbbf24; font-size: 11px; margin-top: 6px;
  }

  .users-list { display: flex; flex-direction: column; gap: 6px; }
  .users-row {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .users-row .u-name {
    font-family: monospace; font-weight: 700; font-size: 14px; color: #93c5fd;
    min-width: 120px;
  }
  .users-row .u-meta { color: var(--muted); font-size: 11px; }
  .users-row .u-badge {
    background: rgba(59,130,246,0.18); color: #93c5fd;
    border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 700;
  }
  .users-row .u-del {
    margin-left: auto;
    background: #450a0a; color: #fca5a5; border: 1px solid #b91c1c;
    border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 11px;
  }
  .users-empty {
    text-align: center; color: var(--muted); padding: 20px; font-size: 13px;
  }

  /* ===== Auction Request page ===== */
  .ar-view { display: flex; flex-direction: column; gap: 14px; }
  .ar-hero {
    background: linear-gradient(135deg, #1e1b4b 0%, #3b0764 100%);
    border: 1px solid #4c1d95;
    border-left: 4px solid #a855f7;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .ar-hero h2 { margin: 0; color: #c4b5fd; font-size: 18px; }
  .ar-hero .ar-meta { color: var(--muted); font-size: 13px; }
  .ar-hero .ar-meta b { color: #f9a8d4; }
  .ar-section {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
  }
  .ar-section h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--text); }
  .ar-claim {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .ar-claim label { color: var(--muted); font-size: 12px; }
  .ar-claim select, .ar-claim input {
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; min-width: 180px;
  }
  .ar-claim button {
    background: #a855f7; color: white; border: none; border-radius: 6px;
    padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 700;
  }
  .ar-claim button.ghost {
    background: var(--bg-2); color: var(--text); border: 1px solid var(--border);
  }
  .ar-claim .ar-claimed {
    background: #1e1b4b; border: 1px solid #6d28d9; color: #c4b5fd;
    padding: 6px 12px; border-radius: 6px; font-weight: 700; font-size: 13px;
  }
  .ar-day-tabs {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .ar-day-tab {
    background: var(--bg-2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; cursor: pointer; font-size: 12px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    min-width: 80px;
  }
  .ar-day-tab.active { background: #6d28d9; color: white; border-color: #a855f7; }
  .ar-day-tab .ar-day-num { font-size: 14px; font-weight: 700; }
  .ar-day-tab .ar-day-mode { font-size: 10px; }
  .ar-day-tab.has-gl { border-left: 3px solid #fbbf24; }
  .ar-day-tab.has-overrun { border-right: 3px solid #f97316; }
  .ar-day-tab.has-both { border-left: 3px solid #fbbf24; border-right: 3px solid #f97316; }
  .ar-day-tab.closed { opacity: 0.5; cursor: not-allowed; }

  .ar-request-btn {
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white; border: none; border-radius: 8px;
    padding: 10px 18px; font-size: 14px; font-weight: 700;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .ar-request-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(168,85,247,0.4); }
  .ar-request-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .ar-my-list { display: flex; flex-direction: column; gap: 8px; }
  .ar-req-row {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .ar-req-row.pending  { border-left: 3px solid #fbbf24; }
  .ar-req-row.approved { border-left: 3px solid var(--success); }
  .ar-req-row.rejected { border-left: 3px solid var(--danger); opacity: 0.7; }
  .ar-req-row .ar-name { font-weight: 700; min-width: 120px; }
  .ar-req-row .ar-job { color: var(--muted); font-size: 11px; }
  .ar-req-row .ar-items { display: flex; gap: 4px; flex-wrap: wrap; }
  .ar-req-row .ar-item-chip {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px 8px; font-size: 11px;
  }
  .ar-req-row .ar-field-tag {
    background: #064e3b; color: #6ee7b7; border-radius: 4px;
    padding: 2px 6px; font-size: 11px;
  }
  .ar-req-row .ar-field-tag.sub { background: #422006; color: #fdba74; }
  .ar-req-row .ar-status-tag {
    margin-left: auto; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700;
  }
  .ar-req-row .ar-status-tag.pending  { background: rgba(251,191,36,0.18); color: #fbbf24; }
  .ar-req-row .ar-status-tag.approved { background: rgba(34,197,94,0.18); color: var(--success); }
  .ar-req-row .ar-status-tag.rejected { background: rgba(248,113,113,0.18); color: var(--danger); }
  .ar-req-row .ar-action-btn {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; padding: 4px 10px;
    cursor: pointer; font-size: 11px;
  }
  .ar-req-row .ar-action-btn.approve { background: #064e3b; border-color: #10b981; color: #6ee7b7; }
  .ar-req-row .ar-action-btn.reject  { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
  .ar-req-row .ar-note {
    flex-basis: 100%; color: var(--muted); font-size: 11px; font-style: italic;
    margin-top: 2px;
  }

  .ar-queue-empty {
    text-align: center; color: var(--muted); padding: 20px;
    font-size: 13px;
  }
  .ar-queue-group {
    margin-bottom: 14px;
  }
  .ar-queue-group h4 {

    min-height: 200px;
    max-height: 55vh;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
    transition: background .15s;
  }
  .auction-column .ac-droplist.drag-over {
    background: rgba(251, 191, 36, 0.12);
    outline: 2px dashed #fbbf24;
    outline-offset: -4px;
  }

  .ac-empty {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 40px 10px;
    border: 2px dashed var(--border);
    border-radius: 6px;
    font-size: 12px;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .auction-assigned-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 9px;
    font-size: 12px;
    transition: border-color .12s, background .12s;
  }
  .auction-assigned-row:hover {
    border-color: var(--col, var(--accent));
    background: var(--bg-2);
  }
  .auction-assigned-row .aar-rk {
    color: var(--muted); font-size: 10px; font-weight: 700;
    width: 22px; text-align: right; font-family: monospace;
  }
  .auction-assigned-row .aar-info {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
  }
  .auction-assigned-row .aar-name {
    font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .auction-assigned-row .aar-job {
    color: var(--muted); font-size: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .auction-assigned-row .aar-del {
    color: var(--muted); cursor: pointer;
    padding: 2px 6px; border-radius: 3px;
    font-weight: 700; font-size: 14px; line-height: 1;
  }
  .auction-assigned-row .aar-del:hover {
    color: var(--danger); background: rgba(248, 81, 73, 0.1);
  }
  .auction-assigned-row .aar-page {
    display: inline-block;
    margin-top: 2px;
    font-size: 10px;
    font-weight: 700;
    color: #fbbf24;
    background: rgba(251, 191, 36, 0.12);
    border: 1px solid rgba(251, 191, 36, 0.35);
    padding: 1px 7px;
    border-radius: 10px;
    align-self: flex-start;
    letter-spacing: 0.3px;
  }
  /* Multi-segment badges (person spans pages) stack vertically */
  .auction-assigned-row .aar-page + .aar-page { margin-top: 2px; }

  .auction-column .ac-actions {
    padding: 7px 8px;
    display: flex; gap: 6px; justify-content: stretch;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
  }
  .auction-column .ac-actions button {
    flex: 1;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .auction-column .ac-actions button:hover {
    border-color: var(--col, var(--accent));
    background: var(--bg);
  }
  .auction-column .ac-actions button.danger { color: var(--muted); }
  .auction-column .ac-actions button.danger:hover {
    border-color: var(--danger); color: var(--danger);
  }

  /* ===== Summary view ===== */
  .summary-view {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    flex-shrink: 0;
  }
  .summary-total {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .summary-total .badges { display: flex; gap: 10px; }
  .summary-total .badges span {
    font-size: 12px; font-weight: 400;
    background: var(--panel-2);
    color: var(--text);
    padding: 3px 10px; border-radius: 10px;
  }
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 0;
  }
  /* Wrap table in scroll container at <=600px so it never overflows the
     viewport — falls back to native horizontal scroll if columns don't fit. */
  .summary-grid > table.summary-table {
    display: block; max-width: 100%; overflow-x: auto;
  }
  @media (min-width: 601px) {
    .summary-grid > table.summary-table { display: table; }
  }
  .summary-table th,
  .summary-table td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .summary-table th {
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--panel-2);
  }
  .summary-table td.count {
    font-weight: 700;
    color: var(--text);
    width: 80px;
    text-align: center;
  }
  .summary-table td.target { width: 110px; text-align: center; }
  .summary-table td.status-cell { width: 130px; text-align: center; font-weight: 700; }
  .summary-table tfoot tr { background: var(--panel-2); }
  .summary-table tfoot td {
    font-weight: 700; color: var(--accent);
    border-top: 2px solid var(--border-2);
    border-bottom: 0;
    padding: 10px 12px;
  }
  .summary-table tfoot td.label { color: var(--text); }
  .summary-table input[type="number"] {
    width: 80px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px; border-radius: 4px;
    font-size: 13px; text-align: center;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .summary-table input[type="number"]::-webkit-outer-spin-button,
  .summary-table input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .summary-table input[type="number"]:focus { border-color: var(--accent); outline: none; }
  .status-too-many { color: var(--danger); }
  .status-too-few { color: var(--accent-2); }
  .status-balanced { color: var(--success); }
  .status-none { color: var(--muted); font-weight: 400; }

  /* ===== GL Summary Dashboard ===== */
  .gl-dashboard { display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
  .gl-hero {
    background: linear-gradient(135deg, #0d2235 0%, #1a0f0f 100%);
    border: 1px solid var(--border-2);
    border-radius: 12px;
    padding: 22px 26px;
    position: relative; overflow: hidden;
  }
  .gl-hero::before {
    content: "🏆"; position: absolute; right: 24px; top: 16px;
    font-size: 72px; opacity: 0.15;
  }
  .gl-result-badge {
    display: inline-block;
    background: linear-gradient(135deg, #3fb950, #1d8d3a);
    color: white; padding: 4px 12px; border-radius: 5px;
    font-weight: 700; font-size: 11px; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .gl-result-badge.lose { background: linear-gradient(135deg, #f85149, #d11b1b); }
  .gl-hero h1 { margin: 0; font-size: 22px; font-weight: 800; }
  .gl-hero .gl-sub { color: var(--muted); font-size: 12px; }
  .gl-score-board {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 18px; align-items: center; margin-top: 18px;
  }
  .gl-team {
    background: rgba(0,0,0,0.35);
    border: 2px solid #1f6feb;
    border-radius: 10px;
    padding: 14px 18px;
  }
  .gl-team.them { border-color: #d11b1b; }
  .gl-team-name { font-size: 15px; font-weight: 700; }
  .gl-team.us .gl-team-name { color: #58a6ff; }
  .gl-team.them .gl-team-name { color: #f85149; }
  .gl-team-score { font-size: 36px; font-weight: 900; line-height: 1; margin: 2px 0; }
  .gl-team-sub { color: var(--muted); font-size: 11px; }
  .gl-vs { font-size: 24px; font-weight: 900; color: var(--muted); letter-spacing: 3px; }

  .gl-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 1000px) { .gl-grid-2 { grid-template-columns: 1fr; } }

  .gl-section {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .gl-section h3 {
    margin: 0 0 12px 0; font-size: 15px; color: var(--accent);
    display: flex; align-items: center; gap: 6px;
  }
  .gl-stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }
  .gl-stat-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .gl-stat-card .gl-stat-label {
    color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
  }
  .gl-stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 3px 0;
  }
  .gl-stat-row .name { font-size: 12px; color: var(--muted); }
  .gl-stat-row .us-v { color: #58a6ff; font-weight: 700; font-size: 17px; }
  .gl-stat-row .them-v { color: #f85149; font-weight: 700; font-size: 17px; }
  .gl-stat-bar {
    height: 5px; background: var(--bg);
    border-radius: 3px; overflow: hidden;
    margin-top: 6px; display: flex;
  }
  .gl-stat-bar .us-bar { background: #58a6ff; }
  .gl-stat-bar .them-bar { background: #f85149; }

  /* Bar chart (CSS based) */
  .gl-bar-row {
    display: grid; grid-template-columns: 90px 1fr 60px; gap: 8px;
    align-items: center; padding: 4px 0;
  }
  .gl-bar-row .label { font-size: 11px; color: var(--muted); }
  .gl-bar-row .value { font-weight: 700; text-align: right; font-family: monospace; font-size: 12px; }
  .gl-bar-row .bar {
    height: 16px; background: var(--bg); border-radius: 3px;
    position: relative; overflow: hidden;
  }
  .gl-bar-row .bar .fill {
    height: 100%; transition: width .3s;
  }
  .gl-bar-row.us .bar .fill { background: #58a6ff; }
  .gl-bar-row.them .bar .fill { background: #f85149; }

  /* Player table */
  .gl-ptable { width: 100%; border-collapse: collapse; font-size: 11px; }
  .gl-ptable th, .gl-ptable td {
    padding: 5px 8px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .gl-ptable th {
    background: var(--panel-2); color: var(--muted);
    font-size: 10px; text-transform: uppercase; font-weight: 600;
  }
  .gl-ptable .rk { width: 26px; color: var(--muted); font-weight: 700; }
  .gl-ptable .rk.r1 { color: #f1c40f; }
  .gl-ptable .rk.r2 { color: #c0c0c0; }
  .gl-ptable .rk.r3 { color: #cd7f32; }
  .gl-ptable td.score { text-align: right; font-weight: 700; font-family: monospace; }
  .gl-ptable.us td.score { color: #58a6ff; }
  .gl-ptable.them td.score { color: #f85149; }
  .gl-ptable .kad, .gl-ptable .fm {
    font-family: monospace; font-size: 10px; color: var(--muted);
  }
  .gl-ptable tr.under { background: rgba(248,81,73,0.08); }
  .gl-ptable tr.under .pname::after {
    content: " ⚠️"; color: var(--danger);
  }

  /* Under performance */
  .gl-underperf {
    background: linear-gradient(135deg, rgba(248,81,73,0.06), rgba(255,179,71,0.06));
    border: 1px solid var(--accent);
    border-left: 4px solid var(--accent);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .gl-underperf h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 15px; }
  .gl-under-list { list-style: none; padding: 0; margin: 6px 0; font-size: 12px; }
  .gl-under-list li {
    padding: 4px 0; border-bottom: 1px dashed var(--border);
  }
  .gl-under-list li:last-child { border-bottom: 0; }
  .gl-under-list .uname { font-weight: 700; }
  .gl-under-list .reason { color: var(--muted); font-size: 11px; }
  .gl-under-block { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
  @media (max-width: 900px) { .gl-under-block { grid-template-columns: 1fr; } }
  .gl-under-side h4 {
    margin: 0 0 6px 0; font-size: 13px;
  }
  .gl-under-side.us h4 { color: #58a6ff; }
  .gl-under-side.them h4 { color: #f85149; }

  /* Summary 2-column grid: table left, pie/AI right */
  .summary-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 1000px) { .summary-grid { grid-template-columns: 1fr; } }
  .summary-grid .summary-table { font-size: 12px; }
  .summary-grid .summary-table th,
  .summary-grid .summary-table td { padding: 6px 8px; }
  .summary-grid .summary-table td.count { width: 56px; }
  .summary-grid .summary-table td.target { width: 70px; }
  .summary-grid .summary-table td.status-cell { width: 100px; font-size: 12px; }
  .summary-grid .summary-table input[type="number"] { width: 56px; padding: 3px 4px; font-size: 12px; }
  .summary-side { display: flex; flex-direction: column; gap: 14px; }
  .pie {
    display: block;
    width: 100%;
    max-width: 260px;
    margin: 0 auto;
  }
  .pie path { transition: opacity .15s; }
  .pie path:hover { opacity: 0.8; }
  .pie-legend {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 4px 10px;
    font-size: 11px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .pie-legend span {
    display: flex; align-items: center; gap: 6px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pie-legend span::before {
    content: ""; flex: 0 0 10px;
    width: 10px; height: 10px;
    background: var(--c, var(--muted));
    border-radius: 2px;
  }
  .ai-comment {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
  }
  .ai-comment .ai-title {
    font-weight: 700; color: var(--accent);
    margin-bottom: 8px;
    font-size: 13px;
    display: flex; align-items: center; gap: 6px;
  }
  .ai-comment .ai-line { margin-bottom: 2px; }
  .ai-comment .ai-sub { color: var(--muted); padding-left: 16px; font-size: 11px; }
  .ai-comment b.too-many { color: var(--danger); }
  .ai-comment b.too-few { color: var(--accent-2); }
  .ai-comment b.balanced { color: var(--success); }

  /* ===== Overrun layout ===== */
  .overrun {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex-shrink: 0;
  }
  @media (max-width: 1100px) {
    .overrun { grid-template-columns: 1fr; }
  }
  .bg-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gc, var(--accent));
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .bg-head {
    padding: 8px 12px;
    background: var(--gc, var(--main-bf));
    color: white;
    font-weight: 700;
    font-size: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .bg-head .count {
    font-size: 11px; background: rgba(0,0,0,0.3);
    padding: 2px 8px; border-radius: 10px; font-weight: 400;
  }

  /* ===== Main grid ===== */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    height: calc(100vh - 44px);
    overflow: hidden;
  }
  @media (max-width: 1400px) {
    .layout { grid-template-columns: 220px 1fr; }
  }

  /* ===== Sidebar ===== */
  .sidebar {
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar h3 {
    margin: 0; padding: 10px 12px;
    font-size: 13px; color: var(--text);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar .filters {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }
  .sidebar select, .sidebar input {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 8px; border-radius: 4px;
    font-size: 12px; width: 100%;
  }
  .sidebar .filters label.toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 2px;
    line-height: 1.3;
    user-select: none;
    transition: color .12s;
  }
  .sidebar .filters label.toggle:hover { color: var(--text); }
  .sidebar .filters label.toggle input[type="checkbox"] {
    flex: 0 0 14px;
    width: 14px; height: 14px;
    margin: 0; padding: 0;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .sidebar .filters label.toggle span {
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .member-list {
    flex: 1; overflow-y: auto;
    padding: 4px;
  }
  .member-row {
    display: grid; grid-template-columns: 80px 1fr auto;
    align-items: center;
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    cursor: grab; font-size: 12px;
    transition: background .1s;
  }
  .member-row:hover { background: var(--panel); }
  .member-row.assigned { opacity: 0.35; }
  /* In auction mode, the same person CAN be in multiple buckets — so the
     row stays full opacity (so they look draggable) and a gold count badge
     shows how many buckets they're in. */
  .member-row.in-auction { border-left: 3px solid #fbbf24; }
  .member-row .auction-count {
    display: inline-block;
    background: #fbbf24; color: #0d1117;
    font-size: 9px; font-weight: 800;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 4px;
    line-height: 1.3;
  }
  .member-row.dragging { opacity: 0.4; }
  .member-row .mjob {
    color: var(--accent);
    font-size: 11px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .member-row .mname {
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .member-list::-webkit-scrollbar { width: 8px; }
  .member-list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
  /* --- on-leave (League + Overrun) --- */
  .member-row.on-leave { opacity: 0.55; cursor: grab; }
  .member-row.on-leave .mname { text-decoration: line-through; }
  .leave-badge {
    display: inline-block; font-size: 10px; font-weight: 700; color: #fff;
    background: #f59e0b; padding: 1px 6px; border-radius: 999px; margin-left: 6px;
  }
  .slot.filled.slot-onleave {
    outline: 2px solid #ef4444; outline-offset: -2px; background: rgba(239,68,68,0.15);
  }
  .slot .slot-leave-btn {
    position: absolute; top: 2px; left: 2px; z-index: 3;
    font-size: 9px; font-weight: 700; line-height: 1.4;
    color: var(--muted); background: var(--bg-2);
    border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px;
    cursor: pointer; opacity: 0; transition: opacity .1s;
  }
  .slot.filled:hover .slot-leave-btn { opacity: 0.92; }
  .slot.filled.slot-onleave .slot-leave-btn {
    opacity: 1; color: #fff; background: #ef4444; border-color: #ef4444;
  }

  /* ===== Center battlefields ===== */
  .center {
    overflow-y: auto;
    padding: 10px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .center::-webkit-scrollbar { width: 10px; }
  .center::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

  .bf {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;                /* don't squish – show all rows */
  }
  .bf-head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--main-bf);
    color: white;
    font-weight: 600;
    font-size: 13px;
  }
  .bf.sub .bf-head { background: var(--sub-bf); }
  .bf-head .count {
    font-size: 11px; background: rgba(0,0,0,0.25);
    padding: 2px 8px; border-radius: 10px;
    font-weight: 400;
  }
  .bf-head .spacer { flex: 1; }
  .bf-summary {
    padding: 8px 12px;
    border-top: 1px dashed var(--border);
    background: var(--panel-2);
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center;
    font-size: 11px;
  }
  .bf-job-pill {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .bf-job-pill b { color: var(--accent); font-weight: 700; }
  .bf-job-total {
    margin-left: auto;
    color: var(--text); font-weight: 700;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    padding: 3px 10px; border-radius: 12px;
  }
  .bf-summary.empty {
    color: var(--muted); font-style: italic; justify-content: center;
  }

  .party-row {
    display: grid;
    grid-template-columns: 40px repeat(5, 1fr) 28px;
    border-top: 1px solid var(--border);
    min-height: 44px;
  }
  .party-num {
    background: var(--panel-2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    border-right: 1px solid var(--border);
    cursor: grab;
    color: var(--accent-2);
    user-select: none;
  }
  .party-num.dragging { background: var(--accent-2); color: #000; }
  .bf.sub .party-num { color: var(--sub-bf); }
  .slot {
    border-right: 1px solid var(--border);
    padding: 5px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-height: 56px;
    background: var(--panel);
    position: relative;
    cursor: pointer;
    text-align: center;
  }
  .slot.empty { background: var(--bg-2); color: var(--muted); font-style: italic; font-size: 11px; justify-content: center; }
  .slot.drag-over { background: rgba(88, 166, 255, 0.2); outline: 2px dashed var(--accent); outline-offset: -2px; }
  .slot .slot-job {
    font-size: 10px; color: var(--accent);
    background: rgba(88,166,255,0.12);
    padding: 1px 6px; border-radius: 3px;
    white-space: nowrap;
  }
  .slot .slot-info {
    display: flex; flex-direction: column;
    align-items: center;
    width: 100%;
    min-width: 0;
    gap: 1px;
    line-height: 1.15;
  }
  .slot .slot-name {
    font-size: 12px;
    font-weight: 600;
    max-width: 100%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    text-align: center;
  }
  .slot .slot-cp {
    font-size: 10px;
    color: var(--accent-2);
    font-weight: 700;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    letter-spacing: 0.3px;
    text-align: center;
  }
  .slot.filled { cursor: grab; }
  .slot.filled.dragging { opacity: 0.4; }
  .slot .slot-del {
    position: absolute; top: 2px; right: 2px;
    color: var(--danger);
    opacity: 0;
    font-size: 14px; cursor: pointer;
    width: 18px; height: 18px;
    line-height: 18px; text-align: center;
    border-radius: 3px;
  }
  .slot:hover .slot-del { opacity: 1; }
  .slot .slot-del:hover { background: rgba(248,81,73,0.2); }
  .party-actions {
    background: var(--panel-2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted);
    font-size: 13px;
  }
  .party-actions:hover { color: var(--danger); background: rgba(248,81,73,0.15); }

  /* Per-party row trailing-button cluster: 🔀 sort + ✕ clear. The wrapper
     adopts the same grid-area as .party-actions used to live in, so the
     mobile party-row layout (which positions clear via grid-area) still
     works with the wrapper substituted in. */
  .party-row-actions {
    display: flex; align-items: stretch; background: var(--panel-2);
  }
  .party-row-actions .party-actions { background: transparent; }
  .party-sort {
    background: transparent; border: 0; color: var(--muted);
    padding: 0 8px; cursor: pointer; font-size: 14px;
    border-right: 1px solid var(--border);
  }
  .party-sort:hover { color: #60a5fa; background: rgba(96,165,250,0.12); }
  body.viewer-mode .party-sort { display: none; }
  .header-sort-btn {
    background: rgba(96,165,250,0.18); color: #fff;
    border: 1px solid #60a5fa; border-radius: 6px;
    padding: 3px 10px; font-size: 11px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .header-sort-btn:hover { background: rgba(96,165,250,0.32); }
  body.viewer-mode .header-sort-btn { display: none; }

  /* ===== Maps (inline in scrolling center) ===== */
  .maps-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex-shrink: 0;
  }
  .maps-row > .map-card { min-width: 0; }
  .maps-row .map-wrap {
    /* override per-card cap so each map fills its column */
    max-width: 100%;
    max-height: 65vh;
    min-height: 280px;
  }
  @media (max-width: 1100px) {
    .maps-row { grid-template-columns: 1fr; }
  }
  .map-card {
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    overflow: hidden;
    flex-shrink: 0;                /* don't squish – natural size */
  }
  .map-card .map-title {
    padding: 8px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600;
    gap: 6px;
  }
  .map-card .map-title.main { color: var(--main-bf); }
  .map-card .map-title.sub { color: var(--sub-bf); }
  .map-card .map-title.overrun-map {
    color: #fff;
    background: linear-gradient(90deg, #ef4444, #eab308 33%, #22c55e 66%, #3b82f6);
  }
  .map-card .map-title .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .map-card .map-title button,
  .map-card .map-title label.btn {
    background: var(--bg-2); padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border); cursor: pointer; font-size: 11px;
    color: var(--text); font-weight: 400;
  }
  .map-card .map-title button:hover,
  .map-card .map-title label.btn:hover { border-color: var(--accent); }
  /* Map filter dropdown — focus on one team on the map. Stays the same
     neutral color regardless of selection (kept consistent on user
     request — colored highlight was hard to read). */
  .map-card .map-title .map-filter-select {
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 6px; font-size: 11px; font-family: inherit;
    max-width: 180px;
  }
  .map-card .map-title .map-filter-select:focus { outline: none; border-color: var(--accent); }

  /* Fullscreen map modal */
  .map-card-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 1999;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  .map-card.fullscreen {
    position: fixed !important;
    inset: 20px !important;
    z-index: 2000 !important;
    background: var(--bg-2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    display: flex; flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,0.8);
    overflow: hidden;
    margin: 0 !important;
    max-width: none !important;
  }
  .map-card.fullscreen .map-title { flex-shrink: 0; }
  .map-card.fullscreen .map-wrap {
    width: min(calc(100vw - 60px), calc(100vh - 110px)) !important;
    height: min(calc(100vw - 60px), calc(100vh - 110px)) !important;
    max-width: none !important;
    max-height: none !important;
    min-height: 0 !important;
    aspect-ratio: 1 / 1 !important;
    margin: auto !important;
    flex: 0 0 auto;
  }
  /* Overrun map in fullscreen — fit modal preserving aspect */
  .map-card.fullscreen .map-wrap.overrun-wrap {
    width: calc(100vw - 60px) !important;
    height: auto !important;
    max-height: calc(100vh - 110px) !important;
    aspect-ratio: var(--map-ar, 16/9) !important;
    max-width: calc((100vh - 110px) * var(--map-ar, 1.78)) !important;
    margin: auto !important;
  }

  .map-wrap {
    position: relative;
    background-color: #0a0e13;
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    user-select: none;
    overflow: hidden;
    /* League maps: locked 1:1 square, capped at viewport */
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 65vh;
    max-height: 65vh;
    min-height: 320px;
    margin: 0 auto;
  }
  /* Overrun map: single image, follows natural aspect-ratio */
  .map-wrap.overrun-wrap {
    aspect-ratio: var(--map-ar, 16/9);
    max-width: 100%;
    max-height: 70vh;
    min-height: 400px;
  }
  /* Constrain only to 700–900px (tablet) since mobile <700px overrides with 1fr */
  @media (max-width: 900px) and (min-width: 701px) {
    .layout { grid-template-columns: 180px 1fr; }
    .party-row { grid-template-columns: 32px repeat(5, minmax(0,1fr)) 24px; font-size: 11px; }
    .slot { padding: 3px 4px; min-height: 38px; }
    .slot .slot-name { font-size: 11px; }
    .map-wrap { min-height: 220px; max-width: 60vh; max-height: 60vh; }
  }
  @media (max-width: 700px) {
    .party-row { grid-template-columns: 32px repeat(5, minmax(0,1fr)) 24px; font-size: 11px; }
    .slot { padding: 3px 4px; min-height: 38px; }
    .slot .slot-name { font-size: 11px; }
  }
  .map-frame {
    position: absolute; inset: 0;
    border: 2px solid var(--accent);
    border-radius: 4px;
    pointer-events: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .map-wrap.sub-map .map-frame { border-color: var(--sub-bf); }
  .map-wrap.no-image .map-frame { border-color: var(--border); border-style: dashed; }
  .map-wrap.no-image::after {
    content: "🗺️ กำลังโหลดรูปแมพ…";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; text-align: center; padding: 30px;
  }
  /* SVG arrow overlay */
  .map-arrows {
    position: absolute; inset: 0;
    pointer-events: none;
    width: 100%; height: 100%;
  }
  .map-arrows line {
    stroke-width: 2.5;
    stroke-dasharray: 6 4;
    stroke-linecap: round;
    opacity: 0.95;
    animation: dashflow 0.8s linear infinite;
  }
  @keyframes dashflow {
    to { stroke-dashoffset: -10; }
  }
  .map-arrows .anchor-dot {
    fill: rgba(0,0,0,0.4);
    stroke-width: 2;
  }
  .marker {
    position: absolute;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--main-bf);
    color: white;
    font-weight: 700;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: grab;
    transform: translate(-50%, -50%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.7);
    user-select: none;
    transition: transform .08s;
    z-index: 2;
  }
  .marker.sub { background: var(--sub-bf); }
  .marker:hover { transform: translate(-50%, -50%) scale(1.1); }
  .marker.dragging { cursor: grabbing; transform: translate(-50%, -50%) scale(1.18); z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,0.8); }
  .marker.empty { opacity: 0.55; }
  .marker.has-anchor::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    animation: pulse 1.6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.18); opacity: 0.25; }
  }

  /* ===== Dialog ===== */
  dialog {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    min-width: 360px;
    max-width: 90vw;
  }
  dialog::backdrop { background: rgba(0,0,0,0.7); }
  dialog h3 { margin: 0 0 12px 0; color: var(--accent); }
  dialog textarea, dialog input {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px;
    font-family: monospace;
    font-size: 12px;
    width: 100%;
  }
  dialog textarea { height: 220px; resize: vertical; }
  dialog .row { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  dialog button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 12px;
  }
  dialog button.primary { background: var(--accent); color: white; border-color: var(--accent); }

  /* ===== Custom tooltip (persists during drag) ===== */
  .gtooltip {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    background: rgba(28, 33, 40, 0.97);
    color: var(--text);
    border: 1px solid var(--border-2);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    white-space: pre-line;
    box-shadow: 0 6px 20px rgba(0,0,0,0.7);
    opacity: 0;
    transition: opacity .1s;
    max-width: 280px;
    line-height: 1.55;
    min-width: 160px;
  }
  .gtooltip.show { opacity: 1; }
  .gtooltip .tip-title {
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .gtooltip .tip-row { font-size: 11px; color: var(--muted); padding: 1px 0; }
  .gtooltip .tip-row b { color: var(--text); font-weight: 600; }
  .gtooltip .tip-empty { color: var(--muted); font-style: italic; font-size: 11px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 18px; border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    z-index: 1000;
    font-size: 13px;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--success); color: var(--success); }

  /* ==========================================================
     RESPONSIVE LAYOUT — hamburger sidebar + mobile tweaks
     ========================================================== */

  /* Hamburger button: hidden on desktop, shown on mobile */
  .hamburger-btn {
    display: none;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
  }
  .hamburger-btn:hover { background: var(--panel-2); border-color: var(--accent); }

  /* Roster mode doesn't need the member sidebar — give content full width.
     Applies on every breakpoint (desktop + tablet + mobile). */
  body[data-mode="roster"] .sidebar         { display: none; }
  body[data-mode="roster"] .layout          { grid-template-columns: 1fr !important; }
  body[data-mode="roster"] .hamburger-btn   { display: none; }
  body[data-mode="roster"] .sidebar-backdrop { display: none !important; }

  /* Mobile mode dropdown — replaces .mode-toggle below 700px */
  .mode-select {
    display: none;
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    padding: 5px 28px 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23fff' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }
  .mode-select option { background: var(--bg-2); color: var(--text); }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 44px 0 0 0;
    background: rgba(0,0,0,0.55);
    z-index: 98;
    animation: fadeIn .2s ease;
  }
  body.sidebar-open .sidebar-backdrop { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }

  /* ===== Tablet (≤1100px) ===== */
  @media (max-width: 1100px) {
    body { font-size: 12px; }
    .layout { grid-template-columns: 210px 1fr; }
    header { gap: 6px; }
    header .brand { font-size: 13px; }
    .mode-toggle .seg { font-size: 11px; padding: 4px 9px; }
    header button { padding: 4px 8px; font-size: 11px; }
  }

  /* ===== Mobile (≤700px) — hamburger overlay sidebar ===== */
  @media (max-width: 700px) {
    .hamburger-btn { display: inline-flex; align-items: center; justify-content: center; min-width: 34px; padding: 4px 8px; }

    header { padding: 0 6px; gap: 4px; }
    header .brand { display: none; }                  /* hamburger replaces */
    header .spacer { display: none; }
    header .status { display: none; }                 /* member count — view in sidebar */

    header #btnSyncSettings { font-size: 11px; padding: 4px 8px; }
    header .sync-indicator {
      font-size: 10px; padding: 3px 6px;
      max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* On mobile, replace the 6-tab toggle with a compact <select> dropdown */
    .mode-toggle { display: none; }
    .mode-select { display: inline-block; flex: 1 1 auto; min-width: 0; max-width: 240px; }

    /* Sidebar becomes overlay: hidden by default, slides in on .sidebar-open */
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      top: 44px; left: 0; bottom: 0;
      width: 280px; max-width: 80vw;
      z-index: 99;
      transform: translateX(-100%);
      transition: transform .25s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.6);
    }
    body.sidebar-open .sidebar { transform: translateX(0); }

    /* Center area: full width on mobile */
    .center { padding: 8px; gap: 10px; }
    .center > * { min-width: 0; }    /* prevent overflow on flex children */

    /* Auction inputs/columns: 1 col stack on mobile */
    .auction-inputs { grid-template-columns: 1fr !important; gap: 8px; }
    .auction-columns { grid-template-columns: 1fr !important; gap: 8px; }
    .auction-sub-boxes { grid-template-columns: 1fr !important; }
    .auction-summary-table { font-size: 11px; }
    .auction-summary-table th, .auction-summary-table td { padding: 5px 4px; }
    .auction-percent-row { flex-wrap: wrap; gap: 6px; }
    .auction-percent-btn { padding: 4px 10px; font-size: 11px; }
    .auction-input-card input { font-size: 18px; padding: 8px 10px; }

    /* Roster table: card layout per row on mobile — each row stacks vertically
       so all 4 fields are visible without horizontal scroll */
    .roster-table-wrap { overflow: visible; }
    .roster-table { min-width: 0; }
    .roster-table thead { display: none; }   /* header redundant in card layout */
    .roster-table tbody tr { display: block; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .roster-table tbody tr:hover td { background: transparent; }
    .roster-table tbody td { display: block; padding: 3px 0; border: none; }
    .roster-table td.r-rk {
      display: inline-block; width: auto;
      margin-right: 8px;
      background: var(--panel); padding: 2px 8px; border-radius: 10px;
      font-size: 11px; color: var(--accent);
    }
    .roster-table td.r-actions {
      display: inline-block; width: auto;
      float: right;
    }
    /* Add a small "label" before each input via data-label on the cell */
    .roster-table tbody td:not(.r-rk):not(.r-actions)::before {
      content: attr(data-label);
      display: inline-block;
      width: 70px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      vertical-align: middle;
    }
    .roster-table input.r-input { font-size: 12px; padding: 5px 7px; width: calc(100% - 80px); }
    .roster-table input.r-input.r-cp { text-align: left; }
    .roster-table .r-cell-static { display: inline-block; vertical-align: middle; }
    .roster-toolbar { flex-direction: column; align-items: stretch; gap: 6px; }
    .roster-toolbar input.r-search { min-width: 0; }
    .roster-toolbar button { padding: 8px 10px; font-size: 12px; }

    /* Compact hero: stack pills horizontally with smaller text */
    .roster-hero { padding: 10px 12px; gap: 8px; }
    .roster-hero h2 { font-size: 14px; margin: 0; }
    .roster-hero > div[style*="flex:1"] { display: none; }   /* spacer */
    .roster-hero .roster-meta { font-size: 10px; gap: 4px; width: 100%; }
    .roster-hero .rate-pill { padding: 2px 7px; font-size: 10px; }

    /* Summary view (Members tab): single column */
    .summary-grid { grid-template-columns: 1fr !important; }
    .summary-table { font-size: 11px; }
    .summary-table th, .summary-table td { padding: 5px 6px; }

    /* GL Battle summary (League) layout collapse */
    .gl-score-board { grid-template-columns: 1fr; gap: 8px; }
    .gl-stat-grid { grid-template-columns: 1fr; }
    .gl-grid-2, .gl-under-block { grid-template-columns: 1fr; }

    /* Party layout (League/Overrun): vertical card per party.
       Header row = party-num + clear button side-by-side.
       Below = 5 slots stacked full-width for easy reading + drag-drop. */
    .party-row {
      grid-template-columns: 1fr 72px;
      grid-template-rows: 30px repeat(5, auto);
      grid-template-areas:
        "num    clear"
        "s0     s0"
        "s1     s1"
        "s2     s2"
        "s3     s3"
        "s4     s4";
      gap: 0;
      border-top: 2px solid var(--border-2);
    }
    .party-row > .party-num         { grid-area: num; }
    .party-row > .party-row-actions { grid-area: clear; }
    /* Slots are direct children in source order (party-num, slot1..5, clear).
       Use :nth-child to map to grid-areas s0..s4. */
    .party-row > .slot:nth-child(2) { grid-area: s0; }
    .party-row > .slot:nth-child(3) { grid-area: s1; }
    .party-row > .slot:nth-child(4) { grid-area: s2; }
    .party-row > .slot:nth-child(5) { grid-area: s3; }
    .party-row > .slot:nth-child(6) { grid-area: s4; }
    .party-row > .party-num {
      justify-content: flex-start;
      padding: 0 12px;
      font-size: 13px;
      letter-spacing: 0.3px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      border-right: 0;
    }
    .party-row > .party-num::before { content: "Party "; opacity: 0.55; font-weight: 500; margin-right: 4px; }
    .party-row > .party-actions {
      background: transparent;
      border-bottom: 1px solid var(--border);
      font-size: 14px;

<script>
/* =====================================================================
 * State
 * ===================================================================== */
const STORAGE_KEY = "roo_party_v2";

/* 16 distinct team colors (rainbow spectrum) — League mode */
const TEAM_COLORS = [
  "#ef4444", "#f97316", "#f59e0b", "#eab308",
  "#84cc16", "#22c55e", "#10b981", "#14b8a6",
  "#06b6d4", "#0ea5e9", "#3b82f6", "#6366f1",
  "#8b5cf6", "#a855f7", "#d946ef", "#ec4899"
];

/* Overrun: 4 big parties × 4 sub-parties — colors by big group */
const OVERRUN_GROUPS = [
  { name: "Red",    color: "#ef4444", ids: [1,2,3,4] },
  { name: "Yellow", color: "#eab308", ids: [5,6,7,8] },
  { name: "Green",  color: "#22c55e", ids: [9,10,11,12] },
  { name: "Blue",   color: "#3b82f6", ids: [13,14,15,16] }
];
const TEAM_COLORS_OVERRUN = (() => {
  const out = new Array(16);
  for (const g of OVERRUN_GROUPS) for (const id of g.ids) out[id-1] = g.color;
  return out;
})();

function teamColor(id) {
  const palette = state.mode === "overrun" ? TEAM_COLORS_OVERRUN : TEAM_COLORS;
  return palette[id - 1] || "#888";
}
const DEFAULT_SHEET = "https://docs.google.com/spreadsheets/d/1Qxw4M9WAy7JVwOGF8kTQlNpQsiE_PNqTaypEa59B0v8/edit?gid=499171245";

/* === SAVED TEAM (DO NOT EDIT BY HAND — use the "Save team" button) === */
const SAVED_TEAM_DATA = null; /* savedteam-end */

const PARTY_SLOTS = 5;
const PARTIES = 16;

function makeEmptyParties() {
  return Array.from({length: PARTIES}, (_, i) => ({
    id: i + 1,
    name: "ตี้ " + (i+1),
    slots: Array(PARTY_SLOTS).fill(null)
  }));
}

let state = {
  sheetUrl: DEFAULT_SHEET,
  members: [],
  mode: "league",                // "league" | "overrun" | "summary" | "auction-gl" | "auction-overrun" | "leave"
  parties: makeEmptyParties(),
  partiesLeague: null,
  partiesOverrun: null,
  markers: {},
  mapBg: { 1: null, 2: null, 3: null },
  overrunMarkers: {},
  jobTargets: {},
  auctionGL: { cards: 0, illusion: 0, white: 0, black: 0, bonusPercent: 0,
    assignments: { main: { cards: [], illusion: [], white: [], black: [] }, sub: { cards: [], illusion: [], white: [], black: [] } } },
  auctionOverrun: { cards: 0, illusion: 0, white: 0, black: 0,
    assignments: { main: { cards: [], illusion: [], white: [], black: [] }, sub: { cards: [], illusion: [], white: [], black: [] } } },
  // Scheduled leaves (advance leave registrations). Shape:
  //   leaves[memberId] = { "YYYY-MM-DD": true, ... }
  // Cleared every Monday 00:00 BKK. Activates the leave visual on League/
  // Overrun ONLY on the matching date (todayBkkISO()), then auto-deactivates.
  leaves: {},
  // Bookkeeping for the auto-clear job. Strings are BKK dates so they're
  // stable across timezones / DST.
  system: { lastDailyReset: "", lastWeeklyReset: "" },
  auctionRequests: {},
  // Admin list mirrored from Firebase /admins/. Keyed by the email with
  // dots replaced by underscores (Firebase RTDB doesn't allow "." in keys).
  // Anyone can read; only existing admins can write (per Database Rules),
  // bootstrapped by the ADMIN_EMAILS hardcoded fallback below.
  admins: {},
  // App-created user accounts (admin-created via the Users page). Each
  // entry is { username, email, createdAt, createdBy }. Firebase Auth
  // holds the credential; this map is the admin-facing "who exists" list.
  users: {}
};

/* ---------- BKK timezone helpers (used by Leave page + auto-clear) ----- */
// All "today" / "00:00" semantics are in Asia/Bangkok (UTC+7) — guild events
// are scheduled in BKK time so the reset boundary must match.
function bkkNow() {
  // shift UTC → BKK by adding +7h, then format as if it were UTC. Result is
  // a Date object whose UTC fields = BKK wall-clock fields.
  const t = Date.now() + 7 * 60 * 60 * 1000;
  return new Date(t);
}
function todayBkkISO() {
  const d = bkkNow();
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, "0");
  const day = String(d.getUTCDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function bkkDow(isoStr) {
  // 0 = Sunday, 1 = Monday, ..., 6 = Saturday — same convention as JS Date.
  // Parse YYYY-MM-DD as a UTC date so DOW is correct regardless of browser TZ.
  const [y, m, d] = isoStr.split("-").map(Number);
  return new Date(Date.UTC(y, m - 1, d)).getUTCDay();
}
const DOW_TH = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
function isEventDay(isoStr) {
  // Tuesday/Thursday → GL · Sunday → Overrun · else null
  const d = bkkDow(isoStr);
  if (d === 2 || d === 4) return "GL";
  if (d === 0) return "Overrun";
  return null;
}
function fmtThaiDate(isoStr) {
  const [y, m, d] = isoStr.split("-").map(Number);
  const TH_MONTHS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  return `${d} ${TH_MONTHS[m-1]} ${y+543}`;
}
/** Format an epoch ms timestamp into compact "D/M, H:MM" using BKK time.
 *  Used by the Roster's Last Update column. Returns "—" if ms is falsy. */
function fmtUpdatedAt(ms) {
  if (!ms) return "—";
  const t = new Date(ms + 7 * 60 * 60 * 1000);  // shift to BKK then read UTC fields
  const d = t.getUTCDate();
  const mo = t.getUTCMonth() + 1;
  const hh = t.getUTCHours();
  const mm = String(t.getUTCMinutes()).padStart(2, "0");
  return `${d}/${mo}, ${hh}:${mm}`;
}
function thisMondayISO() {
  // Return the ISO date of the most recent Monday (or today if today is Mon).
  // Used as the "weekly reset stamp" so we can detect when we've crossed
  // Monday 00:00 BKK since last reset.
  const today = todayBkkISO();
  const d = bkkDow(today);
  // Mon=1, so subtract (d===0 ? 6 : d-1) days
  const back = d === 0 ? 6 : d - 1;
  const [y, m, da] = today.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, da - back));
  return `${dt.getUTCFullYear()}-${String(dt.getUTCMonth()+1).padStart(2,"0")}-${String(dt.getUTCDate()).padStart(2,"0")}`;
}

/* =====================================================================
 * Responsive sidebar (mobile hamburger overlay)
 * ===================================================================== */
function toggleSidebar() {
  document.body.classList.toggle("sidebar-open");
}
function closeSidebar() {
  document.body.classList.remove("sidebar-open");
}
// Close sidebar automatically when viewport grows past mobile breakpoint.
window.addEventListener("resize", () => {
  if (window.innerWidth > 700) closeSidebar();
});
// Tap a member name in mobile → close sidebar so you can see the result.
document.addEventListener("click", (e) => {
  if (window.innerWidth > 700) return;
  if (!document.body.classList.contains("sidebar-open")) return;
  const row = e.target.closest && e.target.closest(".member-row");
  if (row) closeSidebar();
});

/** Switch between League / Overrun / Summary. */
function switchMode(newMode) {
  // Legacy: summary tab merged into Roster
  if (newMode === "summary") newMode = "roster";
  if (state.mode === newMode) return;
  // Snapshot active mode's parties (league / overrun)
  if (state.mode === "league") state.partiesLeague = state.parties;
  else if (state.mode === "overrun") state.partiesOverrun = state.parties;

  state.mode = newMode;

  if (newMode === "league" || newMode === "overrun") {
    let next = newMode === "league" ? state.partiesLeague : state.partiesOverrun;
    if (!Array.isArray(next) || next.length !== PARTIES) next = makeEmptyParties();
    next.forEach((p, i) => {
      if (!p) next[i] = { id: i+1, name: "ตี้ "+(i+1), slots: Array(PARTY_SLOTS).fill(null) };
      while (p && p.slots.length < PARTY_SLOTS) p.slots.push(null);
      if (p) p.slots = p.slots.slice(0, PARTY_SLOTS);
    });
    state.parties = next;

  save();
  render();
}

function updateModeToggleUI() {

// Position the active-tab indicator over the actual button — handles
// variable-width labels (e.g., "Auction Overrun" is wider than "League"),
// which fixed-percentage CSS positioning could not.
function positionModeIndicator() {

// Global drag guard. Realtime Firebase listeners CALL render() which rebuilds
// the entire .center innerHTML. If that happens mid-drag, the browser loses
// the drop target (because the original DOM element no longer exists) and the
// drop becomes a no-op. We set _isDragging on dragstart and clear it on dragend
// — listeners check this and defer their render until the drag finishes.
let _isDragging = false;
let _pendingRenderAfterDrag = false;
// Map filter state — when non-zero, the corresponding map renders only
// the selected team's marker + arrow, hiding everyone else. Each
// battlefield card has its OWN filter (Main 1-8 and Sub 9-16 chosen
// independently); Overrun keeps its own filter across the 4 groups.
// Reset to 0 ("all") on every page load (in-memory only).
let _mapFilterMain    = 0;   // 0 = all, otherwise party id 1-8
let _mapFilterSub     = 0;   // 0 = all, otherwise party id 9-16
let _mapFilterOverrun = 0;   // 0 = all, otherwise group id 1-4
function setMapFilterMain(val) {
  _mapFilterMain = parseInt(val, 10) || 0;
  if (typeof renderMarkers === "function") renderMarkers();
}
function setMapFilterSub(val) {
  _mapFilterSub = parseInt(val, 10) || 0;
  if (typeof renderMarkers === "function") renderMarkers();
}
function setMapFilterOverrun(val) {
  _mapFilterOverrun = parseInt(val, 10) || 0;
  if (typeof renderOverrunMarkers === "function") renderOverrunMarkers();
}
function setDragging(on) {
  _isDragging = !!on;
  if (!on && _pendingRenderAfterDrag) {
    _pendingRenderAfterDrag = false;
    if (typeof render === "function") render();
  }
}
// safeRender: queues the render until the current drag finishes. Used by
// realtime Firebase listeners so a remote write mid-drag doesn't yank the
// drop target out from under the user.
function safeRender() {

// Bind at document level so we catch ALL drags (including HTML5 default dragend
// when user drops outside any registered target).
document.addEventListener("dragstart", () => setDragging(true), true);
document.addEventListener("dragend",   () => setDragging(false), true);

function save() {

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const loaded = JSON.parse(raw);
      state = {...state, ...loaded};
      if (!Array.isArray(state.parties) || state.parties.length !== PARTIES) {
        state.parties = Array.from({length: PARTIES}, (_, i) => ({
          id: i+1, name: "ตี้ "+(i+1), slots: Array(PARTY_SLOTS).fill(null)
        }));
      }
      state.parties.forEach(p => {
        while (p.slots.length < PARTY_SLOTS) p.slots.push(null);
        p.slots = p.slots.slice(0, PARTY_SLOTS);
      });
    } catch(e) { console.warn("load failed", e); }
  }
}

function showTooltipFor(target) { return; /* disabled */
  ensureTooltip();

        : `<div class="tip-row">${escapeHtml(l)}</div>`
    ).join("");

    if (top < 4) top = r.bottom + 8;
    let left = r.left + r.width / 2 - tr.width / 2;
    left = Math.max(8, Math.min(window.innerWidth - tr.width - 8, left));
    _gtooltip.style.top = top + "px";
    _gtooltip.style.left = left + "px";

function hideTooltip(force) {

function setupTooltip() { return; /* disabled */
  ensureTooltip();
  document.addEventListener("mouseover", (e) => {
